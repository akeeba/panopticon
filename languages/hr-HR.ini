PANOPTICON_SETUP_BTN_LETS_GO="Krenimo!"
PANOPTICON_SETUP_SESSION_LBL_WARNING_HEADER="Kreirajte novo mjesto za spremanje sesije"
PANOPTICON_SETUP_SESSION_LBL_WARNING_BODY="Put za zapisivanje sesije konfiguriran u PHP-u nije dostupan za pisanje, što onemogućuje prijavu. Kako bi se riješio ovaj problem, Panopticon će pokušati stvoriti put za pohranu sesije u direktoriju <code>%s</code>. Za to je potrebno unijeti podatke o FTP ili SFTP vezi s korijenom vašeg web-mjesta. Ako niste sigurni oko ovih postavki, obratite se svom hosteru."
PANOPTICON_SETUP_SESSION_LBL_ERROR_HEADER="Došlo je do pogreške prilikom pokušaja stvaranja novog mjesta za spremanje sesije"
