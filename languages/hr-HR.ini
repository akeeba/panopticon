PANOPTICON_BACKUPTASKS_LBL_BACKUP_PROFILE="Profil sigurnosnog kopiranja"
PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION="Opis"
PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION_HELP="Možete koristiti varijable Akeeba Backup-a kao što su <code>[DATE]</code>, <code>[SITE]</code>, itd. One će biti zamijenjene od strane Akeeba Backup-a u trenutku sigurnosnog kopiranja. Možete koristiti i varijable <code>{DATE_FORMAT_LC}</code>, <code>{DATE_FORMAT_LC1}</code>…<code>{DATE_FORMAT_LC7}</code> koje će biti zamijenjene od strane Panopticona s formatiranom verzijom vremena sigurnosnog kopiranja."
PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION_DEFAULT="Zakazano udaljeno sigurnosno kopiranje s Panopticonom izvršeno {DATE_FORMAT_LC7}"
PANOPTICON_BACKUPTASKS_LBL_SCHEDULE="Raspored"
PANOPTICON_BACKUPTASKS_LBL_MINUTES="Minute"
PANOPTICON_BACKUPTASKS_LBL_MINUTES_HELP="Broj <code>0</code> do <code>59</code>, raspon npr. <code>5-15</code>, odvojen zarezom npr. <code>1,15,30,45</code>, svaka minuta kao <code>*</code>, svakih X minuta s kosom crtom npr. <code>*/5</code> (svakih 5 minuta)."
PANOPTICON_BACKUPTASKS_LBL_HOURS="Sati"
PANOPTICON_BACKUPTASKS_LBL_HOURS_HELP="Broj <code>0</code> do <code>23</code> (0–11 je a.m., 12–23 je p.m.), raspon npr. <code>5-15</code>, odvojen zarezom npr. <code>0,6,12,18</code>, svaki sat kao <code>*</code>, svakih X sati s kosom crtom npr. <code>*/2</code> (svakih 2 sata)."
PANOPTICON_BACKUPTASKS_LBL_DOM="Dan u mjesecu"
PANOPTICON_BACKUPTASKS_LBL_DOM_HELP="Broj <code>1</code> do <code>31</code>, <code>L</code> za zadnji dan u mjesecu (ne može se koristiti u popisu vrijednosti!), raspon npr. <code>1-15</code>, odvojen zarezom npr. <code>1,7,14,21,28</code>, svaki dan kao <code>*</code>, svakih X dana s kosom crtom npr.<code>*/3</code> (svakih 3 dana).<br>Koristite broj s <code>W</code> za najbliži radni dan u istom mjesecu, npr. <code>15W</code> je najbliži dan (od 13. do 17.) koji nije subota ili nedjelja."
PANOPTICON_BACKUPTASKS_LBL_MONTH="Mjesec"
PANOPTICON_BACKUPTASKS_LBL_MONTH_HELP="Broj <code>1</code> (siječanj) do <code>12</code> (prosinac), raspon npr. <code>3-7</code>, odvojen zarezom npr. <code>3,6,9,12</code>, svaki mjesec kao <code>*</code>, svakih X mjeseci s kosom crtom npr. <code>*/2</code> (svakih 2 mjeseca).<br>Umjesto brojeva možete koristiti troznakovne engleske kratice: <code>JAN</code> <code>FEB</code>, <code>MAR</code>, <code>APR</code>, <code>MAY</code>, <code>JUN</code>, <code>JUL</code>, <code>AUG</code>, <code>SEP</code>, <code>OCT</code>, <code>NOV</code>, <code>DEC</code>."
PANOPTICON_BACKUPTASKS_LBL_DOW="Dan u tjednu"
PANOPTICON_BACKUPTASKS_LBL_DOW_HELP="Broj <code>0</code> (nedjelja) do <code>6</code> (subota), raspon npr. <code>1-5</code>, odvojen zarezom npr. <code>1,3,5</code>, svaki dan kao <code>*</code>.<br> Umjesto brojeva možete koristiti troznakovne engleske kratice: <code>SUN</code>, <code>MON</code>, <code>TUE</code>, <code>WED</code>, <code>THU</code>, <code>FRI</code>, <code>SAT</code><br>Broj praćen s <code>L</code> za zadnji dan tjedna u mjesecu, npr. <code>5L</code> je zadnji petak u mjesecu.<br>Dva broja odvojena s <code>#</code> za n-ti dan tjedna u mjesecu, npr. <code>5#3</code> je 3. petak u mjesecu."
