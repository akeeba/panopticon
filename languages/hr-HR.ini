PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Provjerite da nikakva proširenja treće strane (posebno sigurnosna proširenja) i/ili postavke konfiguracije poslužitelja ne sprječavaju pristup mapi <code>api</code> vašeg web-mjesta. Provjerite i da odgovori iz te datoteke <em>nisu</em> predmemorirani od strane ikakvih dodataka na vašem web-miestu, web-poslužitelju ili CDN/proxy-ju."
