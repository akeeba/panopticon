PANOPTICON_ABOUT_LBL_3PD_SOFTWARE_ABOUT="Softver se ne stvara u vakuumu. Gradimo na radu drugih ljudi i organizacija koji su ljubazno stavili na raspolaganje svoje softverske knjižnice pod dopuštajućom licencijom. U nastavku možete pronaći softver trećih strana koji je uključen u Akeeba Panopticon, brojeve verzija i kontrolne zbroje integriteta — u biti Popis materijala softvera (SBOM) koji vam može biti potreban iz razloga usklađenosti."
