PANOPTICON_SETUP_LBL_DATABASE_HEAD_TEXT="Panopticon treba bazu podataka za rad. Najprije stvorite bazu podataka - i korisnika baze podataka - na vašem poslužitelju. Zatim unesite podatke o vezi s bazom podataka u nastavku. Ako nešto nije jasno, obratite se tvrtki koja ugošćuje vaše web-mjesto."
PANOPTICON_SETUP_LBL_DATABASE_DRIVER="Vrsta baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_HELP="Obično je MySQLi (<em>s</em> nastavnim slovom \"i\")"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQL="MySQL (zastarjeli upravljački program za MySQL - izbjegavajte korištenje)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQLI="MySQLi (preporučeni upravljački program za MySQL)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDO="PDO"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDOMYSQL="MySQL (PDO)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLAZURE="Windows Azure SQL baza podataka"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLITE="SQLite"
PANOPTICON_SETUP_LBL_DATABASE_HOST="Naziv hosta poslužitelja baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Naziv hosta ili IP adresa poslužitelja baze podataka (obično: localhost). Napominjemo da su localhost i 127.0.0.1 <em>vrlo</em> različiti za MySQL; možda ćete morati isprobati oba da vidite koji radi s vašim poslužiteljem baze podataka. Ako vaš poslužitelj koristi nestandardni priključak, dodajte ga iza naziva hosta s prefiksom dvotočke, npr. 127.0.0.1:1234 za poslužitelj baze podataka na 127.0.0.1 koji osluškuje na priključku 1234."
PANOPTICON_SETUP_LBL_DATABASE_NAME="Naziv baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_NAME_HELP="Naziv vaše baze podataka. Većina hostera koji koriste cPanel, Plesk i druge veće hosting panele dodjeljuju nazive baza podataka poput abcdef_korisnickoime, gdje je abcdef vaše korisničko ime u hosting kontrolnoj ploči. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_DATABASE_PASS="Lozinka"
PANOPTICON_SETUP_LBL_DATABASE_PASS_HELP="Lozinka koju koristite za spajanje na vašu bazu podataka."
PANOPTICON_SETUP_LBL_DATABASE_PREFIX="Prefiks naziva tablice baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_PREFIX_HELP="Zajednički prefiks naziva tablice za sve tablice baze podataka koje pripadaju ovoj instalaciji Panopticona."
PANOPTICON_SETUP_LBL_DATABASE_USER="Korisničko ime"
PANOPTICON_SETUP_LBL_DATABASE_USER_HELP="Korisničko ime koje koristite za spajanje na vašu bazu podataka. Većina hostera koji koriste cPanel, Plesk i druge veće hosting panele dodjeljuju korisnička imena poput abcdef_korisnickoime, gdje je abcdef vaše korisničko ime u hosting kontrolnoj ploči. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION="Spoji se s SSL certifikatom"
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION_HELP="Treba li se spojiti na bazu podataka korištenjem SSL certifikata? Ovo se može koristiti umjesto provjere autentičnosti korisničkim imenom i lozinkom (šifrirana veza s autentifikacijom certifikatom) ili <em>uz</em> provjeru autentičnosti korisničkim imenom i lozinkom (šifrirana veza s provjerom autentičnosti lozinkom). Ako ne znate što ovo znači, postavite ovu opciju na Ne i zanemarite i nekoliko sljedećih opcija."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER="Metode SSL/TLS enkripcije"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER_HELP="Unesite popis metoda enkripcije za spajanje sa SSL certifikatima, odvojenih dvotočkama. Ako ostane prazno, koristit će se zadani popis (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) (preporučeno)."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA="Datoteka tijela za izdavanje certifikata (CA)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA_HELP="Apsolutna putanja datoteke do PEM datoteke CA certifikata vašeg poslužitelja baze podataka, npr. <code>/home/mojkorisnik/ca.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY="Datoteka privatnog ključa korisnika baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY_HELP="Apsolutna putanja datoteke do PEM datoteke privatnog ključa vašeg korisnika baze podataka, npr. <code>/home/mojkorisnik/mojkorisnik-key.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT="Datoteka javnog ključa (certifikata) korisnika baze podataka"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT_HELP="Apsolutna putanja datoteke do PEM datoteke javnog ključa (certifikata) vašeg korisnika baze podataka, npr. <code>/home/mojkorisnik/mojkorisnik.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT="Provjeri certifikat poslužitelja"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Postavite na Da da biste provjerili certifikat koji nam poslužitelj šalje natrag. To se provjerava prema datoteci CA tijela za izdavanje certifikata koje ste naveli. Ako dobivate pogreške veze, postavite na Ne; neke konfiguracije (posebno one generirane <code>mysql_ssl_rsa_setup</code>) mogu onemogućiti vezu ako je provjera certifikata omogućena. Ako omogućite provjeru i polje CA datoteke ostane prazno, certifikat poslužitelja bit će provjeren prema CA datotekama koje vaš poslužitelj poznaje, pogledajte PHP opcije <code>openssl.cafile</code> i <code>openssl.capath</code>."
PANOPTICON_SETUP_DIRECTFTP_HOST_TITLE="Naziv hosta"
PANOPTICON_SETUP_DIRECTFTP_HOST_DESCRIPTION="Naziv hosta FTP poslužitelja, bez protokola. Ne koristite <s><code>ftp://example.com</code></s>; umjesto toga koristite <code>example.com</code>."
PANOPTICON_SETUP_DIRECTFTP_PORT_TITLE="Priključak"
PANOPTICON_SETUP_DIRECTFTP_PORT_DESCRIPTION="TCP/IP priključak FTP poslužitelja. Obično 21. Obratite se svom hosteru."
PANOPTICON_SETUP_DIRECTFTP_USER_TITLE="Korisničko ime"
PANOPTICON_SETUP_DIRECTFTP_USER_DESCRIPTION="Korisničko ime, razlikuje velika i mala slova."
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_TITLE="Lozinka"
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_DESCRIPTION="Lozinka, razlikuje velika i mala slova. Preporučuje se koristiti lozinke koje se sastoje samo od a-z, A-Z, 0-9, crtica, točaka, podvlaka i uskličnika. Ostali znakovi mogu aktivirati zaštitu od hakiranja vašeg web-poslužitelja."
PANOPTICON_SETUP_DIRECTFTP_FTPS_TITLE="Koristi FTP preko SSL-a (FTPS)"
PANOPTICON_SETUP_DIRECTFTP_FTPS_DESCRIPTION="Spaja se na vaš FTP poslužitelj koristeći SSL-šifriranu vezu. <strong>Ovo nije isto što i SFTP, SCP ili \"Secure FTP\"</strong>. Ako vaš poslužitelj ne podržava ovu metodu, dobit ćete pogreške pri povezivanju."
PANOPTICON_SETUP_DIRECTFTP_INITDIR_TITLE="Početni direktorij"
PANOPTICON_SETUP_DIRECTFTP_INITDIR_DESCRIPTION="Apsolutna FTP putanja do direktorija u koji će se datoteke učitavati. Ako niste sigurni, spojite se na poslužitelj s FileZillom, dođite do željenog direktorija i kopirajte putanju prikazanu u desnom oknu iznad popisa direktorija. Obično je to nešto poput <code>/public_html</code> ili <code>/httpdocs</code>."
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_TITLE="Pasivni način rada"
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_DESCRIPTION="Koristi FTP pasivni način rada pri prijenosu podataka. Treba biti omogućeno na svim poslužiteljima s vatrozidom za priključke, što je praktički svi poslužitelji danas."
PANOPTICON_SETUP_DIRECTFTP_TEST_DESCRIPTION="Testira FTP vezu."
PANOPTICON_SETUP_DIRECTFTP_TEST_FAIL="Nije moguće spojiti se na FTP poslužitelj."
PANOPTICON_SETUP_DIRECTFTP_TEST_OK="Uspješno povezivanje na FTP poslužitelj."
PANOPTICON_SETUP_DIRECTFTP_TEST_TITLE="Testiraj FTP vezu"
PANOPTICON_SETUP_DIRECTSFTP_HOST_TITLE="Naziv hosta"
PANOPTICON_SETUP_DIRECTSFTP_HOST_DESCRIPTION="Naziv hosta SFTP poslužitelja, bez protokola. Ne koristite <s><code>sftp://example.com</code></s>; umjesto toga koristite <code>example.com</code>."
PANOPTICON_SETUP_DIRECTSFTP_PORT_TITLE="Priključak"
PANOPTICON_SETUP_DIRECTSFTP_PORT_DESCRIPTION="TCP/IP priključak za SFTP. Obično 22. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_DIRECTSFTP_USER_TITLE="Korisničko ime"
PANOPTICON_SETUP_DIRECTSFTP_USER_DESCRIPTION="Korisničko ime, razlikuje velika i mala slova. Vaš SFTP poslužitelj mora dopuštati provjeru autentičnosti korisničkim imenom i lozinkom."
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_TITLE="Lozinka"
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_DESCRIPTION="SFTP lozinka, razlikuje velika i mala slova."
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_TITLE="Početni direktorij"
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_DESCRIPTION="SFTP direktorij korijena web-mjesta. Ako niste sigurni, koristite SFTP klijent za stolno računalo, spojite se na poslužitelj, dođite do direktorija i kopirajte ovdje prikazanu putanju. Putanja mora biti apsolutna, npr. <code>/home/mojkorisnik/public_html</code>, a ne samo <s><code>public_html</code></s>."
PANOPTICON_SETUP_DIRECTSFTP_TEST_DESCRIPTION="Testira vezu na SFTP poslužitelj."
PANOPTICON_SETUP_DIRECTSFTP_TEST_FAIL="Nije moguće spojiti se na SFTP poslužitelj. Poruka pogreške:"
PANOPTICON_SETUP_DIRECTSFTP_TEST_OK="Uspješno povezivanje na SFTP poslužitelj."
PANOPTICON_SETUP_DIRECTSFTP_TEST_TITLE="Testiraj SFTP vezu"
PANOPTICON_SETUP_LBL_SETUP_HEAD_TEXT="Pristup Panopticonu zaštićen je prijavom. Sada ćete stvoriti korisnički račun s punim administratorskim ovlastima. Možete izmijeniti ovog korisnika i stvoriti više korisnika nakon dovršetka procesa instalacije."
PANOPTICON_SETUP_LBL_USER_NAME="Puno ime"
PANOPTICON_SETUP_LBL_USER_NAME_HELP="Molimo unesite vaše puno ime. Koristit će se svaki put kad vaša instalacija Panopticona treba poslati e-poruku."
PANOPTICON_SETUP_LBL_USER_USERNAME="Korisničko ime"
PANOPTICON_SETUP_LBL_USER_USERNAME_HELP="Korisničko ime koje ćete koristiti za prijavu u Panopticon. Preporučuje se koristiti samo mala slova a-z i brojeve 0-9."
PANOPTICON_SETUP_LBL_USER_PASSWORD="Lozinka"
PANOPTICON_SETUP_LBL_USER_PASSWORD_HELP="Lozinka koju ćete koristiti za prijavu u Panopticon. Lozinka razlikuje velika i mala slova, što znači da abc, Abc i ABC su tri <em>različite</em> lozinke."
PANOPTICON_SETUP_LBL_USER_PASSWORD2="Ponovi lozinku"
PANOPTICON_SETUP_LBL_USER_PASSWORD2_HELP="Molimo ponovite lozinku unesenu gore. Želimo provjeriti da je niste slučajno krivo utipkali."
PANOPTICON_SETUP_LBL_USER_EMAIL="E-mail adresa"
PANOPTICON_SETUP_LBL_USER_EMAIL_HELP="Molimo unesite svoju e-mail adresu. Koristit će se svaki put kad vaša instalacija Panopticona treba poslati e-poruku. Ova e-mail adresa, kao i sve informacije o korisniku, <em>ne</em> šalju se autorima Panopticona."
PANOPTICON_SETUP_LBL_TIMEZONE="Vremenska zona"
