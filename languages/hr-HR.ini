PANOPTICON_SETUP_LBL_FS_DRIVER_FTP="FTP - File Transfer Protocol"
PANOPTICON_SETUP_LBL_FS_DRIVER_HELP="U nekim okruženjima dijeljenog hostinga trebate koristiti FTP ili SFTP da biste mogli pisati u datoteke svoje web stranice."
PANOPTICON_SETUP_LBL_FS_DRIVER_SFTP="SFTP - Secure File Transfer Protocol (over SSH)"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="(S)FTP directory"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="(S)FTP direktorij za instalaciju Panopticona. Na FTP poslužiteljima to nije isto što i staza datotečnog sustava. Ako niste sigurni, pitajte svog pružatelja web hosting usluga."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="(S)FTP server hostname"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="Naziv hosta ili IP adresa vašeg (S)FTP poslužitelja, npr. <code>ftp.example.com</code> ili <code>127.0.0.1</code>. Morate unijeti ovo <em>bez</em> prefiksa <code>ftp://</code>, <code>sftp://</code> ili <code>ssh://</code>. Ako niste sigurni u ove i ostale FTP postavke, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Koristi pasivni način rada"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Primjenjivo samo za FTP. Kada je odabrano, Panopticon će koristiti FTP pasivni način rada. Većina FTP poslužitelja to zahtijeva. Ako vaš hoster zahtijeva FTP aktivni način rada, isključite ovu opciju. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="(S)FTP password"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="Lozinka koju koristite za spajanje na (S)FTP poslužitelj. Ako niste sigurni, pitajte svog pružatelja web hosting usluga."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="(S)FTP server port"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="Broj priključka na koji vaš (S)FTP poslužitelj osluškuje. Obično je 21 za FTP i 22 za SFTP. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="Koristi SSL"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Primjenjivo samo za FTP, zanemaruje se za SFTP. Kada je odabrano, Panopticon će koristiti FTP s eksplicitnim SSL-om (FTP/S). Napominjemo da se ovo ne smije miješati s SFTP-om koji je potpuno drugačija stvar."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="Korisničko ime za (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="Korisničko ime koje koristite za spajanje na vaš (S)FTP poslužitelj. Ako niste sigurni, obratite se svom hosteru."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript je onemogućen"
PANOPTICON_SETUP_LBL_NOSCRIPT_EXPLAIN="Morate omogućiti JavaScript u svom pregledniku da biste koristili Panoptikon."
PANOPTICON_SETUP_LBL_BROKEN_JS_HEAD="Potreban JavaScript se ne učitava"
PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="JavaScript datoteke za Panoptikon ne učitavaju se ispravno. Uvjerite se da vašoj instalaciji ne nedostaju datoteke, provjerite dopuštenja i izbrišite predmemoriju preglednika."
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_OK="Svi sustavi rade!"
