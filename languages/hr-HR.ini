PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="Ima li vaš hoster zaštitno rješenje na strani poslužitelja (poput Apache mod_security2) koje može blokirati krajnju točku API dodatka?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="Imate li sigurnosni, SEO ili sličan dodatak koji može blokirati gore navedeno?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Odgovor Joomla! API aplikacije uključuje izlaz koji nije API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="Odgovor API dodatka uključuje izlaz koji nije API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="Odgovoru API-ja prethodi i/ili slijedi drugi tekstualni sadržaj poput PHP poruka (npr. obavijesti o zastarjelosti, upozorenja ili fatalne pogreške). Ovo onemogućuje Panopticon čitanje odgovora API-ja."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Provjerite da je \"Izvještavanje o pogreškama\" postavljeno na Ništa, i \"Debug web-mjesto\" na Ne u stranici Globalne konfiguracije vašeg web-mjesta. Time se sprječava PHP od ispisivanja poruka."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Ako to nije dovoljno, moguće je da proširenje treće strane uzrokuje pogrešku u API aplikaciji. Provjerite ima li kakvih proširenja treće strane koja mogu uzrokovati probleme."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="Joomla! API aplikacija je odgovorila s neočekivanim HTTP statusnim kôdom (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="API dodatak je odgovorio s neočekivanim HTTP statusnim kôdom (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="HTTP statusni kôd %s znači da je došlo do pogreške na poslužitelju. Provjerite ima li ikakvih proširenja treće strane, posebno sistemskih, koja mogu slučajno uzrokovati pogreške."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="HTTP statusni kôd %s znači da je došlo do pogreške na poslužitelju. Provjerite ima li ikakvih proširenja treće strane, posebno sistemskih, koja mogu slučajno uzrokovati pogreške."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="HTTP statusni kôd 400 obično znači da vašem web-miestu može pristupiti samo ograničen broj naziva domena; onaj koji ste pokušali koristiti nije dopušten. Provjerite postavke vašeg web-mjesta."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Ako koristite Admin Tools Professional, idite na backend vašeg web-mjesta i kliknite na Komponente, Admin Tools za Joomla!, Web Application Firewall i provjerite Dozvoljene domene."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Ako to nije bio slučaj, kontaktirajte svog hostera."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! smatra da je vaš API Token netočan, oštećen ili vas ne može prijaviti."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Provjerite da API Token koji koristite pripada korisničkom računu koji pripada grupi Superkorisnika i da je korisnik omogućen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Provjerite da su dodaci \"API provjera autentičnosti - Web Services Joomla Token\" i \"Korisnik - Joomla API Token\" omogućeni na vašem web-miestu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Provjerite da je dodatak \"System - Panopticon Connector for Joomla 3\" omogućen na vašem web-miestu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="Moguće je i da nešto na vašem poslužitelju ili dodatak na vašem web-miestu kvari API Token pri prijenosu na vaše web-mjesto."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Provjerite vaša instalirana Joomla! proširenja. Napominjemo da Admin Tools Professional za Joomla! <em>ne</em> ometa Joomla! API aplikaciju."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="HTTP statusni kôd 406 (Not Acceptable) znači da Joomla! ne vidi naš HTTP <code>Accept</code> zaglavlje, ili ga je dodatak na vašem web-miestu izmijenio na način koji ga čini neprepoznatljivim."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Provjerite da nema <code>system</code> ili <code>webservices</code> dodataka koji mogu kvariti HTTP Accept zaglavlje."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Ako to ne pomogne, kontaktirajte svog hostera i zamolite ih da provjere prosljeđuje li se Accept zaglavlje ispravno u PHP. Trebalo bi biti <code>Accept: application/vnd.api+json</code>."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="Najvjerojatnije je <code>system</code> ili <code>webservices</code> dodatak na vašem poslužitelju izmijenio zahtjev koji smo poslali, što je rezultiralo pogreškom. Provjerite vaša instalirana proširenja."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! smatra da je vaš API Token netočan, oštećen ili vas ne može prijaviti."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Provjerite da API Token koji koristite pripada korisničkom računu koji pripada grupi Superkorisnika i da je korisnik omogućen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Provjerite da su dodaci \"API provjera autentičnosti - Web Services Joomla Token\" i \"Korisnik - Joomla API Token\" omogućeni na vašem web-miestu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Provjerite da je dodatak \"System - Panopticon Connector for Joomla 3\" omogućen na vašem web-miestu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="Moguće je i da nešto na vašem poslužitelju ili dodatak na vašem web-miestu kvari API Token pri prijenosu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Provjerite vaša instalirana Joomla! proširenja. Napominjemo da Admin Tools Professional za Joomla! <em>ne</em> ometa Joomla! API aplikaciju."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Došlo je do pogreške u komunikaciji s vašim web-mjestom."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="Komunikacijska knjižnica korištena od PHP-a (cURL) je prijavila sljedeću pogrešku:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Došlo je do pogreške u komunikaciji s vašim web-mjestom."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="Komunikacijska knjižnica korištena od Panopticona (<a href=\"https://github.com/guzzle/guzzle\" target=\"_blank\">Guzzle HTTP</a>) je prijavila sljedeću pogrešku:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Ovo je neočekivano stanje koje može ukazivati na pogrešku u komunikaciji koju još nismo vidjeli, problem unutar samog Guzzlea, problem s poslužiteljem ili neočekivanu situaciju."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="Naziv hosta vašeg web-mjesta (<span class=\"font-monospace\">%s</span>) nije moguće razriješiti u IP adresu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK="Molimo provjerite sljedeće:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="Jeste li ispravno upisali URL? Pažljivo provjerite, pravopisne greške su lako napravljene i teško uočene!"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="Jeste li nedavno kupili domenu, dodijelili domenu poslužitelju ili premjestili web-mjesto između hostera? Imajte na umu da DNS propagacija traje od nekoliko minuta do 48 sati."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Ako se domena vašeg web-mjesta razrješava na IPv6 adresu - ali ne i na IPv4 adresu - provjerite da poslužitelj na kojem ste instalirali Panopticon podržava IPv6."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_HEAD="Akeeba Panopticon Connector nije omogućen na vašem web-miestu"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_BLAH="Vaše Joomla! web-mjesto treba imati Akeeba Panopticon Connector instaliran i omogućen kako bi Akeeba Panopticon mogao raditi s njim."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK="Molimo provjerite sljedeće:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK1="Jeste li instalirali Akeeba Panopticon Connector paket na vaše web-mjesto?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK2="Idite na Sustav, Upravljanje, Proširenja. Je li \"Akeeba Panopticon Connector\" <em>komponenta</em> instalirana i omogućena?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK3="Idite na Sustav, Upravljanje, Proširenja. Je li \"Akeeba Panopticon Connector\" <em>paket</em> instaliran i omogućen?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK4="Idite na Sustav, Upravljanje, Dodaci. Je li dodatak \"Web Services - Panopticon\" omogućen?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_HEAD="Dodatak \"System - Panopticon Connector for Joomla 3\" nije omogućen na vašem web-miestu"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_BLAH="Vaše Joomla! web-mjesto treba imati dodatak \"System - Panopticon Connector for Joomla 3\" instaliran i omogućen kako bi Akeeba Panopticon mogao raditi s njim."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Koristite samopotpisani SSL/TLS certifikat"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Koristite HTTPS za pristup vašem web-miestu, ali SSL/TLS certifikat koji koristite nije potpisan od strane poznatog komercijalnog tijela za izdavanje certifikata."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Možete riješiti ovaj problem čineći <em>jedno</em> od sljedećeg:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Koristite plain HTTP. Ovo je najmanje sigurna opcija i stoga se jako ne preporučuje."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Instalirajte SSL/TLS certifikat potpisan od strane poznatog komercijalnog tijela za izdavanje certifikata. Većina poslužitelja vam omogućuje korištenje besplatnih certifikata putem Let's Encrypt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Ako ste na intranetu, ekstranetu ili inače trebate upravljati vlastitim tijelom za izdavanje certifikata, možete reći Panopticonu da prepozna vaše prilagođene CA datoteke."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="SSL/TLS certifikat vašeg web-mjesta ima problem"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Koristite HTTPS za pristup vašem web-miestu, ali SSL/TLS certifikat koji koristite izgleda da ima problem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Molimo provjerite sljedeće:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="Je li SSL/TLS certifikat za ispravni naziv domene? Ako koristite zadani SSL/TLS certifikat vašeg hostera, ograničen je na domenu hostinga i ne može se koristiti za vaše web-mjesto."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="Je li SSL/TLS certifikat istekao? U tom slučaju ga trebate obnoviti. Napominjemo da ako koristite Let's Encrypt, certifikat ima kratki rok trajanja i mora se redovito obnavljati."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="Je li SSL/TLS certifikat opozvan? Ponekad tijela za izdavanje certifikata, ili vlasnici SSL/TLS certifikata, mogu odlučiti opozvati ga."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Je li moguće da vaš poslužitelj servira pogrešni SSL/TLS certifikat? To se može dogoditi ako ste nedavno promijenili certifikat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="Dodatak \"Web Services - Installer\" je onemogućen na vašem web-miestu"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH1="Panopticon koristi Joomla! API Application usluge koje pruža dodatak \"Web Services - Installer\" za osiguranje instalacije svih potrebnih proširenja."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH2="Idite na backend vašeg web-mjesta i kliknite na Sustav, Upravljanje, Proširenja. Potražite dodatak \"Web Services - Installer\" i omogućite ga."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon koristi vlastiti dodatak \"System - Panopticon Connector for Joomla 3\" za pružanje potrebnog API-ja."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Idite na backend vašeg web-mjesta i kliknite na Proširenja, Dodaci. Potražite dodatak \"System - Panopticon Connector for Joomla 3\" i omogućite ga."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Ako ste već omogućili ovaj dodatak, promijenite URL krajnje točke ispod na <code>%s</code>"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_HEAD="Vaše web-mjesto izgleda zaštićeno lozinkom na razini web-poslužitelja"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH1="Vaše web-mjesto je odgovorilo s HTTP 401 Unauthorized statusnim kôdom pri pokušaju pristupa API-ju. Ovo obično znači da ste primijenili zaštitu lozinkom na razini web-poslužitelja."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH2="Molimo uklonite zaštitu lozinkom."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3="Napominjemo da je zaštita lozinkom možda primijenjena samo na mapu <code>api</code> vašeg web-mjesta, ili na korijensku mapu. Potražite datoteke <code>.htpasswd</code> ili <code>.htaccess</code>."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3_J3="Napominjemo da je zaštita lozinkom primijenjena na korijensku mapu vašeg web-mjesta."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_HEAD="Ups. Nešto je potpuno neispravno ovdje…"
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Normalno možemo otkriti prirodu pogreške veze i pružiti neke korisne informacije za rješavanje problema, ili barem uputiti vas na neke vrste pomoći. Ovog puta to nije slučaj."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Umjesto toga, dobili smo pogrešku za koju bismo trebali moći pružiti informacije za rješavanje problema, ali ne možemo."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH3="Molimo obrišite sve datoteke i mape unutar mape <code>tmp</code> Akeeba Panopticona. Time se rješava problem predmemorirane kopije ove stranice s pogrešnim podacima."
