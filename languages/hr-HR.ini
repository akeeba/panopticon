PANOPTICON_SYSCONFIG_LBL_FIELD_API_TOKENS_PER_USER_MAX="Maksimalni broj tokena po korisniku"
PANOPTICON_SYSCONFIG_LBL_FIELD_API_TOKENS_PER_USER_MAX_HELP="Maksimalni broj omogućenih, neisteklih API tokena koje korisnik može imati. Grupe korisnika mogu ovo nadjačati na razini grupe. Postavite na 0 za odbijanje API pristupa svim korisnicima prema zadanim postavkama (pojedine grupe mogu i dalje odobriti pristup putem vlastitog nadjačavanja)."
PANOPTICON_SYSCONFIG_LBL_FIELD_LOG_ATTACHMENT_GROUPS="Priloži datoteku dnevnika ovim grupama"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOG_ATTACHMENT_GROUPS_HELP="Odaberite koje grupe korisnika primaju datoteku dnevnika zadatka kao prilog e-pošte kada ažuriranje jezgre ili proširenja ne uspije. Ostavite prazno za slanje privitka svim primateljima obavijesti."
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_APITOKENS="API tokeni"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="MCP poslužitelj"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="MCP (Model Context Protocol) poslužitelj omogućuje AI agentima i chatbotovima — poput Claude Codea, Claude Desktopa, Codexa, Cursora ili VS Codea — upravljanje Panopticonom koristeći iste mogućnosti kao JSON API. Svaki zahtjev se autenticira Panopticon API tokenom poslanim kao Bearer Authorization zaglavlje, a agent može vidjeti i učiniti samo ono što bi mogao vlasnik tog tokena putem API-ja."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED="Omogući MCP poslužitelj"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED_HELP="Kada je onemogućeno (zadano), MCP krajnja točka odgovara kao da ne postoji."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT="URL MCP krajnje točke"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT_HELP="Konfigurirajte svoj AI alat da koristi ovaj URL kao Streamable HTTP MCP poslužitelj, sa zaglavljem <code>Authorization: Bearer &lt;vaš API token&gt;</code>."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Globalno onemogućeni alati"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="Popis naziva MCP alata odvojenih zarezom koji se nikome ne izlažu, bez obzira na korisnika, token ili grupu. Ovo je apsolutni prekidač za isključivanje (na primjer, ovdje navedite <code>get_sysconfig</code> kako biste sistemsku konfiguraciju potpuno isključili iz MCP-a). Ostavite prazno za dopuštanje svih alata."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Dostupni alati"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_CHECKSUMS="Integritet datoteka jezgre"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL="Osnovni URL izvora kontrolnih zbrojeva"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL_HELP="Osnovni URL koji konektori Panopticona koriste za preuzimanje referentnih kontrolnih zbrojeva za provjeru integriteta datoteka jezgre. Ostavite prazno za korištenje zadanog <code>https://getpanopticon.com/checksums</code>. Ako hostirate vlastito zrcalo, ono mora poslužiti isti raspored: konektor dodaje <code>/joomla/&lt;verzija&gt;/sha256_squash.json.gz</code> ili <code>/wordpress/&lt;verzija&gt;/sha256_squash.json.gz</code> na ovaj osnovni URL. Nemojte uključivati kosu crtu na kraju ili naziv CMS-a."
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Onemogućeni MCP alati"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="MCP alati koje članovi ove grupe NE smiju koristiti. Važno: pristup se odobrava ako BILO KOJA od korisnikovih grupa dopušta alat. Alat je blokiran za korisnika samo kada ga onemogućuju SVE grupe kojima pripada. Ovo je suprotno od Joomline logike \"zabrana pobjeđuje\". Popis globalno onemogućenih alata u Sistemskoj konfiguraciji uvijek ima prednost."
