PANOPTICON_SETUP_LBL_PRECHECK_HEAD_FAIL="Neki zahtjevi nisu ispunjeni"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_FAIL="Vaš poslužitelj ne ispunjava sve minimalne zahtjeve."
