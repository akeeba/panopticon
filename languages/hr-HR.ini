PANOPTICON_SCANNERTASKS_LBL_HOURS_HELP="Broj <code>0</code> do <code>23</code> (0–11 je a.m., 12–23 je p.m.), raspon npr. <code>5-15</code>, odvojen zarezom npr. <code>0,6,12,18</code>, svaki sat kao <code>*</code>, svakih X sati s kosom crtom npr. <code>*/2</code> (svakih 2 sata)."
PANOPTICON_SCANNERTASKS_LBL_DOM="Dan u mjesecu"
PANOPTICON_SCANNERTASKS_LBL_DOM_HELP="Broj <code>1</code> do <code>31</code>, <code>L</code> za zadnji dan u mjesecu (ne može se koristiti u popisu vrijednosti!), raspon npr. <code>1-15</code>, odvojen zarezom npr. <code>1,7,14,21,28</code>, svaki dan kao <code>*</code>, svakih X dana s kosom crtom npr.<code>*/3</code> (svakih 3 dana).<br>Koristite broj s <code>W</code> za najbliži radni dan u istom mjesecu, npr. <code>15W</code> je najbliži dan (od 13. do 17.) koji nije subota ili nedjelja."
PANOPTICON_SCANNERTASKS_LBL_MONTH="Mjesec"
PANOPTICON_SCANNERTASKS_LBL_MONTH_HELP="Broj <code>1</code> (siječanj) do <code>12</code> (prosinac), raspon npr. <code>3-7</code>, odvojen zarezom npr. <code>3,6,9,12</code>, svaki mjesec kao <code>*</code>, svakih X mjeseci s kosom crtom npr. <code>*/2</code> (svakih 2 mjeseca).<br>Umjesto brojeva možete koristiti troznakovne engleske kratice: <code>JAN</code> <code>FEB</code>, <code>MAR</code>, <code>APR</code>, <code>MAY</code>, <code>JUN</code>, <code>JUL</code>, <code>AUG</code>, <code>SEP</code>, <code>OCT</code>, <code>NOV</code>, <code>DEC</code>."
PANOPTICON_SCANNERTASKS_LBL_DOW="Dan u tjednu"
PANOPTICON_SCANNERTASKS_LBL_DOW_HELP="Broj <code>0</code> (nedjelja) do <code>6</code> (subota), raspon npr. <code>1-5</code>, odvojen zarezom npr. <code>1,3,5</code>, svaki dan kao <code>*</code>.<br> Umjesto brojeva možete koristiti troznakovne engleske kratice: <code>SUN</code>, <code>MON</code>, <code>TUE</code>, <code>WED</code>, <code>THU</code>, <code>FRI</code>, <code>SAT</code><br>Broj praćen s <code>L</code> za zadnji dan tjedna u mjesecu, npr. <code>5L</code> je zadnji petak u mjesecu.<br>Dva broja odvojena s <code>#</code> za n-ti dan tjedna u mjesecu, npr. <code>5#3</code> je 3. petak u mjesecu."
