PANOPTICON_ABOUT_LBL_CONTRIBUTORS_INFO="Panopticon je slobodan i otvoreni softver (FOSS). Kao i svi FOSS projekti, moguć je zahvaljujući doprinosima volonterskih programera, dizajnera, prevoditelja, lingvista, beta testera i korisnika koji na sve načine doprinose njegovu razvoju. U nastavku možete pronaći najznačajnije suradnike projekta Panopticon, prema podacima GitHub-a."
