PANOPTICON_SITES_FIELD_CONFIG_CORE_UPDATE_EMAIL_LOG_GROUPS_HELP="Nadjačajte globalnu postavku: odaberite koje grupe korisnika primaju datoteku dnevnika zadatka kao prilog e-pošte pri neuspjehu. Ostavite prazno za korištenje globalne Panopticon postavke."
PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME="Doba dana za instalaciju ažuriranja proširenja (Sat:Minuta)"
PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME_HELP="Vrijeme izraženo u vremenskoj zoni %s. Ako se ažuriranja pronađu <em>nakon</em> tog doba dana, instalacija ažuriranja odvijat će se sljedeći kalendarski dan. Izbjegavajte koristiti doba dana promjene ljetnog računanja vremena (obično: između 2 i 4 sata ujutro); inače, planiranje ažuriranja će se ponašati na način koji vam se čini kao \"udan\" ili \"pogrešno\" ako se ažuriranje pronađe na dan promjene ljetnog računanja vremena. Ručno pokrenuta ažuriranja uvijek se izvode odmah, bez obzira na ovu postavku."
