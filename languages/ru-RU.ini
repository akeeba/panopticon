PANOPTICON_SETUP_LBL_DATABASE_HEAD_TEXT="Panopticon требует базу данных для работы. Сначала создайте базу данных и пользователя на вашем сервере. Затем введите сведения о подключении к базе данных ниже. Если что-то непонятно, обратитесь к своему хостинг-провайдеру."
PANOPTICON_SETUP_LBL_DATABASE_DRIVER="Тип базы данных"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_HELP="Обычно это MySQLi (<em>с</em> буквой «i» в конце)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQL="MySQL (устаревший драйвер MySQL — не рекомендуется)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQLI="MySQLi (предпочтительный драйвер для MySQL)"
