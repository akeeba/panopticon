PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="Вы правильно ввели URL? Внимательно проверьте — опечатки легко допустить."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="Вы недавно купили домен, привязали домен к серверу или перенесли его к другому провайдеру? Возможно, DNS-записи ещё не распространились. Как правило, это занимает до 48 часов."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Если домен вашего сайта разрешается в IPv6-адрес, но не в IPv4-адрес, возможно, ваш сервер, на котором работает Panopticon, не поддерживает IPv6. Обратитесь к вашему хостинг-провайдеру."
