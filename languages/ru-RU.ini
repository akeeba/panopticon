PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_HEAD="API-приложение Joomla! заблокировано (ошибка HTTP 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS="Что-то на вашем сервере — например, конфигурация сервера, контролируемая вашим хостинг-провайдером, файл конфигурации сервера, такой как <code>.htaccess</code>, или плагин вашего сайта — блокирует доступ Panopticon к API-приложению вашего сайта (<span class=\"font-monospace\">%s</span>)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS_J3="Что-то на вашем сервере — например, конфигурация сервера, контролируемая вашим хостинг-провайдером, файл конфигурации сервера, такой как <code>.htaccess</code>, или плагин вашего сайта — блокирует доступ Panopticon к URL плагина API (<span class=\"font-monospace\">%s</span>) на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_TOCHECK="Что следует проверить:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1="Блокирует ли ваш хостинг-провайдер или файл конфигурации сервера (например, <code>.htaccess</code>) доступ к конечной точке API-приложения Joomla! (<span class=\"font-monospace\">%s</span>) полностью?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1_J3="Блокирует ли ваш хостинг-провайдер или файл конфигурации сервера (например, <code>.htaccess</code>) доступ к конечной точке плагина API (<span class=\"font-monospace\">%s</span>) полностью?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2="Имеется ли на вашем сервере решение для защиты на стороне сервера (например, mod_security2 для Apache), которое может блокировать конечную точку API-приложения Joomla! (<span class=\"font-monospace\">%s</span>), ваш токен API (<span class=\"font-monospace\">%s</span>) или User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="Имеется ли на вашем сервере решение для защиты на стороне сервера (например, mod_security2 для Apache), которое может блокировать конечную точку плагина API (<span class=\"font-monospace\">%s</span>), ваш токен API (<span class=\"font-monospace\">%s</span>) или User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="Есть ли у вас плагин безопасности, SEO или аналогичный, который может блокировать вышеуказанное?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Ответ API-приложения Joomla! содержит нежелательный вывод"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="Ответ плагина API содержит нежелательный вывод"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="Ответ API предваряется и/или сопровождается другим текстовым содержимым, например, сообщениями PHP (уведомлениями об устаревании, предупреждениями или критическими ошибками) или выводом стороннего программного обеспечения. В результате ответ API не может быть декодирован, то есть Panopticon не может понять ответ вашего сайта."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Убедитесь, что в глобальной конфигурации вашего сайта для параметра «Отчёты об ошибках» установлено значение «Нет», а для «Режим отладки» — «Нет». Это предотвратит вывод PHP-сообщений, которые засоряют ответ API."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Если этого недостаточно, возможно, сторонний плагин вызывает ошибку в API-приложении. Проверьте, нет ли сторонних плагинов, особенно системных, которые могут непреднамеренно нарушать работу плагина API, и свяжитесь с их автором."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="API-приложение Joomla! ответило неожиданным кодом состояния HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="Плагин API ответил неожиданным кодом состояния HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="Код состояния HTTP %s означает ошибку сервера. Проверьте, нет ли сторонних плагинов, особенно системных, которые могут непреднамеренно нарушать работу API-приложения Joomla!, и свяжитесь с их автором."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="Код состояния HTTP %s означает ошибку сервера. Проверьте, нет ли сторонних плагинов, особенно системных, которые могут непреднамеренно нарушать работу плагина API, и свяжитесь с их автором."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="Код состояния HTTP 400 обычно означает, что ваш сайт доступен только по ограниченному числу доменных имён; используемое вами имя (<span class=\"font-monospace\">%s</span>) может не входить в их число."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Если вы используете Admin Tools Professional, перейдите в административную часть вашего сайта и нажмите «Компоненты», Admin Tools for Joomla!, «Брандмауэр веб-приложений», «Настройка WAF», «Фильтрация запросов». Проверьте список <em>разрешённых доменов</em> в нижней части страницы."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Если это не так, обратитесь к вашему хостинг-провайдеру."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! считает, что ваш токен API неверен, повреждён или не позволяет выполнить вход."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Убедитесь, что используемый токен API принадлежит учётной записи пользователя из группы суперпользователей и что пользователь активен. Обратите внимание, что запрос сброса пароля временно деактивирует пользователя. Не доверяйте памяти и предположениям — дважды проверьте пользователя на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Убедитесь, что плагины «API Authentication - Web Services Joomla Token» и «User - Joomla API Token» включены на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Убедитесь, что плагин «System - Panopticon Connector for Joomla 3» включён на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="Также возможно, что что-то на вашем сервере или плагин на вашем сайте искажает токен API при его передаче на сайт."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Проверьте установленные плагины Joomla!. Обратите внимание: Admin Tools Professional для Joomla! <em>не вмешивается</em> в работу токена Joomla! API. Если это не поможет, обратитесь к вашему хостинг-провайдеру."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="Код состояния HTTP 406 (Not Acceptable) означает, что Joomla! не видит наш HTTP-заголовок <code>Accept</code>, либо плагин на вашем сайте изменил его таким образом, что это привело к ошибке."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Пожалуйста, проверьте, нет ли плагинов типа <code>system</code> или <code>webservices</code>, которые могут нарушать HTTP-заголовок Accept."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Если это не поможет, обратитесь к вашему хостинг-провайдеру и попросите проверить, правильно ли заголовок Accept передаётся в PHP. Он должен быть <code>Accept: application/vnd.api+json</code>."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="Скорее всего, плагин типа <code>system</code> или <code>webservices</code> на вашем сервере изменил отправленный нами запрос, что привело к ошибке. Пожалуйста, проверьте установленные плагины."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! считает, что ваш API-токен неверен, повреждён или не позволяет вам войти в систему."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Убедитесь, что используемый API-токен принадлежит учётной записи пользователя из группы «Суперпользователь» и что пользователь активен. Обратите внимание, что запрос на сброс пароля временно блокирует пользователя. Не полагайтесь на память или предположения — проверьте пользователя на своём сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Убедитесь, что плагины «API Authentication - Web Services Joomla Token» и «User - Joomla API Token» включены на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Убедитесь, что плагин «System - Panopticon Connector for Joomla 3» включён на вашем сайте."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="Также возможно, что что-то на вашем сервере или плагин на вашем сайте повреждает API-токен при его передаче на сайт."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Пожалуйста, проверьте установленные плагины Joomla!. Обратите внимание, что Admin Tools Professional для Joomla! <em>не</em> вмешивается в API-токен Panopticon. Если это не поможет, обратитесь к вашему хостинг-провайдеру."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Произошла ошибка связи с вашим сайтом."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="Библиотека связи, используемая PHP (cURL), сообщила следующую ошибку:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH2="Пожалуйста, обратитесь к <a href=\"https://curl.se/libcurl/c/libcurl-errors.html\" target=\"_blank\">документации по ошибкам libcurl</a>, чтобы понять значение данного кода ошибки."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Произошла ошибка связи с вашим сайтом."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="Библиотека связи, используемая Panopticon (<a href=\"https://github.com/guzzle/guzzle\">Guzzle</a>), сообщила об ошибке."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Это неожиданная ситуация, которая может указывать на ошибку связи, с которой мы не сталкивались ранее. Пожалуйста, сообщите об этой проблеме разработчикам Panopticon."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="Имя хоста вашего сайта (<span class=\"font-monospace\">%s</span>) не может быть разрешено."
