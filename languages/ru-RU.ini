PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Вы используете самоподписанный SSL/TLS-сертификат"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Вы используете HTTPS для доступа к своему сайту, однако используемый SSL/TLS-сертификат является самоподписанным, то есть не выдан признанным центром сертификации."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Вы можете устранить эту проблему, выполнив <em>одно</em> из следующих действий:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Используйте обычный HTTP. Это наименее безопасный вариант, поэтому он настоятельно не рекомендуется."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Установите SSL/TLS-сертификат, подписанный коммерческим, общеизвестным центром сертификации (например, Let's Encrypt)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Если вы работаете в интранете, экстранете или вам необходимо поддерживать собственный центр сертификации, настройте Panopticon так, чтобы он доверял вашему центру сертификации."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="У SSL/TLS-сертификата вашего сайта есть проблема"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Вы используете HTTPS для доступа к своему сайту, однако используемый SSL/TLS-сертификат не прошёл проверку."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Пожалуйста, проверьте следующее:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="SSL/TLS-сертификат выдан для правильного доменного имени? Если вы используете URL по умолчанию, сертификат должен покрывать именно этот домен."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="Срок действия SSL/TLS-сертификата истёк? В этом случае необходимо его продлить. Обратите внимание, что Let's Encrypt сертификаты продлеваются автоматически."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="SSL/TLS-сертификат был отозван? Иногда центры сертификации или владельцы сайтов отзывают сертификаты. В этом случае необходимо получить новый."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Возможно, ваш сервер возвращает неправильный SSL/TLS-сертификат? Это может произойти, если на одном сервере размещено несколько сайтов и конфигурация SSL настроена некорректно."
