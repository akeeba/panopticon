PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIPS="Советы по подключению Akeeba Panopticon к Akeeba Backup Professional"
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1="Убедитесь, что компонент Akeeba Backup Professional и плагин «Веб-сервисы — Akeeba Backup» установлены и включены на вашем сайте. Akeeba Backup Core <em>несовместим</em> с Akeeba Panopticon."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1_WP="Убедитесь, что плагин Akeeba Backup Professional установлен и включён на вашем сайте. Akeeba Backup Core <em>несовместим</em> с Akeeba Panopticon."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Убедитесь, что ни одно стороннее расширение (особенно расширение безопасности) и/или настройки сервера не блокируют доступ к папке <code>api</code> вашего сайта. Также проверьте, что ответы из этой папки <em>не</em> кэшируются никакими плагинами сайта, веб-сервером или CDN/прокси перед вашим сайтом."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3_WP="Убедитесь, что ни один сторонний плагин (особенно плагин безопасности) и/или настройки сервера не блокируют доступ к файлу <code>wp-admin/admin-ajax.php</code> вашего сайта. Также проверьте, что ответы из этого файла <em>не</em> кэшируются."
