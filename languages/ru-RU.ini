PANOPTICON_SETUP_LBL_FS_DRIVER="Драйвер файловой системы"
PANOPTICON_SETUP_LBL_FS_DRIVER_FILE="Прямая запись файлов"
PANOPTICON_SETUP_LBL_FS_DRIVER_FTP="FTP — протокол передачи файлов"
PANOPTICON_SETUP_LBL_FS_DRIVER_HELP="В некоторых средах общего хостинга для записи в файлы сайта необходимо использовать FTP или SFTP."
PANOPTICON_SETUP_LBL_FS_DRIVER_SFTP="SFTP — безопасный протокол передачи файлов (через SSH)"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="Каталог (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="Каталог (S)FTP для установки Panopticon. На FTP-серверах он может отличаться от пути файловой системы. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="Имя хоста (S)FTP-сервера"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="Имя хоста или IP-адрес вашего (S)FTP-сервера, например <code>ftp.example.com</code> или <code>127.0.0.1</code>. Вводите значение БЕЗ префикса <code>ftp://</code>, <code>sftp://</code> или <code>ssh://</code>. Если не уверены в этих и других настройках FTP, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Использовать пассивный режим"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Только для FTP. При включении Panopticon будет использовать пассивный режим FTP. Большинство FTP-серверов его требуют. Если хостинг требует активного режима FTP, снимите этот флажок. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="Пароль (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="Пароль для подключения к (S)FTP-серверу. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="Порт (S)FTP-сервера"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="Номер порта вашего (S)FTP-сервера. Обычно 21 для FTP и 22 для SFTP. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="Использовать SSL"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Только для FTP, игнорируется для SFTP. При включении Panopticon будет использовать FTP через явный SSL (FTP/S). Обратите внимание: это не то же самое, что SFTP, — это совершенно разные протоколы."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="Имя пользователя (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="Имя пользователя для подключения к (S)FTP-серверу. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript отключен"
PANOPTICON_SETUP_LBL_NOSCRIPT_EXPLAIN="Вам необходимо включить JavaScript в вашем браузере, чтобы использовать Panopticon."
PANOPTICON_SETUP_LBL_BROKEN_JS_HEAD="Требуемый JavaScript не загружается"
PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="Файлы JavaScript для Panopticon загружаются некорректно. Убедитесь, что в установке нет отсутствующих файлов, проверьте права доступа и очистите кэш браузера."
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_OK="Все системы работают!"
