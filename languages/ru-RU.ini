PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLITE="SQLite"
PANOPTICON_SETUP_LBL_DATABASE_HOST="Имя хоста сервера базы данных"
PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Имя хоста или IP-адрес сервера базы данных (обычно: localhost). Обратите внимание, что с точки зрения MySQL localhost и 127.0.0.1 — <em>очень</em> разные значения; возможно, потребуется попробовать оба варианта. Если сервер использует нестандартный порт, укажите его через двоеточие после имени хоста, например 127.0.0.1:1234."
PANOPTICON_SETUP_LBL_DATABASE_NAME="Имя базы данных"
PANOPTICON_SETUP_LBL_DATABASE_NAME_HELP="Имя вашей базы данных. На большинстве хостингов с cPanel, Plesk и подобными панелями имена баз данных имеют вид abcdef_username, где abcdef — ваш логин в панели управления. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_DATABASE_PASS="Пароль"
PANOPTICON_SETUP_LBL_DATABASE_PASS_HELP="Пароль для подключения к базе данных."
PANOPTICON_SETUP_LBL_DATABASE_PREFIX="Префикс имён таблиц базы данных"
PANOPTICON_SETUP_LBL_DATABASE_PREFIX_HELP="Общий префикс имён всех таблиц базы данных, принадлежащих данной установке Panopticon."
PANOPTICON_SETUP_LBL_DATABASE_USER="Имя пользователя"
PANOPTICON_SETUP_LBL_DATABASE_USER_HELP="Имя пользователя для подключения к базе данных. На большинстве хостингов с cPanel, Plesk имена пользователей имеют вид abcdef_username. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION="Подключение с SSL-сертификатом"
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION_HELP="Следует ли подключаться к базе данных с SSL-сертификатом? Это может использоваться вместо аутентификации по имени пользователя и паролю (зашифрованное соединение с аутентификацией по сертификату) или <em>в дополнение к</em> ней (зашифрованное соединение с аутентификацией по паролю). Если не знаете, что это означает, выберите «Нет» и пропустите следующие несколько параметров."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER="Методы шифрования SSL/TLS"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER_HELP="Введите список методов шифрования для подключения с SSL-сертификатами, разделённых двоеточиями. Если оставить пустым, будет использован список по умолчанию (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) (рекомендуется)."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA="Файл центра сертификации (CA)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA_HELP="Абсолютный путь к файлу PEM сертификата центра сертификации (CA) вашего сервера базы данных, например <code>/home/myuser/ca.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY="Файл закрытого ключа пользователя базы данных"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY_HELP="Абсолютный путь к файлу PEM закрытого ключа пользователя базы данных, например <code>/home/myuser/myuser-key.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT="Файл открытого ключа (сертификата) пользователя базы данных"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT_HELP="Абсолютный путь к файлу PEM открытого ключа (сертификата) пользователя базы данных, например <code>/home/myuser/myuser.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT="Проверять сертификат сервера"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Выберите «Да» для проверки сертификата, который возвращает сервер. Проверка выполняется по указанному файлу центра сертификации (CA). Если возникают ошибки подключения, выберите «Нет» — некоторые конфигурации (особенно созданные с помощью <code>mysql_ssl_rsa_setup</code>) могут не допускать подключения при включённой проверке сертификата. Если включить проверку, не указав файл CA, сертификат сервера будет проверяться по файлам CA, известным вашему серверу — см. параметры PHP <code>openssl.cafile</code> и <code>openssl.capath</code>."
PANOPTICON_SETUP_DIRECTFTP_HOST_TITLE="Имя хоста"
PANOPTICON_SETUP_DIRECTFTP_HOST_DESCRIPTION="Имя хоста FTP-сервера без протокола. Не указывайте <s><code>ftp://example.com</code></s>; используйте только <code>example.com</code>."
PANOPTICON_SETUP_DIRECTFTP_PORT_TITLE="Порт"
PANOPTICON_SETUP_DIRECTFTP_PORT_DESCRIPTION="TCP/IP-порт FTP-сервера. Обычно 21. Уточните у хостинг-провайдера."
PANOPTICON_SETUP_DIRECTFTP_USER_TITLE="Имя пользователя"
PANOPTICON_SETUP_DIRECTFTP_USER_DESCRIPTION="Имя пользователя, с учётом регистра."
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_TITLE="Пароль"
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_DESCRIPTION="Пароль, с учётом регистра. Рекомендуется использовать пароли, содержащие только символы a-z, A-Z, 0-9, дефисы, точки, подчёркивания и восклицательные знаки. Другие символы могут активировать защиту веб-сервера от взлома."
PANOPTICON_SETUP_DIRECTFTP_FTPS_TITLE="Использовать FTP через SSL (FTPS)"
PANOPTICON_SETUP_DIRECTFTP_FTPS_DESCRIPTION="Подключитесь к FTP-серверу через зашифрованное SSL-соединение. <strong>Это не то же самое, что SFTP, SCP или «Secure FTP»</strong>. Если ваш сервер не поддерживает этот метод, вы получите ошибки подключения."
PANOPTICON_SETUP_DIRECTFTP_INITDIR_TITLE="Начальный каталог"
PANOPTICON_SETUP_DIRECTFTP_INITDIR_DESCRIPTION="Абсолютный FTP-путь к каталогу, в который будут загружены файлы. Если не уверены, подключитесь к серверу через FileZilla, перейдите в нужный каталог и скопируйте путь, отображаемый в правой панели над списком каталогов. Обычно это что-то вроде <code>/public_html</code> или <code>/httpdocs</code>."
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_TITLE="Пассивный режим"
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_DESCRIPTION="Использование пассивного режима FTP при передаче данных. Следует включать на всех серверах с брандмауэром портов, что сегодня является стандартом."
PANOPTICON_SETUP_DIRECTFTP_TEST_DESCRIPTION="Тестирование FTP-подключения."
PANOPTICON_SETUP_DIRECTFTP_TEST_FAIL="Не удалось подключиться к FTP-серверу."
PANOPTICON_SETUP_DIRECTFTP_TEST_OK="Успешное подключение к FTP-серверу."
PANOPTICON_SETUP_DIRECTFTP_TEST_TITLE="Тест FTP-подключения"
PANOPTICON_SETUP_DIRECTSFTP_HOST_TITLE="Имя хоста"
PANOPTICON_SETUP_DIRECTSFTP_HOST_DESCRIPTION="Имя хоста SFTP-сервера без протокола. Не указывайте <s><code>sftp://example.com</code></s>; используйте только <code>example.com</code>."
PANOPTICON_SETUP_DIRECTSFTP_PORT_TITLE="Порт"
PANOPTICON_SETUP_DIRECTSFTP_PORT_DESCRIPTION="TCP/IP-порт для SFTP. Обычно 22. Если не уверены, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_DIRECTSFTP_USER_TITLE="Имя пользователя"
PANOPTICON_SETUP_DIRECTSFTP_USER_DESCRIPTION="Имя пользователя, с учётом регистра. Ваш SFTP-сервер должен поддерживать аутентификацию по имени пользователя и паролю."
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_TITLE="Пароль"
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_DESCRIPTION="Пароль SFTP, с учётом регистра."
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_TITLE="Начальный каталог"
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_DESCRIPTION="SFTP-каталог корня сайта. Если не уверены, используйте SFTP-клиент, подключитесь к серверу, перейдите в нужный каталог и скопируйте отображаемый путь. Путь должен быть абсолютным, например <code>/home/myuser/public_html</code>, а не просто <s><code>public_html</code></s>."
PANOPTICON_SETUP_DIRECTSFTP_TEST_DESCRIPTION="Тестирование подключения к SFTP-серверу."
PANOPTICON_SETUP_DIRECTSFTP_TEST_FAIL="Не удалось подключиться к SFTP-серверу. Сообщение об ошибке:"
PANOPTICON_SETUP_DIRECTSFTP_TEST_OK="Успешное подключение к SFTP-серверу."
PANOPTICON_SETUP_DIRECTSFTP_TEST_TITLE="Тест SFTP-подключения"
