PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_HEAD="Убедитесь, что CRON-задание запускается <em>каждую минуту</em>."
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_BODY="Более редкий запуск CRON-задания приводит к устаревшим данным и ненадёжной работе, включая повреждение сайтов из-за незавершённых обновлений ядра Joomla!&reg;."
PANOPTICON_SETUP_LBL_CRON_CLI_CREATE_A_JOB="Перейдите в панель управления хостингом. Создайте новое CRON-задание. Настройте его запуск <strong>каждую минуту</strong>. Используйте следующую командную строку."
PANOPTICON_SETUP_LBL_CRON_REPLACE_PHP_CLI="Замените <i>/path/to/php</i> на путь к исполняемому файлу PHP %s CLI. Убедитесь, что это именно файл PHP CLI, а <strong>не</strong> PHP CGI/FastCGI."
PANOPTICON_SETUP_LBL_CRON_IF_UNSURE="Если что-то из перечисленного непонятно, обратитесь к хостинг-провайдеру."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_HEAD="CRON-задание не выполняется"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_1="Удалите <code>2>&1</code> из командной строки CRON. При следующем запуске CRON-команды вы получите письмо с ошибкой (при условии, что ваш аккаунт хостинга настроен на отправку вывода CRON-заданий). По этому письму можно определить причину проблемы."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_2="Если и после этого ничего не происходит, обратитесь к хостинг-провайдеру. Возможно, ваш аккаунт не получает вывод CRON-заданий, или CRON-задания вообще не выполняются (маловероятно, но такое бывает)."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_HEAD="При выполнении задания CRON я получаю «Status: 403 Forbidden»"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_1="Вы используете исполняемый файл PHP-CGI/FastCGI. Как указано выше, необходимо заменить <em>/path/to/php</em> на путь к исполняемому файлу <strong>PHP CLI</strong>."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_2="Запросите правильный путь у хостинг-провайдера. Если хостинг уже предоставил этот путь, обратитесь в службу поддержки с просьбой соединить вас с системным инженером. Для них предоставить этот путь — элементарная задача."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_HEAD="Я получаю сообщение «Akeeba Panopticon requires PHP %s or later»."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_1="В CRON-задании используется исполняемый файл PHP CLI неправильной версии."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_2="На большинстве серверов установлено несколько версий PHP. Запросите у хостинга путь к исполняемому файлу PHP CLI для PHP %s и используйте его в командной строке CRON-задания."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_HEAD="Хостинг поддерживает только URL-CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_INFO="Нажмите на вкладку <strong>Веб</strong> выше."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_HEAD="Хостинг не поддерживает CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_1="Мы <strong>настоятельно рекомендуем</strong> сменить хостинг-провайдера."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_2="Panopticon полезен только при стабильной и надёжной работе автоматизации. Это требует выполнения CRON-задания каждую минуту — <em>1440 раз в день</em>. При использовании стороннего сервиса это может обойтись в $10 в день! Вместо этого можно потратить аналогичную сумму <em>в месяц</em> на нормальный хостинг с поддержкой командных CRON-заданий."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_3="Если у вас есть более дешёвый способ удалённого выполнения CRON-заданий (например, другой сервер под вашим управлением), нажмите на вкладку <strong>Веб</strong>, чтобы узнать, как это сделать."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_4="<strong>Не экономьте на частоте выполнения заданий CRON!</strong> Редкое выполнение заданий CRON сделает Panopticon ненадёжным и может даже нарушить работу ваших сайтов из-за незавершённых обновлений ядра Joomla&reg;."
