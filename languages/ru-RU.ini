PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_HEAD="Приложение JSON API WordPress заблокировано (ошибка HTTP 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK3="Есть ли у вас плагин безопасности, SEO или аналогичный, который может блокировать вышеуказанное?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_HEAD="Ответ JSON API-приложения WordPress содержит нежелательный вывод"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Если этого недостаточно, возможно, сторонний плагин вызывает ошибку в API-приложении. Проверьте, нет ли сторонних плагинов, включая обязательные плагины (<code>mu-plugins</code>), которые могут непреднамеренно нарушать работу плагина API, и свяжитесь с их автором."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_HEAD="Приложение JSON API WordPress ответило данными не в формате JSON"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH1="Приложение JSON API WordPress должно отвечать данными в формате JSON. Ваш сервер вернул данные не в формате JSON. Это означает, что на вашем сайте что-то не работает."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2="Войдите в административную часть вашего сайта. Перейдите в «Компоненты», Akeeba Backup, «Панель управления». Нажмите «Параметры», «Резервное копирование через фронтенд» и установите «Включить JSON API (удалённое резервное копирование)» в значение «Да». Введите новое «Секретное слово»; вы можете создать новое случайное безопасное секретное слово на <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Затем нажмите «Сохранить и закрыть» в панели инструментов."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2_WP="Войдите в административную часть вашего сайта. Перейдите в Akeeba Backup, «Конфигурация системы», «Публичный API» и установите «Включить JSON API (удалённое резервное копирование)» в значение «Да». Введите новый «Секретный ключ»; вы можете создать новый случайный безопасный ключ на <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Затем нажмите «Сохранить и закрыть» в панели инструментов."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK1="Блокирует ли ваш хостинг-провайдер или файл конфигурации сервера (например, <code>.htaccess</code>) доступ к конечной точке API-приложения WordPress (<span class=\"font-monospace\">%s</span>) полностью?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK2="Имеется ли на вашем сервере решение для защиты на стороне сервера (например, mod_security2 для Apache), которое может блокировать конечную точку API-приложения WordPress (<span class=\"font-monospace\">%s</span>), ваш токен API (<span class=\"font-monospace\">%s</span>) или User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH1="Ответ API предваряется и/или сопровождается другим текстовым содержимым, например, сообщениями PHP (уведомлениями об устаревании, предупреждениями или критическими ошибками) или выводом сторонних плагинов. В результате ответ API не может быть декодирован, то есть Panopticon не может понять ответ вашего сайта."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Убедитесь, что PHP на вашем сервере настроен с отключённым <code>display_errors</code>, и что вы не включили <code>WP_DEBUG</code> в файле <code>wp-config.php</code> вашего сайта. Это предотвратит вывод PHP-сообщений, которые засоряют ответ API."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH2="Убедитесь, что нет кода в .htaccess, сторонних плагинов или пользовательского кода (в том числе в файле <code>functions.php</code> вашей темы), которые блокируют или иным образом ограничивают JSON API WordPress — полностью или для неаутентифицированного (гостевого) доступа."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_HEAD="Приложение WordPress JSON API ответило неожиданным кодом состояния HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_5XX="Код состояния HTTP %s означает ошибку на стороне сервера. Проверьте, нет ли сторонних плагинов, которые могут случайно нарушать работу WordPress JSON API, и обратитесь к их авторам."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_400="Код состояния HTTP 400 обычно означает, что ваш сайт доступен только с ограниченного числа доменных имён; то, которое вы попытались использовать (<span class=\"font-monospace\">%s</span>), может не входить в их число. Пожалуйста, обратитесь к вашему хостинг-провайдеру, если вы не уверены, почему получаете это сообщение."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_HEAD="WordPress считает, что ваш API-токен неверен, повреждён или не позволяет вам войти в систему."
