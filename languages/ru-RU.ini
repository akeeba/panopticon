PANOPTICON_SETUP_BTN_LETS_GO="Поехали!"
PANOPTICON_SETUP_SESSION_LBL_WARNING_HEADER="Создание нового пути сохранения сессий"
PANOPTICON_SETUP_SESSION_LBL_WARNING_BODY="Путь записи сессий, настроенный в PHP, недоступен для записи, что делает вход невозможным. Для решения этой проблемы Panopticon попытается создать путь сохранения сессий в каталоге <code>%s</code>. Для этого необходимо ввести данные FTP или SFTP подключения к корневому каталогу вашего сайта. Если вы не уверены в этих настройках, обратитесь к своему хостинг-провайдеру."
PANOPTICON_SETUP_SESSION_LBL_ERROR_HEADER="При попытке создания пути сохранения сессий произошла ошибка"
