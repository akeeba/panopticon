PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Как правило, мы можем определить причину ошибки соединения и предоставить полезные советы по её устранению."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Вместо этого мы получили ошибку, по которой должны были бы предоставить сведения для устранения неполадок, однако не можем этого сделать."
