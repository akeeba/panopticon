PANOPTICON_SITE_LBL_PHP_LTS_HEAD="Замечание о дистрибутивах Linux с «долгосрочной поддержкой»"
PANOPTICON_SITE_LBL_PHP_LTS_P1="Некоторые дистрибутивы Linux, такие как RedHat Enterprise Linux и Ubuntu Server, могут предлагать «долгосрочную поддержку» отдельных версий PHP после истечения официального срока их поддержки."
PANOPTICON_SITE_LBL_PHP_LTS_P2="Обратите внимание, что это обычно требует дополнительной, нередко дорогостоящей лицензии на каждый сервер. Кроме того, некоторые исправления безопасности, требующие изменений во внутренней архитектуре PHP, не могут быть применены в этих старых версиях PHP. Наконец, функциональные проблемы («ошибки») и совместимость с новыми стандартами и лучшими практиками интернета <em>никогда</em> не устраняются."
PANOPTICON_SITE_LBL_PHP_LTS_P3="Хотя дистрибутивы с долгосрочной поддержкой полезны для определённых случаев использования — например, корпоративных интранетов и экстранетов — они в конечном итоге не подходят для долгосрочного использования на публично доступном веб-сайте. Настоятельно рекомендуется установить и использовать одну из активно поддерживаемых ветвей PHP (в настоящее время PHP версий %s и %s)."
