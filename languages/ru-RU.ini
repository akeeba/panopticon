PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon использует собственный плагин «System - Panopticon Connector for Joomla 3» для связи с вашим сайтом Joomla! 3."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Пожалуйста, перейдите в административную панель вашего сайта и нажмите «Расширения», «Плагины». Найдите плагин «System - Panopticon Connector for Joomla 3» и убедитесь, что он включён."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Если этот плагин уже включён, пожалуйста, измените URL конечной точки ниже на URL, содержащий <code>/index.php</code>."
