PANOPTICON_SYSCONFIG_LBL_SUBHEAD_APITOKENS="API-токены"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="MCP-сервер"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="Сервер Model Context Protocol (MCP) позволяет ИИ-агентам и чат-ботам — таким как Claude Code, Claude Desktop, Codex, Cursor или VS Code — управлять Panopticon с использованием тех же возможностей, что и JSON API. Каждый запрос проходит аутентификацию с помощью API-токена Panopticon, передаваемого в заголовке Authorization в виде Bearer, и агент может видеть и делать только то, что мог бы владелец токена через API."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED="Включить MCP-сервер"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED_HELP="Если отключено (значение по умолчанию), конечная точка MCP отвечает так, как будто её не существует."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT="URL конечной точки MCP"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT_HELP="Настройте своё ИИ-приложение на использование этого URL в качестве MCP-сервера Streamable HTTP с заголовком <code>Authorization: Bearer &lt;ваш API-токен&gt;</code>."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Глобально отключённые инструменты"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="Список имён инструментов MCP через запятую, которые никогда и никому не предоставляются, независимо от пользователя, токена или группы. Это абсолютный выключатель (например, укажите здесь <code>get_sysconfig</code>, чтобы полностью исключить системную конфигурацию из MCP). Оставьте пустым, чтобы разрешить все инструменты."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Доступные инструменты"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_CHECKSUMS="Целостность файлов ядра"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL="Базовый URL источника контрольных сумм"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL_HELP="Базовый URL, который коннекторы Panopticon используют для загрузки эталонных контрольных сумм при проверке целостности файлов ядра. Оставьте пустым, чтобы использовать значение по умолчанию <code>https://getpanopticon.com/checksums</code>. Если вы размещаете собственное зеркало, оно должно иметь такую же структуру: коннектор добавляет к этому базовому URL <code>/joomla/&lt;version&gt;/sha256_squash.json.gz</code> или <code>/wordpress/&lt;version&gt;/sha256_squash.json.gz</code>. Не указывайте завершающий слэш или название CMS."
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Отключённые инструменты MCP"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="Инструменты MCP, которые участники этой группы НЕ могут использовать. Важно: доступ предоставляется, если хотя бы одна из групп пользователя разрешает инструмент. Инструмент блокируется для пользователя только тогда, когда КАЖДАЯ группа, к которой он принадлежит, его отключает. Это противоположно логике Joomla \"запрет побеждает\". Список глобально отключённых инструментов в системной конфигурации всегда имеет приоритет."
