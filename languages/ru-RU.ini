PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1_DETAIL="Используйте обычный текстовый редактор, такой как Notepad в Windows, BBEdit в Mac OS, gEdit или Kate в Linux."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP2="Вернитесь в это окно и нажмите на кнопку “Скопировать в буфер обмена”."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP3="Вернитесь в свой редактор и вставьте. Затем сохраните файл."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4="Загрузите файл <code>config.php</code> в вашу установку Panopticon."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4_DETAIL="Загрузите в папку, в которую вы устанавливаете Panopticon. Это папка, в которой находится файл Panopticon <code>index.php</code>."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP5="Вернитесь в это окно и нажмите на кнопку “Продолжить”."
