PANOPTICON_SETUP_LBL_CRON_SUBHEAD="Panopticon активно использует автоматизацию для упрощения работы. Для этого необходимо настроить CRON-задание, запускаемое каждую минуту."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_CTA="Настройте CRON-задание одним из приведённых ниже способов. Затем подождите до минуты, пока эта страница изменится."
