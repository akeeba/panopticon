PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_BENCHMARK_INFO="Через несколько секунд или минуту после настройки задания CRON на этой странице появится тест производительности. Не закрывайте эту вкладку браузера, не переключайтесь на другую вкладку/окно или приложение, не выключайте устройство и не переводите его в режим сна, не кормите вашего <em title=\"Это гремлины до того, как они стали гремлинами. Стареем вместе с устаревшей отсылкой к поп-культуре?\">могваи</em> после полуночи. Всё просто, правда?"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_YOU_CAN_COME_BACK_LATER="Если вам нужно завершить настройку CRON-задания позже — не беспокойтесь! Закройте вкладку браузера. В следующий раз при обращении к установке Panopticon вы попадёте на эту страницу."
