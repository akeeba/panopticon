PANOPTICON_SITES_LBL_TROUBLESHOOT_HEAD="Información de solución de problemas"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_HEAD="La aplicación API de Joomla! está bloqueada (error HTTP 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS="Algo en su servidor, como la configuración del servidor controlada por su proveedor de alojamiento o por un archivo de configuración local, está bloqueando las solicitudes a la API de Joomla!."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS_J3="Algo en su servidor, como la configuración del servidor controlada por su proveedor de alojamiento o por un archivo de configuración local, está bloqueando las solicitudes al plugin del conector para Joomla! 3."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_TOCHECK="Cosas que comprobar:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1="¿Su proveedor de alojamiento, o su archivo de configuración del servidor (p.ej. <code>.htaccess</code>), bloquea el acceso a determinadas rutas URL?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1_J3="¿Su proveedor de alojamiento, o su archivo de configuración del servidor (p.ej. <code>.htaccess</code>), bloquea el acceso a determinadas rutas URL?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2="¿Su proveedor de alojamiento tiene una solución de protección a nivel de servidor (como mod_security de Apache) que puede estar bloqueando solicitudes de API?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="¿Su proveedor de alojamiento tiene una solución de protección a nivel de servidor (como mod_security de Apache) que puede estar bloqueando solicitudes de API?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="¿Tiene un plugin de seguridad, SEO u otro similar que pueda estar bloqueando el acceso a la API?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="La respuesta de la aplicación API de Joomla! incluye salida que no es de la API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="La respuesta del plugin de la API incluye salida que no es de la API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="La respuesta de la API está precedida y/o seguida por otro contenido de texto como mensajes de error de PHP o salida de depuración."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Asegúrese de que \"Informe de errores\" esté configurado como Ninguno y \"Depurar sitio\" esté configurado como No en su sitio Joomla!."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Si eso no es suficiente, es posible que un plugin de terceros esté causando un error que produzca salida adicional. Deshabilite los plugins de terceros temporalmente para diagnosticar el problema."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="La aplicación API de Joomla! respondió con un código de estado HTTP inesperado (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="El plugin de la API respondió con un código de estado HTTP inesperado (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="El código de estado HTTP %s significa que ha habido un error del servidor. Compruebe si hay errores en los registros del servidor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="El código de estado HTTP %s significa que ha habido un error del servidor. Compruebe si hay errores en los registros del servidor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="El código de estado HTTP 400 generalmente significa que solo se puede acceder a su sitio desde una IP o rango de IPs específico, y la IP de Panopticon está bloqueada."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Si está usando Admin Tools Professional, vaya al backend de su sitio y compruebe la lista de bloqueo de IP."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Si no es ese el caso, contacte a su proveedor de alojamiento."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! considera que su token de API es incorrecto, está corrupto o no puede ser validado"
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Asegúrese de que el token de API que está usando pertenece a una cuenta de usuario que forma parte del grupo de Superusuarios."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Asegúrese de que los plugins \"Autenticación de API - Token de Joomla de servicios web\" y \"Servicios web - Panopticon\" estén habilitados."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Asegúrese de que el plugin \"Sistema - Conector Panopticon para Joomla 3\" esté habilitado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="También es posible que algo en su servidor, o un plugin en su sitio, esté modificando la solicitud que enviamos, lo que hace que la autenticación falle."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Por favor, revise sus plugins de Joomla! instalados. Cabe señalar que Admin Tools Professional no bloquea la API de Joomla."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="El código de estado HTTP 406 (No aceptable) significa que Joomla! no ve nuestra cabecera HTTP de aceptación. Esto puede ser causado por reglas mod_rewrite o un WAF."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Por favor, compruebe que no haya plugins de <code>sistema</code> o <code>webservices</code> que puedan estar interfiriendo con la solicitud."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Si eso no ayuda, contacte a su proveedor de alojamiento y pídales que comprueben si la cabecera Accept está siendo modificada o eliminada."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="Lo más probable es que un plugin de <code>sistema</code> o <code>webservices</code> en su sitio haya modificado la solicitud que enviamos, lo que resultó en una respuesta inesperada."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! considera que su token de API es incorrecto, está corrupto o no puede ser validado"
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Asegúrese de que el token de API que está usando pertenece a una cuenta de usuario que forma parte del grupo de Superusuarios."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Asegúrese de que los plugins \"Autenticación de API - Token de Joomla de servicios web\" y \"Servicios web - Panopticon\" estén habilitados."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Asegúrese de que el plugin \"Sistema - Conector Panopticon para Joomla 3\" esté habilitado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="También es posible que algo en su servidor, o un plugin en su sitio, esté modificando la solicitud que enviamos, lo que hace que la autenticación falle."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Por favor, revise sus plugins de Joomla! instalados. Cabe señalar que Admin Tools Professional no bloquea la API de Joomla."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Ha habido un error de comunicación con su sitio."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="La biblioteca de comunicación usada por PHP (cURL) ha reportado el siguiente error:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Ha habido un error de comunicación con su sitio."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="La biblioteca de comunicación usada por Panopticon (<a href=\"https://github.com/guzzle/guzzle\" target=\"_blank\">Guzzle</a>) ha reportado un error inesperado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Esta es una condición inesperada que puede indicar un error de comunicación que no hemos anticipado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="El nombre de host de su sitio (<span class=\"font-monospace\">%s</span>) no puede resolverse a una dirección IP."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK="Por favor, compruebe lo siguiente:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="¿Ha escrito la URL correctamente? Compruebe cuidadosamente, los errores tipográficos son fáciles de cometer."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="¿Ha comprado recientemente el dominio, asignado el dominio a un servidor, o transferido el dominio? Los cambios de DNS pueden tardar hasta 48 horas en propagarse."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Si el dominio de su sitio resuelve a una dirección IPv6 pero no a una dirección IPv4, puede que su servidor no admita IPv6."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_HEAD="El Conector de Akeeba Panopticon no está habilitado en su sitio"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_BLAH="Su sitio Joomla! necesita tener el Conector de Akeeba Panopticon instalado y habilitado para que Panopticon pueda comunicarse con él."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK="Por favor, compruebe lo siguiente:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK1="¿Ha instalado el paquete del Conector de Akeeba Panopticon en su sitio?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK2="Vaya a Sistema, Gestionar, Extensiones. ¿Está el <em>componente</em> \"Akeeba Panopticon Connector\" habilitado?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK3="Vaya a Sistema, Gestionar, Extensiones. ¿Está el <em>paquete</em> \"Akeeba Panopticon Connector\" habilitado?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK4="Vaya a Sistema, Gestionar, Plugins. ¿Está el plugin \"Servicios web - Panopticon\" habilitado?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_HEAD="El plugin \"Sistema - Conector Panopticon para Joomla 3\" no está habilitado en su sitio"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_BLAH="Su sitio Joomla! necesita tener el plugin \"Sistema - Conector Panopticon para Joomla 3\" instalado y habilitado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Está usando un certificado SSL/TLS autofirmado"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Está usando HTTPS para acceder a su sitio, pero el certificado SSL/TLS que está usando es autofirmado y no puede ser verificado por Panopticon."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Puede resolver este problema realizando <em>una</em> de las siguientes acciones:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Use HTTP simple. Esta es la opción menos segura, por lo que no se recomienda."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Instale un certificado SSL/TLS firmado por una Autoridad Certificadora (CA) comercial y conocida."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Si está en una intranet, extranet, o necesita mantener su propia Autoridad Certificadora, puede añadir su CA al almacén de certificados de confianza del servidor de Panopticon."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="El certificado SSL/TLS de su sitio tiene un problema"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Está usando HTTPS para acceder a su sitio, pero el certificado SSL/TLS que está usando tiene un problema que impide que Panopticon verifique la conexión."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Por favor, compruebe lo siguiente:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="¿Es el certificado SSL/TLS para el nombre de dominio correcto? Si está usando el dominio predeterminado de su servidor, puede que el certificado no coincida."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="¿Ha expirado el certificado SSL/TLS? En ese caso necesita renovarlo. Tenga en cuenta que muchos servicios de renovación automática pueden fallar silenciosamente."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="¿Ha sido revocado el certificado SSL/TLS? A veces las Autoridades Certificadoras revocan certificados por motivos de seguridad."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="¿Es posible que su servidor sirva el certificado SSL/TLS incorrecto? Esto puede ocurrir si tiene varios certificados instalados y el servidor sirve el incorrecto."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="El plugin \"Servicios web - Instalador\" está desactivado en su sitio"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH1="Panopticon usa los servicios de la aplicación API de Joomla! proporcionados por el plugin \"Servicios web - Instalador\". Este plugin está desactivado actualmente."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH2="Por favor, vaya al backend de su sitio y haga clic en Sistema, Gestionar, Extensiones. Busque el plugin \"Servicios web - Instalador\" y actívelo."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon usa su propio plugin, \"Sistema - Conector Panopticon para Joomla 3\", para comunicarse con su sitio Joomla! 3."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Por favor, vaya al backend de su sitio y haga clic en Extensiones, Plugins. Busque el plugin \"Sistema - Conector Panopticon para Joomla 3\" y actívelo."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Si ya ha activado este plugin, cambie la URL de punto de acceso a continuación."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_HEAD="Su sitio parece estar protegido con contraseña a nivel del servidor web"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH1="Su sitio respondió con un código de estado HTTP 401 No autorizado al intentar acceder a él sin credenciales de autenticación."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH2="Por favor, elimine la protección con contraseña."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3="Tenga en cuenta que la protección con contraseña puede haberse aplicado solo a la carpeta de administración de su sitio. En ese caso, puede usar las credenciales de autenticación en la configuración del sitio."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3_J3="Tenga en cuenta que la protección con contraseña se ha aplicado a la carpeta raíz de su sitio. En ese caso, puede usar las credenciales de autenticación en la configuración del sitio."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_HEAD="Vaya. Algo está completamente roto aquí…"
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Normalmente podemos detectar la naturaleza del error de conexión y proporcionar información útil para solucionarlo."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="En cambio, recibimos un error que deberíamos poder proporcionar información de solución de problemas, pero no podemos hacerlo. Esto es completamente inesperado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH3="Por favor, elimine todos los archivos y carpetas dentro de la carpeta <code>tmp</code> de Akeeba Panopticon e inténtelo de nuevo."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_INFO="Información de solución de problemas"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_STATUS="Estado HTTP"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_BODY="Cuerpo HTTP"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADERS="Cabeceras HTTP"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADER_NO_STRING="(el contenido de la cabecera no es una cadena)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADER_NO_PRINTABLE="(el contenido de la cabecera no es un array ni una cadena)"
