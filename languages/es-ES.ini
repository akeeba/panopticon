PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_400="El código de estado HTTP 400 generalmente significa que solo se puede acceder a su sitio desde una IP o rango de IPs específico, y la IP de Panopticon está bloqueada."
