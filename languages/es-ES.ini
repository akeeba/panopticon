PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME="Hora del día para instalar actualizaciones de extensiones (Hora:Minuto)"
PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME_HELP="La hora expresada en la zona horaria %s. Si las actualizaciones se encuentran <em>después</em> de esta hora del día, la instalación de la actualización se realizará el día natural siguiente. Evite usar la hora de cambio de horario de verano (generalmente entre las 2 a.m. y las 4 a.m.); de lo contrario, la programación de actualizaciones actuará de una manera que puede percibir como \"rara\" o \"incorrecta\" si se encuentra una actualización en el día del cambio de horario de verano. Las actualizaciones iniciadas manualmente siempre se ejecutan de inmediato, independientemente de esta configuración."
PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_WHEN="Cuándo se deben instalar las actualizaciones"
PANOPTICON_SITES_OPT_CONFIG_EXTENSIONS_UPDATE_WHEN_IMMEDIATELY="Inmediatamente"
PANOPTICON_SITES_OPT_CONFIG_EXTENSIONS_UPDATE_WHEN_TIME="A una hora del día"
PANOPTICON_SYSCONFIG_LBL_FIELD_API_TOKENS_PER_USER_MAX="Máximo de tokens por usuario"
PANOPTICON_SYSCONFIG_LBL_FIELD_API_TOKENS_PER_USER_MAX_HELP="El número máximo de tokens de API activos y no vencidos que un usuario puede tener. Los grupos de usuarios pueden reemplazar este valor por grupo. Establezca en 0 para denegar el acceso a la API a todos los usuarios de forma predeterminada (los grupos individuales pueden aún conceder acceso mediante su propia configuración)."
PANOPTICON_SYSCONFIG_LBL_FIELD_LOG_ATTACHMENT_GROUPS="Adjuntar archivo de registro a estos grupos"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOG_ATTACHMENT_GROUPS_HELP="Seleccione qué grupos de usuarios reciben el archivo de registro de la tarea como adjunto de correo electrónico cuando falla una actualización del núcleo o de una extensión. Deje en blanco para enviar el adjunto a todos los destinatarios de notificaciones."
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_APITOKENS="Tokens de API"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="Servidor MCP"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="El servidor del Protocolo de Contexto de Modelo (MCP) permite que agentes de IA y chatbots —como Claude Code, Claude Desktop, Codex, Cursor o VS Code— controlen Panopticon usando las mismas capacidades que la API JSON. Cada solicitud se autentica con un token de API de Panopticon enviado como cabecera de autorización Bearer, y un agente solo puede ver y hacer lo que el propietario del token podría hacer a través de la API."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED="Activar el servidor MCP"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED_HELP="Cuando está desactivado (opción predeterminada), el punto de acceso MCP responde como si no existiera."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT="URL del punto de acceso MCP"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT_HELP="Configure su herramienta de IA para usar esta URL como servidor MCP de tipo Streamable HTTP, con una cabecera <code>Authorization: Bearer &lt;su token de API&gt;</code>."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Herramientas desactivadas globalmente"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="Una lista de nombres de herramientas MCP, separados por comas, que nunca se exponen a nadie, sin importar el usuario, el token o el grupo. Este es el interruptor de desactivación absoluto (por ejemplo, indique aquí <code>get_sysconfig</code> para mantener la configuración del sistema completamente fuera de MCP). Deje en blanco para permitir todas las herramientas."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Herramientas disponibles"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_CHECKSUMS="Integridad de archivos del núcleo"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL="URL base de origen de las sumas de comprobación"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL_HELP="URL base que usan los conectores de Panopticon para descargar las sumas de comprobación de referencia para la verificación de integridad de archivos del núcleo. Deje en blanco para usar el valor predeterminado <code>https://getpanopticon.com/checksums</code>. Si aloja su propio espejo, debe servir la misma estructura: el conector añade <code>/joomla/&lt;versión&gt;/sha256_squash.json.gz</code> o <code>/wordpress/&lt;versión&gt;/sha256_squash.json.gz</code> a esta URL base. No incluya una barra final ni el nombre del CMS."
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Herramientas MCP desactivadas"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="Herramientas MCP que los miembros de este grupo NO pueden usar. Importante: el acceso se concede si CUALQUIERA de los grupos de un usuario permite una herramienta. Una herramienta solo se bloquea para un usuario cuando TODOS los grupos a los que pertenece la desactivan. Esto es lo contrario de la lógica \"deny wins\" (prevalece la denegación) de Joomla. La lista de herramientas desactivadas globalmente en la Configuración del sistema siempre tiene prioridad."
