PANOPTICON_SETUP_LBL_FS_DRIVER="Controlador del sistema de archivos"
PANOPTICON_SETUP_LBL_FS_DRIVER_FILE="Escritura directa de archivos"
PANOPTICON_SETUP_LBL_FS_DRIVER_FTP="FTP - Protocolo de Transferencia de Archivos"
PANOPTICON_SETUP_LBL_FS_DRIVER_HELP="En algunos entornos de hosting compartido necesitas usar FTP o SFTP para poder escribir en los archivos de tu sitio."
PANOPTICON_SETUP_LBL_FS_DRIVER_SFTP="SFTP - Protocolo de Transferencia de Archivos Seguros (sobre SSH)"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="Directorio (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="El directorio (S)FTP para la instalación de Panopticon. En los servidores FTP, esto no es lo mismo que la ruta del sistema de archivos. Si no estás seguro, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="Nombre del host del servidor (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="El nombre del host o la dirección IP de tu servidor (S)FTP, por ejemplo, <code>ftp.example.com</code> o <code>127.0.0.1</code>. DEBES ingresar esto <em>sin</em> el prefijo <code>ftp://</code>, <code>sftp://</code> o <code>ssh://</code>. Si no estás seguro sobre esto y los otros ajustes de FTP, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Usar modo Pasivo"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Solo aplicable para FTP. Cuando se selecciona, Panopticon usará el modo Pasivo de FTP. La mayoría de los servidores FTP lo requieren. Si tu proveedor requiere el modo Activo de FTP, desmarca esta casilla. Si no estás seguro, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="Contraseña (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="La contraseña que usas para conectarte a tu servidor (S)FTP. Si no estás seguro, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="Puerto del servidor (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="El número de puerto al que escucha tu servidor (S)FTP. Normalmente es 21 para FTP y 22 para SFTP. Si no estás seguro, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="Usar SSL"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Solo aplicable para FTP, ignorado para SFTP. Cuando se selecciona, Panopticon usará FTP sobre SSL Explícito (FTP/S). Ten en cuenta que esto no debe confundirse con SFTP, que es una cosa completamente diferente."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="Nombre de usuario (S)FTP"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="El nombre de usuario que usas para conectarte a tu servidor (S)FTP. Si no estás seguro, pregunta a tu proveedor de hosting."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript está deshabilitado"
PANOPTICON_SETUP_LBL_NOSCRIPT_EXPLAIN="Necesitas habilitar JavaScript en tu navegador para usar Panopticon."
PANOPTICON_SETUP_LBL_BROKEN_JS_HEAD="El JavaScript requerido no se carga"
PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="Los archivos JavaScript de Panopticon no se están cargando correctamente. Asegúrate de que tu instalación no tenga archivos faltantes, verifica los permisos y limpia la caché de tu navegador."
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_OK="¡Todos los sistemas en marcha!"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_OK="Tu servidor cumple con todos los requisitos."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_IMPROVE="Algunas configuraciones opcionales pueden mejorarse (ver abajo)."
