PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Asegúrese de que PHP en su servidor esté configurado con <code>display_errors</code> desactivado."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Si eso no es suficiente, es posible que un plugin de terceros esté causando un error que produzca salida adicional. Deshabilite los plugins de terceros temporalmente para diagnosticar el problema."
