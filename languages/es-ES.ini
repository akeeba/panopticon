PANOPTICON_SETUP_LBL_PRECHECK_BTN_SHOW_OPTIONAL_SETTINGS="Mostrar configuraciones opcionales"
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_FAIL="Algunos requisitos no se cumplen"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_FAIL="Tu servidor no cumple con todos los requisitos mínimos."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_FAIL="Además, algunas configuraciones opcionales pueden mejorarse (ver abajo)."
PANOPTICON_SETUP_LBL_PRECHECK_CANNOT_CONTINUE="Necesitas resolver esos problemas antes de instalar Panopticon."
PANOPTICON_SETUP_BTN_RETRY_PRECHECK="Verificar de nuevo"
PANOPTICON_SETUP_BTN_IGNORE_AND_NEXT="Ignorar los errores <em>bajo tu propio riesgo</em>"
PANOPTICON_SETUP_LBL_REQUIRED="Requisitos"
PANOPTICON_SETUP_LBL_REQ_PHP_VERSION="Versión de PHP >= %s"
