PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="MCP-Server"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="Der Model-Context-Protocol-(MCP)-Server ermöglicht es KI-Agenten und Chatbots — wie Claude Code, Claude Desktop, Codex, Cursor oder VS Code — Panopticon mit denselben Funktionen wie der JSON-API zu steuern. Jede Anfrage wird mit einem Panopticon-API-Token authentifiziert, das als Bearer-Authorization-Header gesendet wird, und ein Agent kann nur das sehen und tun, wozu der Besitzer des Tokens über die API berechtigt wäre."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED="MCP-Server aktivieren"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED_HELP="Wenn deaktiviert (Standardeinstellung), antwortet der MCP-Endpunkt so, als würde er nicht existieren."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT="MCP-Endpunkt-URL"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT_HELP="Konfigurieren Sie Ihr KI-Tool so, dass es diese URL als Streamable-HTTP-MCP-Server verwendet, mit einem <code>Authorization: Bearer &lt;Ihr API-Token&gt;</code>-Header."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Global deaktivierte Werkzeuge"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="Eine durch Kommas getrennte Liste von MCP-Werkzeugnamen, die niemandem zugänglich gemacht werden, unabhängig von Benutzer, Token oder Gruppe. Dies ist der absolute Notausschalter (listen Sie hier beispielsweise <code>get_sysconfig</code> auf, um die Systemkonfiguration vollständig aus MCP herauszuhalten). Leer lassen, um alle Werkzeuge zuzulassen."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Verfügbare Werkzeuge"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Deaktivierte MCP-Werkzeuge"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="MCP-Werkzeuge, die Mitglieder dieser Gruppe NICHT verwenden dürfen. Wichtig: Der Zugriff wird gewährt, wenn IRGENDEINE der Gruppen eines Benutzers ein Werkzeug erlaubt. Ein Werkzeug wird für einen Benutzer nur dann gesperrt, wenn JEDE Gruppe, der er angehört, es deaktiviert. Dies ist das Gegenteil der „Verbot gewinnt“-Logik von Joomla. Die Liste der global deaktivierten Werkzeuge in der Systemkonfiguration hat immer Vorrang."
