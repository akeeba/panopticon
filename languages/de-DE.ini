PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTFOUND_SOLUTION="Nach der Installation von Akeeba Backup Professional klicken Sie bitte auf die Schaltfläche unten, um Panopticon mitzuteilen, dass es die Akeeba Backup-Installation auf Ihrer Website erneut verknüpfen soll."
