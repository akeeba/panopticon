PANOPTICON_SYSCONFIG_LBL_FIELD_CACHING_REDIS_DSN_HELP="Wie eine Verbindung zu Ihrem Redis-Server hergestellt wird. Bitte lesen Sie <a href=\"https://symfony.com/doc/current/components/cache/adapters/redis_adapter.html#configure-the-connection\" target=\"_blank\">die Symfony Cache Redis-Adapter-Dokumentation</a> für Informationen zur Syntax."
PANOPTICON_SYSCONFIG_LBL_FIELD_CACHING_MEMCACHED_DSN="Memcached-Datenquellenname (DSN)"
PANOPTICON_SYSCONFIG_LBL_FIELD_CACHING_MEMCACHED_DSN_HELP="Wie eine Verbindung zu Ihrem Memcached-Server hergestellt wird. Bitte lesen Sie <a href=\"https://symfony.com/doc/current/components/cache/adapters/memcached_adapter.html#configure-the-connection\" target=\"_blank\">die Symfony Cache Memcached-Adapter-Dokumentation</a> für Informationen zur Syntax."
PANOPTICON_SYSCONFIG_LBL_FIELD_LOG_LEVEL="Protokollierungsebene"
