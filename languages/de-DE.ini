PANOPTICON_SITE_LBL_PHP_LTS_HEAD="Hinweis zu Linux-Distributionen mit „Langzeitunterstützung\"
PANOPTICON_SITE_LBL_PHP_LTS_P1="Einige Linux-Distributionen, wie Red Hat Enterprise Linux und Ubuntu Server, bieten möglicherweise „Langzeitunterstützung\" für bestimmte PHP-Versionen nach deren End-of-Life-Datum an."
PANOPTICON_SITE_LBL_PHP_LTS_P2="Bitte beachten Sie, dass dafür in der Regel eine zusätzliche, oft teure Pro-Server-Lizenz erforderlich ist. Darüber hinaus können einige Sicherheitskorrekturen, die Änderungen an der internen PHP-Architektur erfordern, nicht auf diese alten PHP-Versionen angewendet werden. Schließlich werden funktionale Probleme („Bugs\") und die Kompatibilität mit neueren Internetstandards und Best Practices <em>niemals</em> behoben."
PANOPTICON_SITE_LBL_PHP_LTS_P3="Obwohl diese Langzeitunterstützungs-Distributionen für bestimmte Anwendungsfälle nützlich sind – wie Unternehmens-Intranets und Extranets –, sind sie letztendlich nicht für den langfristigen Einsatz auf einer öffentlich zugänglichen Website geeignet. Wir empfehlen dringend, eine der aktiv unterstützten PHP-Versionen zu installieren und zu verwenden (derzeit PHP %s und %s)."
