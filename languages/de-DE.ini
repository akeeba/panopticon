PANOPTICON_SETUP_LBL_CRON_BENCHMARK_DO_NOT_CLOSE="Bitte wechseln Sie nicht die Tabs oder Fenster und stellen Sie sicher, dass Ihr Gerät sich nicht ausschaltet oder in den Ruhemodus wechselt. Der Benchmark dauert bis zu 3 Minuten."
