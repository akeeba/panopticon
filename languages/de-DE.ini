PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT="Was kommt als Nächstes?"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_BENCHMARK_INFO="Einige Sekunden bis zu einer Minute nachdem Sie Ihren CRON-Auftrag eingerichtet haben, wird sich diese Seite zu einem Benchmark ändern. Schließen Sie diesen Browser-Tab nicht, wechseln Sie nicht zu einem anderen Browser-Tab/Fenster oder einer anderen Anwendung, schalten Sie Ihr Gerät nicht aus und lassen Sie es nicht in den Ruhemodus wechseln, füttern Sie Ihren <em title=\\"Das sind die Gremlins, bevor sie zu Gremlins werden. Verraten wir damit unser Alter mit diesem veralteten Popkulturreferenz?\\">Mogwai</em> nicht nach Mitternacht. Ziemlich einfach, oder?"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_YOU_CAN_COME_BACK_LATER="Wenn Sie die Einrichtung Ihres CRON-Auftrags später abschließen müssen – kein Problem! Schließen Sie diesen Browser-Tab. Wenn Sie das nächste Mal zu Ihrer Panopticon-Installation zurückkehren, werden Sie zu dieser Seite weitergeleitet."
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_EXPERT_USER="Wenn Sie ein erfahrener Benutzer sind – oder sich nur umsehen – können Sie diesen Schritt überspringen und CRON-Aufträge später einrichten."
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_SKIP_CRON="CRON-Konfiguration überspringen (nicht empfohlen)."
