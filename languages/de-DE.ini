PANOPTICON_SITES_LBL_GROUPS_INFO="Dieser Abschnitt ist nur für Mehrbenutzerinstallationen mit unterschiedlichem Zugriff pro Website relevant. Weitere Informationen finden Sie in der Dokumentation. Wenn Sie eine Einzelbenutzerinstallation verwalten oder alle Benutzer gleichen Zugriff auf alle Websites haben, können Sie diesen Abschnitt ignorieren."
