PANOPTICON_SETUP_FINISH_MAXEXEC_TOOLOW_CAUTION="Wir empfehlen <strong>nicht</strong>, diese Konfiguration zur Automatisierung von Joomla&reg;-Upgrades, Erweiterungsupdates oder Sicherungen zu verwenden. Sie können Panopticon weiterhin zur Überwachung Ihrer Websites verwenden."
