PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_FAILURE_WINDOW="Zeitfenster für Anmeldefehler"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_LOCKOUT="IP-Sperrdauer"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_LOCKOUT_EXTEND="IP-Sperrdauer verlängern"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_LOCKOUT_EXTEND_HELP="Wenn aktiviert, wird bei jedem Zugriffsversuch einer gesperrten IP-Adresse auf Akeeba Panopticon die Sperrdauer zurückgesetzt, d.h. die Sperre wird um weitere „IP-Sperrdauer\"-Sekunden verlängert. Dies bestraft einige Bots, geht jedoch auf Kosten eines verlangsamten legitimen Zugriffs auf Akeeba Panopticon."
PANOPTICON_SYSCONFIG_LBL_FIELD_PASSWORD_HIBP="Kompromittierte Passwörter verbieten"
PANOPTICON_SYSCONFIG_LBL_FIELD_PASSWORD_HIBP_HELP="Verhindert, dass Benutzer Passwörter verwenden, die in Online-Passwortleaks gefunden wurden. Betrieben durch den Drittanbieterdienst <a href='https://haveibeenpwned.com/' _target='blank'>Have I Been Pwned</a>."
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION="Anonyme Nutzungsstatistiken sammeln"
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION_HELP="Akeeba Panopticon sammelt anonyme Informationen über die Versionen von Panopticon, PHP und dem Datenbankserver. Diese aggregierten Informationen ermöglichen es Akeeba, zu bestimmen, welche Versionen von PHP und Datenbankservern in zukünftigen Versionen unterstützt werden sollen."
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION_HELP_LEARN_MORE="Details der gesammelten Informationen."
