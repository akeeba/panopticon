PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION="Beschreibung"
PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION_HELP="Sie können Akeeba Backup-Variablen wie <code>[DATE]</code>, <code>[SITE]</code> usw. verwenden. Diese werden von Akeeba Backup zum Sicherungszeitpunkt ersetzt. Sie können auch die Variablen <code>{DATE_FORMAT_LC}</code>,<code>{DATE_FORMAT_LC1}</code>…<code>{DATE_FORMAT_LC7}</code> verwenden, die von Panopticon durch eine formatierte Version der Sicherungszeit ersetzt werden. Bitte beachten Sie, dass die Panopticon-Variablen um einige Sekunden von den Akeeba Backup-Variablen abweichen können, da sie auf dem Server verarbeitet werden, auf dem Panopticon läuft, und nicht auf dem Server der Website, auf dem Akeeba Backup ausgeführt wird."
