PANOPTICON_MAIN_SITES_LBL_SSLTLS_ERR_DATE_INVALID="Das SSL/TLS-Zertifikat verfügt über keine gültigen Gültigkeitsdaten, sodass nicht festgestellt werden kann, ob es gültig ist."
PANOPTICON_MAIN_SITES_LBL_SSLTLS_TOOSOON_HEAD="Ungültig (zu früh)"
PANOPTICON_MAIN_SITES_LBL_SSLTLS_TOOSOON="Das SSL/TLS-Zertifikat hat ein Gültigkeitsdatum in der Zukunft. Browser melden es als ungültig, da es noch nicht verwendet werden soll."
PANOPTICON_MAIN_SITES_LBL_SSLTLS_EXPIRING_HEAD="Unmittelbar bevorstehender Ablauf"
PANOPTICON_MAIN_SITES_LBL_SSLTLS_EXPIRING="Das SSL/TLS-Zertifikat läuft bald ab. Sie müssen es durch ein neues ersetzen, um Probleme mit Ihrer Website zu vermeiden."
PANOPTICON_MAIN_SITES_LBL_SSLTLS_EXPIRED_HEAD="Abgelaufen"
PANOPTICON_MAIN_SITES_LBL_SSLTLS_EXPIRED="Das SSL/TLS-Zertifikat hat ein Ablaufdatum in der Vergangenheit. Browser melden es als ungültig, da es nicht mehr verwendet werden soll."
PANOPTICON_MAIN_SITES_LBL_SSLTLS_INVALID_CN_HEAD="Ungültige Domain"
PANOPTICON_MAIN_SITES_LBL_SSLTLS_INVALID_CN="Das SSL/TLS-Zertifikat wurde für einen anderen Domainnamen ausgestellt als den, für den Sie es verwenden. Browser melden es als ungültig."
PANOPTICON_MAIN_SITES_LBL_SSLTLS_INVALID_SIG_HEAD="Ungültiges oder selbstsigniertes Zertifikat"
PANOPTICON_MAIN_SITES_LBL_SSLTLS_INVALID_SIG="Die Signatur Ihres SSL/TLS-Zertifikats kann nicht gegen die dem Server bekannten Zertifizierungsstellen verifiziert werden. Dies bedeutet in der Regel, dass Sie ein selbstsigniertes Zertifikat verwenden, das von Browsern abgelehnt wird."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO="Domain-Informationen"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_ERR_DATE_INVALID_HEAD="Unbekannte Gültigkeit"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_ERR_DATE_INVALID="Das Ablaufdatum der Domain konnte nicht abgerufen werden. Entweder erscheint der Domainname nicht in der WHOIS-Datenbank, oder Sie verwenden einen Domainnamen, der nur lokal auflöst."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_TOOSOON_HEAD="Ungültig (zu früh)"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_TOOSOON="Der Domain-Registrar gibt an, dass der Domainname in einem zukünftigen Datum registriert wurde. Das scheint nicht korrekt zu sein."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_EXPIRING_HEAD="Unmittelbar bevorstehender Ablauf"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_EXPIRING="Der Domainname läuft bald ab. Sie müssen ihn bei Ihrem Registrar verlängern, um ihn nicht zu verlieren."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_EXPIRED_HEAD="Abgelaufen"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_EXPIRED="Der Domainname ist abgelaufen. Möglicherweise können Sie die Domain noch aufgrund der Kulanzfrist Ihres Registrars aufrufen, aber <strong>Sie müssen diesen Domainnamen sofort bei Ihrem Registrar verlängern</strong>, um ihn nicht zu verlieren."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_NONAMESERVERS_HEAD="Fehlende Nameserver"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_NONAMESERVERS="In der WHOIS-Datenbank sind keine Nameserver eingetragen. Eine Website ohne gültige Nameserver ist im Internet nicht erreichbar. Wenn Sie der Domain kürzlich Nameserver zugewiesen haben, keine Panik – es kann bis zu 5 Tage dauern, bis diese Informationen verbreitet sind."
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_TABLE_CAPTION="Tabelle mit Domain-Informationen"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_DOMAIN="Domain"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_REGISTERED="Registriert am"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_EXPIRES="Läuft ab am"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_REGISTRAR="Registrar"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_NAMESERVERS="Nameserver"
PANOPTICON_MAIN_SITES_LBL_WHOISINFO_CACHING_NOTICE="Domain-Registrierungsinformationen können in den WHOIS-Servern für einen Zeitraum von einigen Stunden bis zu einigen Tagen zwischengespeichert sein. Daher können die obigen Informationen veraltet sein."
PANOPTICON_SITES_FIELD_CONFIG_UPTIME_TITLE="Einfaches Website-Verfügbarkeitsmonitoring"
PANOPTICON_SITES_FIELD_CONFIG_UPTIME_NOTE="Dies ist ein <em>sehr einfaches</em> Verfügbarkeitsmonitoring durch Panopticon selbst. Es benachrichtigt Sie nur per E-Mail, wenn Ihre Website nicht erreichbar ist und wenn sie wieder erreichbar ist. Es lässt sich nicht mit Drittanbieterdiensten integrieren, bietet keine Historie und keine öffentliche Verfügbarkeitsseite. Wir empfehlen dringend, einen Drittanbieterdienst oder eine entsprechende Software zum Überwachen der Verfügbarkeit Ihrer Websites zu verwenden, anstatt diese Funktion zu nutzen."
