PANOPTICON_SITES_LBL_INSTRUCTIONS_HEAD="Ihre Website verbinden"
PANOPTICON_SITES_LBL_INSTRUCTIONS_BODY="Installieren Sie zunächst den Akeeba Panopticon Connector auf Ihrer Website. Rufen Sie dann die Verbindungsinformationen ab und fügen Sie sie unten ein. So gehen Sie je nach CMS vor:"
PANOPTICON_SITES_LBL_INSTRUCTIONS_JOOMLA4ORLATER="<strong>Joomla! 4 oder höher</strong>: Gehen Sie in das Backend Ihrer Website und klicken Sie auf Komponenten, Akeeba Panopticon Connector, um Ihre Verbindungsinformationen zu finden."
PANOPTICON_SITES_LBL_INSTRUCTIONS_JOOMLA3="<strong>Joomla! 3</strong>: Gehen Sie in das Backend Ihrer Website und klicken Sie auf Erweiterungen, Plugins. Klicken Sie auf System – Panopticon Connector für Joomla 3."
PANOPTICON_SITES_LBL_INSTRUCTIONS_WORDPRESS="<strong>WordPress</strong>: Gehen Sie in den wp-admin-Bereich Ihrer Website und klicken Sie auf Werkzeuge, Panopticon."
PANOPTICON_SITES_LBL_INSTRUCTIONS_DOWNLOAD_HERE="Sie können das Connector-Installationspaket von den folgenden Speicherorten herunterladen."
