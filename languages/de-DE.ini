PANOPTICON_SYSCONFIG_LBL_FIELD_LIVE_SITE_HELP="Die Basis-URL Ihrer Panopticon-Installation. Wird beim E-Mail-Versand aus unbeaufsichtigten Aufgaben verwendet."
PANOPTICON_SYSCONFIG_LBL_FIELD_SESSION_TIMEOUT="Sitzungszeitlimit"
PANOPTICON_SYSCONFIG_LBL_FIELD_SESSION_USE_DEFAULT_PATH="Standard-PHP-Sitzungsspeicherpfad verwenden"
PANOPTICON_SYSCONFIG_LBL_FIELD_SESSION_USE_DEFAULT_PATH_HELP="Wenn aktiviert, verwendet Panopticon den <code>session.save_path</code> aus Ihrer PHP-Konfiguration zum Speichern von PHP-Sitzungsdatendateien. Wenn deaktiviert, verwendet Panopticon den Ordner <code>tmp/session</code> unter Ihrem Web-Stammverzeichnis."
