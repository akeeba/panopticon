PANOPTICON_SYSCONFIG_LBL_FIELD_TASKS_COREUPDATE_INSTALL="Wenn eine Aktualisierung gefunden wird"
PANOPTICON_SYSCONFIG_LBL_FIELD_TASKS_COREUPDATE_INSTALL_HELP="Nichts tun: Es wird keine Aktion durchgeführt. E-Mail senden: Eine E-Mail wird gesendet, es wird nichts installiert. Patch: Nur Patch-Versionen (z.B. 1.2.<strong>3</strong> auf 1.2.<strong>4</strong>) werden installiert; andernfalls wird eine E-Mail gesendet. Minor: Nur Patch- und Minor-Versionen (z.B. 1.<strong>2</strong>.x auf 1.<strong>3</strong>.x) werden installiert; andernfalls wird eine E-Mail gesendet. Beliebige Version: Installiert alle Aktualisierungen, auch wenn sich die Hauptversion ändert (z.B. <strong>1</strong>.x auf <strong>2</strong>.x)."
