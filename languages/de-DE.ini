PANOPTICON_SYSCONFIG_NO_EXTENSIONS_BODY="Richten Sie Ihre Websites ein und warten Sie, bis deren Erweiterungs-Aktualisierungsinformationen aktualisiert wurden – bis zu 15 Minuten später. Danach werden hier alle installierten Erweiterungen angezeigt."
