PANOPTICON_SITES_LBL_ADMIN_PASSWORD_HEAD="Passwortschutz für das Administrator-Verzeichnis"
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_INFO_1="Wenn das Verzeichnis <code>administrator</code> Ihrer Website passwortgeschützt ist, geben Sie bitte den Benutzernamen und das Passwort für diesen Passwortschutz ein. Andernfalls schlagen Joomla!&reg;-Aktualisierungen mit einem Fehler fehl, der „401 Unauthorized\" erwähnt."
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_INFO_2="Bitte beachten Sie, dass hier <em>NICHT</em> nach Ihrem Joomla!-Benutzernamen und -Passwort gefragt wird."
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_HEAD="Ist das notwendig?"
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_INFO_1="Dies ist nur erforderlich, wenn Sie Ihr Verzeichnis <code>administrator</code> mit einer der folgenden Methoden passwortgeschützt haben:"
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_INFO_2="Sie haben eine Drittanbietererweiterung verwendet, z. B. die Funktion „Administratorbereich schützen\" von Admin Tools."
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_INFO_3="Sie haben die Verzeichnispasswortschutzfunktion Ihres Hosting-Kontrollpanels verwendet, sofern diese verfügbar ist."
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_INFO_4="Sie haben dies manuell eingerichtet, z. B. mit einer <code>.htaccess</code>- und <code>.htpasswd</code>-Datei beim Apache-Webserver."
PANOPTICON_SITES_LBL_ADMIN_PASSWORD_NEEDED_INFO_5="Wenn Sie nichts davon getan haben oder nicht wissen, was das bedeutet, lassen Sie die folgenden Felder leer."
