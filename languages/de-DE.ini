PANOPTICON_SETUP_LBL_WELCOME_HERO_TEXT="Sie können Panopticon verwenden, um Ihre Joomla!&reg; Websites zu überwachen. Zunächst müssen wir jedoch sicherstellen, dass Ihr Server die Mindestanforderungen erfüllt."
PANOPTICON_SETUP_BTN_LETS_GO="Los geht's!"
PANOPTICON_SETUP_SESSION_LBL_WARNING_HEADER="Einen neuen Sitzungsspeicherpfad erstellen"
PANOPTICON_SETUP_SESSION_LBL_WARNING_BODY="Der in PHP konfigurierte Sitzungsschreibpfad ist nicht beschreibbar, wodurch eine Anmeldung unmöglich ist. Um dieses Problem zu beheben, wird Panopticon versuchen, einen Sitzungsspeicherpfad im Verzeichnis <code>%s</code> zu erstellen. Damit dies möglich ist, müssen Sie die FTP- oder SFTP-Verbindungsdaten zum Stammverzeichnis Ihrer Website eingeben. Wenn Sie sich bei diesen Einstellungen nicht sicher sind, wenden Sie sich bitte an Ihren Hosting-Anbieter."
PANOPTICON_SETUP_SESSION_LBL_ERROR_HEADER="Beim Versuch, einen Sitzungsspeicherpfad zu erstellen, ist ein Fehler aufgetreten"
PANOPTICON_SETUP_LBL_FS_DRIVER_SESSION="Verbindungsmethode"
PANOPTICON_SETUP_BTN_MAKE_SESSION_FOLDER="Einen Sitzungspfad erstellen"
PANOPTICON_SETUP_BTN_SESSION_FIXED_IT="Ich habe es selbst behoben; erneut prüfen"
PANOPTICON_SETUP_LBL_FS_DRIVER="Dateisystem-Treiber"
PANOPTICON_SETUP_LBL_FS_DRIVER_FILE="Direkte Dateizugriffe"
PANOPTICON_SETUP_LBL_FS_DRIVER_FTP="FTP - File Transfer Protocol"
PANOPTICON_SETUP_LBL_FS_DRIVER_HELP="In einigen Shared-Hosting-Umgebungen müssen Sie FTP oder SFTP verwenden, um Dateien Ihrer Website schreiben zu können."
PANOPTICON_SETUP_LBL_FS_DRIVER_SFTP="SFTP - Secure File Transfer Protocol (über SSH)"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="(S)FTP-Verzeichnis"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="Das (S)FTP-Verzeichnis zur Panopticon-Installation. Auf FTP-Servern ist dies nicht dasselbe wie der Dateisystempfad. Wenn Sie unsicher sind, fragen Sie Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="(S)FTP-Server-Hostname"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="Der Hostname oder die IP-Adresse Ihres (S)FTP-Servers, z. B. <code>ftp.example.com</code> oder <code>127.0.0.1</code>. Sie MÜSSEN dies <em>ohne</em> das Präfix <code>ftp://</code>, <code>sftp://</code> oder <code>ssh://</code> eingeben. Wenn Sie bei dieser und den anderen FTP-Einstellungen unsicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Passivmodus verwenden"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Gilt nur für FTP. Wenn ausgewählt, verwendet Panopticon den FTP-Passivmodus. Die meisten FTP-Server erfordern diesen. Wenn Ihr Hosting-Anbieter den FTP-Aktivmodus erfordert, deaktivieren Sie dieses Kontrollkästchen. Wenn Sie unsicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="(S)FTP-Passwort"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="Das Passwort, das Sie verwenden, um sich mit Ihrem (S)FTP-Server zu verbinden. Wenn Sie unsicher sind, fragen Sie Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="(S)FTP-Server-Port"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="Die Portnummer, auf der Ihr (S)FTP-Server lauscht. In der Regel ist es 21 für FTP und 22 für SFTP. Wenn Sie unsicher sind, fragen Sie Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="SSL verwenden"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Gilt nur für FTP, wird für SFTP ignoriert. Wenn ausgewählt, verwendet Panopticon FTP über Explicit SSL (FTP/S). Bitte beachten Sie, dass dies nicht mit SFTP zu verwechseln ist, da es sich dabei um eine völlig andere Technologie handelt."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="(S)FTP-Benutzername"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="Der Benutzername, den Sie verwenden, um sich mit Ihrem (S)FTP-Server zu verbinden. Wenn Sie unsicher sind, fragen Sie Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript ist deaktiviert"
PANOPTICON_SETUP_LBL_NOSCRIPT_EXPLAIN="Sie müssen JavaScript in Ihrem Browser aktivieren, um Panopticon zu verwenden."
PANOPTICON_SETUP_LBL_BROKEN_JS_HEAD="Erforderliches JavaScript wird nicht geladen"
PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="Die JavaScript-Dateien für Panopticon werden nicht korrekt geladen. Stellen Sie sicher, dass Ihrer Installation keine Dateien fehlen, überprüfen Sie die Berechtigungen und leeren Sie den Cache Ihres Browsers."
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_OK="Alle Systeme bereit!"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_OK="Ihr Server erfüllt alle Anforderungen."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_IMPROVE="Einige optionale Einstellungen können verbessert werden (siehe unten)."
PANOPTICON_SETUP_LBL_PRECHECK_YOU_MAY_CONTINUE="Sie können mit der Installation von Panopticon fortfahren."
PANOPTICON_SETUP_LBL_PRECHECK_BTN_SHOW_OPTIONAL_SETTINGS="Optionale Einstellungen anzeigen"
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_FAIL="Einige Anforderungen sind nicht erfüllt"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_FAIL="Ihr Server erfüllt nicht alle Mindestanforderungen."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_FAIL="Außerdem können einige optionale Einstellungen verbessert werden (siehe unten)."
PANOPTICON_SETUP_LBL_PRECHECK_CANNOT_CONTINUE="Sie müssen diese Probleme beheben, bevor Sie Panopticon installieren können."
PANOPTICON_SETUP_BTN_RETRY_PRECHECK="Erneut prüfen"
PANOPTICON_SETUP_BTN_IGNORE_AND_NEXT="Fehler ignorieren <em>auf eigenes Risiko</em>"
PANOPTICON_SETUP_LBL_REQUIRED="Anforderungen"
PANOPTICON_SETUP_LBL_REQ_PHP_VERSION="PHP-Version >= %s"
PANOPTICON_SETUP_LBL_REQ_REGGLOBALS="Register Globals deaktiviert"
PANOPTICON_SETUP_LBL_REQ_XML="PHP XML-Erweiterung"
PANOPTICON_SETUP_LBL_REQ_CURL="PHP cURL-Erweiterung"
PANOPTICON_SETUP_LBL_REQ_DATABASE="PHP MySQLi- oder PDO MySQL-Erweiterung"
PANOPTICON_SETUP_LBL_REQ_MBLANGISDEFAULT="MB-Sprache ist Standard"
PANOPTICON_SETUP_LBL_REQ_MBSTRINGOVERLOAD="MB String Overload deaktiviert"
PANOPTICON_SETUP_LBL_REQ_INIPARSER="INI-Parser-Unterstützung"
PANOPTICON_SETUP_LBL_REQ_JSON="JSON-Unterstützung"
PANOPTICON_SETUP_LBL_REQ_CONFIGJSON="Konfigurationsdatei ist beschreibbar"
PANOPTICON_SETUP_LBL_RECOMMENDED="Optionale Einstellungen"
PANOPTICON_SETUP_LBL_SETTING="Einstellung"
PANOPTICON_SETUP_LBL_RECOMMENDED_VALUE="Empfohlen"
PANOPTICON_SETUP_LBL_CURRENT_SETTING="Aktuell"
PANOPTICON_SETUP_LBL_REC_DISPERRORS="Fehleranzeige"
PANOPTICON_SETUP_LBL_REC_OUTBUF="Ausgabepufferung"
PANOPTICON_SETUP_LBL_REC_SESSIONAUTO="Automatischer Sitzungsstart"
PANOPTICON_SETUP_LBL_REC_FTP="PHP FTP-Erweiterung"
PANOPTICON_SETUP_LBL_REC_SSH2="SFTP-Unterstützung"
PANOPTICON_SETUP_LBL_DATABASE_HEAD_TEXT="Panopticon benötigt eine Datenbank. Erstellen Sie zunächst eine Datenbank – und einen Datenbankbenutzer – auf Ihrem Server. Geben Sie dann die Verbindungsdaten zur Datenbank unten ein. Wenn Sie sich bei etwas nicht sicher sind, wenden Sie sich an das Unternehmen, das Ihre Website hostet."
PANOPTICON_SETUP_LBL_DATABASE_DRIVER="Datenbanktyp"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_HELP="Dies ist normalerweise MySQLi (<em>mit</em> dem abschließenden „i\")"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQL="MySQL (veralteter Treiber für MySQL – bitte vermeiden)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQLI="MySQLi (bevorzugter Treiber für MySQL)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDO="PDO"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDOMYSQL="MySQL (PDO)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLAZURE="Windows Azure SQL Database"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLITE="SQLite"
PANOPTICON_SETUP_LBL_DATABASE_HOST="Datenbank-Server-Hostname"
PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Der Hostname oder die IP-Adresse des Datenbankservers (normalerweise: localhost). Bitte beachten Sie, dass localhost und 127.0.0.1 aus MySQL-Sicht <em>sehr</em> unterschiedlich sind; möglicherweise müssen Sie beide ausprobieren, um herauszufinden, welcher mit Ihrem Datenbankserver funktioniert. Wenn Ihr Server einen nicht standardmäßigen Port verwendet, fügen Sie ihn nach dem Hostnamen mit einem Doppelpunkt als Präfix an, z. B. 127.0.0.1:1234, um einen Datenbankserver auf 127.0.0.1 zu verwenden, der auf Port 1234 lauscht."
PANOPTICON_SETUP_LBL_DATABASE_NAME="Datenbankname"
PANOPTICON_SETUP_LBL_DATABASE_NAME_HELP="Der Name Ihrer Datenbank. Die meisten Hosting-Anbieter, die cPanel, Plesk und andere wichtige Hosting-Panels verwenden, vergeben Datenbanknamen wie abcdef_benutzername, wobei abcdef Ihr Benutzername im Hosting-Kontrollpanel ist. Wenn Sie unsicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_DATABASE_PASS="Passwort"
PANOPTICON_SETUP_LBL_DATABASE_PASS_HELP="Das Passwort, das Sie verwenden, um sich mit Ihrer Datenbank zu verbinden."
PANOPTICON_SETUP_LBL_DATABASE_PREFIX="Datenbanktabellen-Namenspräfix"
PANOPTICON_SETUP_LBL_DATABASE_PREFIX_HELP="Das gemeinsame Tabellennamen-Präfix aller Datenbanktabellen, die zu dieser Panopticon-Installation gehören."
PANOPTICON_SETUP_LBL_DATABASE_USER="Benutzername"
PANOPTICON_SETUP_LBL_DATABASE_USER_HELP="Der Benutzername, den Sie verwenden, um sich mit Ihrer Datenbank zu verbinden. Die meisten Hosting-Anbieter, die cPanel, Plesk und andere wichtige Hosting-Panels verwenden, vergeben Benutzernamen wie abcdef_benutzername, wobei abcdef Ihr Benutzername im Hosting-Kontrollpanel ist. Wenn Sie unsicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION="Mit einem SSL-Zertifikat verbinden"
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION_HELP="Sollen wir uns über ein SSL-Zertifikat mit der Datenbank verbinden? Dies kann anstelle der Authentifizierung mit Benutzername und Passwort (verschlüsselte Verbindung mit Zertifikatsauthentifizierung) oder <em>zusätzlich zur</em> Authentifizierung mit Benutzername und Passwort (verschlüsselte Verbindung mit Passwortauthentifizierung) verwendet werden. Wenn Sie nicht wissen, was das bedeutet, setzen Sie diese Option auf Nein und ignorieren Sie auch die nächsten Optionen."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER="SSL/TLS-Verschlüsselungsmethoden"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER_HELP="Geben Sie eine durch Doppelpunkte getrennte Liste von Verschlüsselungsmethoden für die Verbindung mit SSL-Zertifikaten ein. Wenn das Feld leer gelassen wird, wird die Standardliste (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) verwendet (empfohlen)."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA="Zertifizierungsstellen-Datei (CA)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA_HELP="Absoluter Dateipfad zur PEM-Datei des Zertifizierungsstellen-Zertifikats (CA) Ihres Datenbankservers, z. B. <code>/home/meinbenutzer/ca.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY="Privater-Schlüssel-Datei des Datenbankbenutzers"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY_HELP="Absoluter Dateipfad zur PEM-Datei des privaten Schlüssels Ihres Datenbankbenutzers, z. B. <code>/home/meinbenutzer/meinbenutzer-key.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT="Öffentlicher-Schlüssel-Datei des Datenbankbenutzers (Zertifikat)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT_HELP="Absoluter Dateipfad zur PEM-Datei des öffentlichen Schlüssels (Zertifikats) Ihres Datenbankbenutzers, z. B. <code>/home/meinbenutzer/meinbenutzer.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT="Server-Zertifikat verifizieren"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Setzen Sie diese Option auf Ja, um das vom Server zurückgesendete Zertifikat zu verifizieren. Die Verifizierung erfolgt anhand der von Ihnen angegebenen Zertifizierungsstellen-Datei (CA). Wenn Sie Verbindungsfehler erhalten, setzen Sie diese Option auf Nein; einige Konfigurationen (insbesondere solche, die mit <code>mysql_ssl_rsa_setup</code> generiert wurden) können eine Verbindung verweigern, wenn die Zertifikatsverifizierung aktiviert ist. Wenn Sie die Verifizierung aktivieren und das CA-Dateifeld leer lassen, wird das Server-Zertifikat anhand der Ihrem Server bekannten Zertifizierungsstellen-Dateien geprüft; siehe die PHP-Optionen <code>openssl.cafile</code> und <code>openssl.capath</code>."
PANOPTICON_SETUP_DIRECTFTP_HOST_TITLE="Hostname"
PANOPTICON_SETUP_DIRECTFTP_HOST_DESCRIPTION="Der Hostname des FTP-Servers, ohne das Protokoll. Verwenden Sie nicht <s><code>ftp://example.com</code></s>; verwenden Sie stattdessen <code>example.com</code>."
PANOPTICON_SETUP_DIRECTFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTFTP_PORT_DESCRIPTION="TCP/IP-Port des FTP-Servers. Normalerweise 21. Bitte fragen Sie Ihren Hosting-Anbieter."
PANOPTICON_SETUP_DIRECTFTP_USER_TITLE="Benutzername"
PANOPTICON_SETUP_DIRECTFTP_USER_DESCRIPTION="Benutzername, Groß-/Kleinschreibung beachten."
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_TITLE="Passwort"
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_DESCRIPTION="Passwort, Groß-/Kleinschreibung beachten. Verwenden Sie am besten Passwörter, die nur aus a-z, A-Z, 0-9, Bindestrichen, Punkten, Unterstrichen und Ausrufezeichen bestehen. Andere Zeichen können den Anti-Hacking-Schutz Ihres Webservers auslösen."
PANOPTICON_SETUP_DIRECTFTP_FTPS_TITLE="FTP über SSL verwenden (FTPS)"
PANOPTICON_SETUP_DIRECTFTP_FTPS_DESCRIPTION="Verbinden Sie sich über eine SSL-verschlüsselte Verbindung mit Ihrem FTP-Server. <strong>Dies ist nicht dasselbe wie SFTP, SCP oder „Secure FTP\"</strong>. Wenn Ihr Server diese Methode nicht unterstützt, erhalten Sie Verbindungsfehler."
PANOPTICON_SETUP_DIRECTFTP_INITDIR_TITLE="Startverzeichnis"
PANOPTICON_SETUP_DIRECTFTP_INITDIR_DESCRIPTION="Der absolute FTP-Pfad zum Verzeichnis, in das die Dateien hochgeladen werden. Wenn Sie unsicher sind, verbinden Sie sich mit FileZilla mit Ihrem Server, navigieren Sie zum gewünschten Verzeichnis und kopieren Sie den Pfad, der im rechten Bereich oberhalb der Verzeichnisliste angezeigt wird. Normalerweise ist es so etwas wie <code>/public_html</code> oder <code>/httpdocs</code>."
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_TITLE="Passivmodus"
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_DESCRIPTION="Verwendet den FTP-Passivmodus bei der Datenübertragung. Sollte auf allen Servern mit Port-Firewall aktiviert werden, was heutzutage praktisch alle Server betrifft."
PANOPTICON_SETUP_DIRECTFTP_TEST_DESCRIPTION="Testet die FTP-Verbindung."
PANOPTICON_SETUP_DIRECTFTP_TEST_FAIL="Verbindung zum FTP-Server konnte nicht hergestellt werden."
PANOPTICON_SETUP_DIRECTFTP_TEST_OK="Verbindung zum FTP-Server erfolgreich hergestellt."
PANOPTICON_SETUP_DIRECTFTP_TEST_TITLE="FTP-Verbindung testen"
PANOPTICON_SETUP_DIRECTSFTP_HOST_TITLE="Hostname"
PANOPTICON_SETUP_DIRECTSFTP_HOST_DESCRIPTION="Hostname des SFTP-Servers, ohne das Protokoll. Verwenden Sie nicht <s><code>sftp://example.com</code></s>; verwenden Sie stattdessen <code>example.com</code>."
PANOPTICON_SETUP_DIRECTSFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTSFTP_PORT_DESCRIPTION="TCP/IP-Port für SFTP. Normalerweise 22. Wenn Sie unsicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_DIRECTSFTP_USER_TITLE="Benutzername"
PANOPTICON_SETUP_DIRECTSFTP_USER_DESCRIPTION="Benutzername, Groß-/Kleinschreibung beachten. Ihr SFTP-Server muss die Authentifizierung mit Benutzername/Passwort unterstützen."
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_TITLE="Passwort"
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_DESCRIPTION="SFTP-Passwort, Groß-/Kleinschreibung beachten."
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_TITLE="Startverzeichnis"
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_DESCRIPTION="SFTP-Verzeichnis des Stammverzeichnisses der Website. Wenn Sie unsicher sind, verwenden Sie einen SFTP-Desktop-Client, verbinden Sie sich mit Ihrem Server, navigieren Sie zum Verzeichnis und kopieren Sie den dort angezeigten Pfad. Der Pfad muss absolut sein, z. B. <code>/home/meinbenutzer/public_html</code>, nicht nur <s><code>public_html</code></s>."
PANOPTICON_SETUP_DIRECTSFTP_TEST_DESCRIPTION="Testet die Verbindung zum SFTP-Server."
PANOPTICON_SETUP_DIRECTSFTP_TEST_FAIL="Verbindung zum SFTP-Server konnte nicht hergestellt werden. Die Fehlermeldung lautete:"
PANOPTICON_SETUP_DIRECTSFTP_TEST_OK="Verbindung zum SFTP-Server erfolgreich hergestellt."
PANOPTICON_SETUP_DIRECTSFTP_TEST_TITLE="SFTP-Verbindung testen"
PANOPTICON_SETUP_LBL_SETUP_HEAD_TEXT="Der Zugang zu Panopticon ist durch eine Anmeldung geschützt. Sie erstellen jetzt ein Benutzerkonto mit vollständigen Administratorrechten. Sie können diesen Benutzer ändern und weitere Benutzer erstellen, nachdem Sie den Installationsprozess abgeschlossen haben."
PANOPTICON_SETUP_LBL_USER_NAME="Vollständiger Name"
PANOPTICON_SETUP_LBL_USER_NAME_HELP="Bitte geben Sie Ihren vollständigen Namen ein. Er wird verwendet, wenn Ihre Panopticon-Installation Ihnen eine E-Mail senden muss."
PANOPTICON_SETUP_LBL_USER_USERNAME="Benutzername"
PANOPTICON_SETUP_LBL_USER_USERNAME_HELP="Der Benutzername, mit dem Sie sich bei Panopticon anmelden. Am besten verwenden Sie nur Kleinbuchstaben a-z und Zahlen 0-9."
PANOPTICON_SETUP_LBL_USER_PASSWORD="Passwort"
PANOPTICON_SETUP_LBL_USER_PASSWORD_HELP="Das Passwort, mit dem Sie sich bei Panopticon anmelden. Das Passwort unterscheidet zwischen Groß- und Kleinschreibung, d. h. abc, Abc und ABC sind drei <em>verschiedene</em> Passwörter."
PANOPTICON_SETUP_LBL_USER_PASSWORD2="Passwort wiederholen"
PANOPTICON_SETUP_LBL_USER_PASSWORD2_HELP="Bitte wiederholen Sie das oben eingegebene Passwort. Wir möchten sicherstellen, dass Sie sich nicht versehentlich vertippt haben."
PANOPTICON_SETUP_LBL_USER_EMAIL="E-Mail-Adresse"
PANOPTICON_SETUP_LBL_USER_EMAIL_HELP="Bitte geben Sie Ihre E-Mail-Adresse ein. Sie wird verwendet, wenn Ihre Panopticon-Installation Ihnen eine E-Mail senden muss. Diese E-Mail-Adresse sowie alle Benutzerinformationen werden <em>nicht</em> an die Autoren von Panopticon übermittelt."
PANOPTICON_SETUP_LBL_TIMEZONE="Zeitzone"
PANOPTICON_SETUP_LBL_TIMEZONE_HELP="Alle Daten und Uhrzeiten werden in dieser Zeitzone angezeigt."
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_HEAD="Panopticon ist noch nicht bereit"
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_BODY="Das Speichern der Konfigurationsdatei <code>config.php</code> im Ordner, in dem Sie Panopticon installieren, ist fehlgeschlagen. Sie müssen diese Datei manuell erstellen."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_HEAD="Die Konfigurationsdatei erstellen"
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1="Erstellen Sie eine Datei mit dem Namen <code>config.php</code> und lassen Sie sie in Ihrem Editor geöffnet."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1_DETAIL="Verwenden Sie einen einfachen Texteditor wie Notepad unter Windows, BBEdit unter macOS, gEdit oder Kate unter Linux."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP2="Kehren Sie zu diesem Fenster zurück und klicken Sie auf die Schaltfläche „In Zwischenablage kopieren\"."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP3="Wechseln Sie zurück zu Ihrem Editor und fügen Sie den Inhalt ein. Speichern Sie dann die Datei."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4="Laden Sie die Datei <code>config.php</code> in Ihre Panopticon-Installation hoch."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4_DETAIL="Laden Sie die Datei in den Ordner hoch, in dem Sie Panopticon installieren. Das ist der Ordner mit der Panopticon-Datei <code>index.php</code>."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP5="Kehren Sie zu diesem Fenster zurück und klicken Sie auf die Schaltfläche „Weiter\"."
PANOPTICON_SETUP_BTN_COPY_TO_CLIPBOARD="In Zwischenablage kopieren"
PANOPTICON_SETUP_LBL_CRON_HEAD="Einen CRON-Auftrag einrichten"
PANOPTICON_SETUP_LBL_CRON_SUBHEAD="Panopticon nutzt viele Automatisierungsfunktionen, um Ihnen das Leben zu erleichtern. Dafür müssen Sie einen CRON-Auftrag einrichten, der jede Minute ausgeführt wird."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_CTA="Richten Sie einen CRON-Auftrag mit einer der unten genannten Methoden ein. Warten Sie dann bis zu einer Minute, bis sich diese Seite ändert."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_BREATHE="Atmen Sie durch. Dies ist der letzte Installationsschritt. Sie sind fast fertig."
PANOPTICON_SETUP_LBL_CRON_CLI_TABHEAD="CLI"
PANOPTICON_SETUP_LBL_CRON_WEB_TABHEAD="Web"
PANOPTICON_SETUP_LBL_CRON_LBL_INSTRUCTIONS="Anweisungen"
PANOPTICON_SETUP_LBL_CRON_LBL_TROUBLESHOOTING="Problem? Lösung gefunden!"
PANOPTICON_SETUP_LBL_CRON_LBL_IS_THIS_RIGHT_FOR_ME="Ist diese Methode die richtige für mich?"
PANOPTICON_SETUP_LBL_CRON_LBL_PROS="Vorteile"
PANOPTICON_SETUP_LBL_CRON_LBL_CONS="Nachteile"
PANOPTICON_SETUP_LBL_CRON_LBL_TARGET_AUDIENCE="Zielgruppe"
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_HEAD="Stellen Sie sicher, dass der CRON-Auftrag <em>jede Minute</em> ausgeführt wird."
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_BODY="Wenn der CRON-Auftrag seltener ausgeführt wird, führt dies zu veralteten Informationen und Unzuverlässigkeit, einschließlich fehlerhafter Websites aufgrund unvollständiger Joomla!&reg; Core-Updates."
PANOPTICON_SETUP_LBL_CRON_CLI_CREATE_A_JOB="Gehen Sie zu Ihrem Hosting-Kontrollpanel. Erstellen Sie einen neuen CRON-Auftrag. Stellen Sie ihn so ein, dass er <strong>jede Minute</strong> ausgeführt wird. Verwenden Sie die folgende Befehlszeile."
PANOPTICON_SETUP_LBL_CRON_REPLACE_PHP_CLI="Ersetzen Sie <i>/pfad/zu/php</i> durch den Pfad zur PHP %s CLI-Programmdatei. Stellen Sie sicher, dass es sich um die PHP CLI-Programmdatei handelt, <strong>nicht</strong> um die PHP CGI/FastCGI-Programmdatei."
PANOPTICON_SETUP_LBL_CRON_IF_UNSURE="Wenn Sie sich bei einigen oder allen der oben genannten Punkte nicht sicher sind, fragen Sie bitte Ihren Hosting-Anbieter."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_HEAD="Der CRON-Auftrag wird nicht ausgeführt"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_1="Entfernen Sie <code>2>&1</code> aus der CRON-Befehlszeile. Wenn der CRON-Befehl erneut ausgeführt wird, erhalten Sie eine E-Mail mit einem Fehler (sofern Ihr Hosting-Konto so konfiguriert ist, dass Sie die Ausgabe von CRON-Aufträgen per E-Mail erhalten). Damit können Sie herausfinden, was vor sich geht."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_2="Wenn auch dann nichts zu passieren scheint, wenden Sie sich bitte an Ihren Hosting-Anbieter. Entweder erhält Ihr Konto die Ausgabe der CRON-Aufträge nicht, oder die CRON-Aufträge werden überhaupt nicht ausgeführt (obwohl das unwahrscheinlich ist, haben wir das schon einige Male gesehen)."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_HEAD="Ich erhalte „Status: 403 Forbidden\" beim Ausführen des CRON-Auftrags"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_1="Sie verwenden die PHP-CGI/FastCGI-Programmdatei. Wie oben erwähnt, müssen Sie <em>/pfad/zu/php</em> durch den Pfad zur <strong>PHP CLI</strong>-Programmdatei ersetzen."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_2="Bitte fragen Sie Ihren Hosting-Anbieter nach dem richtigen Pfad. Wenn Ihr Hosting-Anbieter Ihnen diesen Pfad zunächst gegeben hat, eskalieren Sie Ihr Support-Ticket bei Ihrem Hosting-Anbieter und bitten Sie darum, mit einem Server-Ingenieur zu sprechen. Es ist trivial für ihn, Ihnen diesen Pfad anzugeben."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_HEAD="Ich erhalte „Akeeba Panopticon requires PHP %s or later\"."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_1="Sie verwenden die PHP CLI-Programmdatei für die falsche PHP-Version in Ihrem CRON-Auftrag."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_2="Auf den meisten Servern sind mehrere PHP-Versionen installiert. Sie müssen Ihren Hosting-Anbieter bitten, Ihnen den Pfad zur PHP CLI-Programmdatei für PHP %s zu nennen, und diesen in der Befehlszeile Ihres CRON-Auftrags verwenden."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_HEAD="Der Hosting-Anbieter erlaubt nur URLs in CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_INFO="Klicken Sie oben auf den Tab <strong>Web</strong>."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_HEAD="Der Hosting-Anbieter hat keine CRON-Funktion"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_1="Wir empfehlen <strong>sehr dringend</strong>, einen anderen Hosting-Anbieter zu verwenden."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_2="Panopticon ist nur dann nützlich, wenn seine Automatisierungsfunktionen konsistent und zuverlässig ausgeführt werden. Dazu muss der CRON-Auftrag jede Minute ausgeführt werden – <em>1440 Mal pro Tag</em>. Dies kann bei einem Drittanbieter-Dienst teuer werden; etwa 10 $ pro Tag! Sie können stattdessen so viel Geld <em>pro Monat</em> für einen guten Hosting-Anbieter ausgeben, der echte Befehlszeilen-CRON-Aufträge unterstützt."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_3="Wenn Sie eine günstigere Möglichkeit haben, CRON-Aufträge remote auszuführen (z. B. ein anderer Server unter Ihrer Kontrolle), klicken Sie bitte auf den Tab <strong>Web</strong>, um zu erfahren, wie das geht."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_4="<strong>Sparen Sie nicht an der CRON-Auftrags-Häufigkeit!</strong> Wenn CRON-Aufträge seltener ausgeführt werden, wird Panopticon unzuverlässig und könnte sogar Ihre Websites aufgrund unvollständiger Joomla&reg; Core-Updates beschädigen."
