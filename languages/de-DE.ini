PANOPTICON_ABOUT_LBL_ARE_YOU_MISSING="Wir möchten die Arbeit jeder einzelnen Person anerkennen und würdigen, die zu Akeeba Panopticon beigetragen hat, egal wie klein oder groß ihr Beitrag ist; auch die kleinsten Details sind wichtig. Wenn Sie außerhalb von GitHub beigetragen haben und öffentlich anerkannt werden möchten, teilen Sie uns dies bitte mit und wir werden das Versäumnis beheben; <em>jede Person zählt</em>."
