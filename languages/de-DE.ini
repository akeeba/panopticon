PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_HEAD="Es wurde keine Möglichkeit gefunden, eine Verbindung zu Akeeba Backup herzustellen."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_BODY="Panopticon kann keine Möglichkeit finden, eine Verbindung zur Akeeba Backup JSON API Ihrer Website herzustellen."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIPS="Tipps zum Verbinden von Akeeba Panopticon mit Akeeba Backup Professional"
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1="Stellen Sie sicher, dass Sie die Akeeba Backup Professional-Komponente installiert und aktiviert haben, sowie das Plugin „Web Services - Akeeba Backup\" auf Ihrer Website. Akeeba Backup Core ist <em>nicht</em> mit Akeeba Panopticon kompatibel."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1_WP="Stellen Sie sicher, dass Sie das Akeeba Backup Professional-Plugin auf Ihrer Website installiert und aktiviert haben. Akeeba Backup Core ist <em>nicht</em> mit Akeeba Panopticon kompatibel."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2="Melden Sie sich im Backend Ihrer Website an. Gehen Sie zu Komponenten, Akeeba Backup, Kontrollzentrum. Klicken Sie auf Optionen, Frontend-Sicherung und setzen Sie „JSON API aktivieren (Remote-Sicherung)\" auf Ja. Geben Sie ein neues „Geheimes Wort\" ein; Sie können ein neues, zufälliges, sicheres geheimes Wort unter <a href=\\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\\">random.org</a> erstellen. Klicken Sie dann in der Symbolleiste auf Speichern &amp; Schließen."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2_WP="Melden Sie sich im Backend Ihrer Website an. Gehen Sie zu Akeeba Backup, Systemkonfiguration, Öffentliche API und setzen Sie „JSON API aktivieren (Remote-Sicherung)\" auf Ja. Geben Sie einen neuen „Geheimen Schlüssel\" ein; Sie können einen neuen, zufälligen, sicheren Schlüssel unter <a href=\\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\\">random.org</a> erstellen. Klicken Sie dann in der Symbolleiste auf Speichern &amp; Schließen."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Stellen Sie sicher, dass keine Drittanbietererweiterungen (insbesondere Sicherheitserweiterungen) und/oder Serverkonfigurationseinstellungen den Zugriff auf den Ordner <code>api</code> Ihrer Website blockieren. Prüfen Sie auch, dass die Antworten dieser Datei nicht von Drittanbieter-Plugins auf Ihrer Website, Ihrem Webserver oder einem CDN/Caching-Proxy, der möglicherweise vor Ihrer Website konfiguriert ist, <em>zwischengespeichert</em> werden."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3_WP="Stellen Sie sicher, dass keine Drittanbieter-Plugins (insbesondere Sicherheits-Plugins) und/oder Serverkonfigurationseinstellungen den Zugriff auf die Datei <code>wp-admin/admin-ajax.php</code> Ihrer Website blockieren. Prüfen Sie auch, dass die Antworten dieser Datei nicht von Drittanbieter-Plugins auf Ihrer Website, Ihrem Webserver oder einem CDN/Caching-Proxy, der möglicherweise vor Ihrer Website konfiguriert ist, <em>zwischengespeichert</em> werden."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_HEAD="Akeeba Backup ist nicht verknüpft."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_BODY="Dies kann passieren, wenn Akeeba Backup nach dem Hinzufügen der Website zu Akeeba Panopticon installiert wurde, der auf der Website installierte Panopticon Connector zu alt ist, oder wenn bei der Kommunikation mit der Website ein Fehler aufgetreten ist."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_SOLUTION_ADMIN="Klicken Sie bitte auf die Schaltfläche unten, um zu versuchen, Akeeba Backup erneut mit Panopticon zu verknüpfen. Wenn dies nicht funktioniert, aktualisieren Sie bitte den Akeeba Panopticon Connector auf Ihrer Website, stellen Sie sicher, dass sein Plugin veröffentlicht ist, und prüfen Sie, ob Sie korrekt mit der Website kommunizieren können."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_SOLUTION_NONADMIN="Bitte wenden Sie sich an einen Administrator, um Akeeba Backup erneut mit Panopticon zu verknüpfen."
PANOPTICON_SITES_LBL_AKEEBABACKUP_COMSERROR_HEAD="Es gab einen Kommunikationsfehler mit dem Akeeba Panopticon Connector auf der entfernten Website."
PANOPTICON_SITES_LBL_AKEEBABACKUP_GUZZLE="Wir haben versucht, die Panopticon API auf Ihrer Website nach Informationen über den Installationsstatus von Akeeba Backup zu fragen, haben aber stattdessen einen Fehler erhalten."
PANOPTICON_SITES_LBL_AKEEBABACKUP_INVALIDAPI_HEAD="Ungültige Antwort von der API beim Prüfen des Status von Akeeba Backup"
PANOPTICON_SITES_LBL_AKEEBABACKUP_INVALIDAPI="Wir haben versucht, die Panopticon API auf Ihrer Website nach Informationen über den Installationsstatus von Akeeba Backup zu fragen, aber sie hat nicht korrekt geantwortet."
