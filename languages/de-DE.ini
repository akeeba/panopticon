PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME_HELP="Die Zeit wird in der Zeitzone %s angegeben. Wenn Aktualisierungen <em>nach</em> diesem Zeitpunkt gefunden werden, erfolgt die Installation am nächsten Kalendertag. Vermeiden Sie die Verwendung des Zeitpunkts der Zeitumstellung (in der Regel zwischen 2:00 und 4:00 Uhr); andernfalls verhält sich die Aktualisierungsplanung am Tag der Zeitumstellung auf eine Weise, die Sie als „seltsam\" oder „falsch\" empfinden könnten. Manuell ausgelöste Aktualisierungen werden unabhängig von dieser Einstellung immer sofort ausgeführt."
