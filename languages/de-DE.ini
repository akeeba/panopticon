PANOPTICON_SITES_FIELD_CONFIG_CORE_UPDATE_EMAIL_CC_HELP="Eine kommagetrennte Liste zusätzlicher E-Mail-Adressen, die beim Versand von E-Mails über Website-Aktualisierungen in Kopie (CC) gesetzt werden. Adressen können im Format <code>foo@example.com</code> (nur E-Mail-Adresse) oder <code>Max Mustermann &lt;foo@example.com&gt;</code> (Name und Adresse) angegeben werden."
PANOPTICON_SITES_FIELD_CONFIG_CORE_UPDATE_EMAIL_ERROR="E-Mail nach Aktualisierungsfehler senden"
