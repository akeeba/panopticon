PANOPTICON_SYSCONFIG_LBL_FIELD_TEMPLATE="Template"
PANOPTICON_SYSCONFIG_LBL_FIELD_TEMPLATE_HELP="Benutzerdefinierte Templates müssen im Ordner <code>templates</code> installiert sein."
PANOPTICON_SYSCONFIG_LBL_FIELD_THEME="CSS-Theme-Datei"
PANOPTICON_SYSCONFIG_LBL_FIELD_THEME_DEFAULT="(Standard)"
PANOPTICON_SYSCONFIG_LBL_FIELD_DARKMODE="Dunkelmodus"
PANOPTICON_SYSCONFIG_LBL_FIELD_FONTSIZE="Schriftgröße"
PANOPTICON_SYSCONFIG_LBL_FIELD_DASHBOARD_RELOAD_TIMER="Dashboard-Aktualisierungsintervall"
PANOPTICON_SYSCONFIG_LBL_FIELD_DASHBOARD_RELOAD_TIMER_HELP="Dashboard-Ansichten werden alle diese Anzahl von Sekunden neu geladen, sofern nicht manuell pausiert."
PANOPTICON_SYSCONFIG_LBL_FIELD_DASHBOARD_MAX_ITEMS="Maximal angezeigte Einträge"
PANOPTICON_SYSCONFIG_LBL_FIELD_DASHBOARD_MAX_ITEMS_HELP="Panopticon lädt immer bis zu 50 Websites pro HTTP-Anfrage. Dies ist die maximale Anzahl der <em>insgesamt</em> anzuzeigenden Websites."
PANOPTICON_SYSCONFIG_LBL_FIELD_PHPWARNINGS="PHP-Versionsmeldungen auf der Hauptseite"
PANOPTICON_SYSCONFIG_LBL_FIELD_AVATARS="Avatare für Benutzer anzeigen"
PANOPTICON_SYSCONFIG_LBL_FIELD_AVATARS_HELP="Avatare für Benutzer anzeigen. Diese Funktion wird durch den Drittanbieterdienst <a href='https://gravatar.com' _target='_blank'>Gravatar</a> bereitgestellt."
PANOPTICON_SYSCONFIG_LBL_FIELD_WEBCRON_KEY="Web-CRON-Schlüssel"
PANOPTICON_SYSCONFIG_LBL_FIELD_CRON_STUCK_THRESHOLD="Schwellenwert für feststeckende Aufgaben"
PANOPTICON_SYSCONFIG_LBL_FIELD_MAX_EXECUTION="Maximale Ausführungszeit"
PANOPTICON_SYSCONFIG_LBL_FIELD_EXECUTION_BIAS="Ausführungszeitanpassung"
PANOPTICON_SYSCONFIG_LBL_FIELD_ACCURATE_PHP_CLI="Genauer PHP-CLI-Pfad"
PANOPTICON_SYSCONFIG_LBL_FIELD_ACCURATE_PHP_CLI_HELP="Aktivieren, damit Akeeba Panopticon versucht, den genauen PHP-CLI-Pfad auf Ihrem Server zu ermitteln. Deaktivieren, wenn Ihr Server dies nicht erlaubt und dabei Ihre IP-Adresse für mehrere Minuten bis Stunden von Ihrer Website sperrt (zum Beispiel IONOS)."
PANOPTICON_SYSCONFIG_LBL_FIELD_SITEINFO_FREQ="Häufigkeit der Website-Informationssammlung"
PANOPTICON_SYSCONFIG_LBL_FIELD_CACHING_TIME="Standard-Cache-Zeit"
