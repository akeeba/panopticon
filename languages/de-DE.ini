PANOPTICON_SYSCONFIG_LBL_FIELD_DBBACKUP_COMPRESS="Datenbanksicherungen komprimieren"
PANOPTICON_SYSCONFIG_LBL_FIELD_DBBACKUP_COMPRESS_HELP="Soll Panopticon die Datenbanksicherungen mit Gzip komprimieren?"
PANOPTICON_SYSCONFIG_LBL_FIELD_DBBACKUP_MAXFILES="Maximale Anzahl von Datenbanksicherungen"
PANOPTICON_SYSCONFIG_LBL_FIELD_DBBACKUP_MAXFILES_HELP="Wie viele Datenbanksicherungsdateien soll Panopticon aufbewahren? Gilt nur für automatisch erstellte Sicherungen, manuell über die Seite „Datenbanksicherungen\" erstellte Sicherungen und über die CLI im Standardverzeichnis erstellte Sicherungen."
PANOPTICON_SYSCONFIG_LBL_DATABASE_WARNING_HEAD="Nicht ohne angemessene Vorbereitung ändern"
