PANOPTICON_SITES_LBL_BOU_BTN_LINK="Verknüpfen"
PANOPTICON_SITES_LBL_BOU_TOGGLE="Sicherung vor Aktualisierung"
PANOPTICON_SITES_LBL_BOU_TOGGLE_HELP="Erstellt eine Sicherung Ihrer Website mit dem angegebenen Akeeba Backup-Profil, bevor die Aktualisierung angewendet wird."
PANOPTICON_SITES_LBL_BOU_PROFILE="Sicherungsprofil"
PANOPTICON_SITES_LBL_BOU_PROFILE_HELP="Das Sicherungsprofil, das für die Erstellung einer Sicherung Ihrer Website vor der Anwendung der Aktualisierung verwendet werden soll."
PANOPTICON_SITES_LBL_BOU_RELOAD_PROFILES="Profile neu laden"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HEAD="Fehlerbehebungsinformationen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_HEAD="Die Joomla! API-Anwendung ist blockiert (HTTP-Fehler 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS="Etwas auf Ihrem Server – wie z. B. die vom Hoster gesteuerte Serverkonfiguration, eine Serverkonfigurationsdatei wie <code>.htaccess</code> oder ein Plugin Ihrer Website – blockiert den Zugriff von Panopticon auf die API-Anwendung Ihrer Website (<span class=\"font-monospace\">%s</span>)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS_J3="Etwas auf Ihrem Server – wie z. B. die vom Hoster gesteuerte Serverkonfiguration, eine Serverkonfigurationsdatei wie <code>.htaccess</code> oder ein Plugin Ihrer Website – blockiert den Zugriff von Panopticon auf die URL des API-Plugins (<span class=\"font-monospace\">%s</span>) auf Ihrer Website."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_TOCHECK="Zu prüfende Punkte:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1="Blockiert Ihr Hoster oder Ihre Serverkonfigurationsdatei (z. B. <code>.htaccess</code>) den Zugriff auf den Joomla! API-Anwendungs-Endpunkt (<span class=\"font-monospace\">%s</span>) insgesamt?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1_J3="Blockiert Ihr Hoster oder Ihre Serverkonfigurationsdatei (z. B. <code>.htaccess</code>) den Zugriff auf den API-Plugin-Endpunkt (<span class=\"font-monospace\">%s</span>) insgesamt?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2="Verfügt Ihr Hoster über eine serverseitige Schutzlösung (wie Apache's mod_security2), die möglicherweise den Joomla! API-Anwendungs-Endpunkt (<span class=\"font-monospace\">%s</span>), Ihren API-Token (<span class=\"font-monospace\">%s</span>) oder den User-Agent von Panopticon (<span class=\"font-monospace\">panopticon/%s</span>) blockiert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="Verfügt Ihr Hoster über eine serverseitige Schutzlösung (wie Apache's mod_security2), die möglicherweise den API-Plugin-Endpunkt (<span class=\"font-monospace\">%s</span>), Ihren API-Token (<span class=\"font-monospace\">%s</span>) oder den User-Agent von Panopticon (<span class=\"font-monospace\">panopticon/%s</span>) blockiert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="Haben Sie ein Sicherheits-, SEO- oder ähnliches Plugin, das das Obige blockieren könnte?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_HEAD="Die WordPress JSON API-Anwendung ist blockiert (HTTP-Fehler 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK1="Blockiert Ihr Hoster oder Ihre Serverkonfigurationsdatei (z. B. <code>.htaccess</code>) den Zugriff auf den WordPress API-Anwendungs-Endpunkt (<span class=\"font-monospace\">%s</span>) insgesamt?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK2="Verfügt Ihr Hoster über eine serverseitige Schutzlösung (wie Apache's mod_security2), die möglicherweise den WordPress API-Anwendungs-Endpunkt (<span class=\"font-monospace\">%s</span>), Ihren API-Token (<span class=\"font-monospace\">%s</span>) oder den User-Agent von Panopticon (<span class=\"font-monospace\">panopticon/%s</span>) blockiert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK3="Haben Sie ein Sicherheits-, SEO- oder ähnliches Plugin, das das Obige blockieren könnte?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Die Joomla! API-Anwendungsantwort enthält Nicht-API-Ausgaben"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="Die API-Plugin-Antwort enthält Nicht-API-Ausgaben"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="Die Antwort der API wird von anderen Textinhalten (wie PHP-Meldungen, z. B. Deprecation-Hinweise, Warnungen oder fatale Fehler) oder Ausgaben von Drittanbieter-Software vorangestellt und/oder gefolgt. Daher kann die API-Antwort nicht dekodiert werden, was bedeutet, dass Panopticon die Antwort Ihrer Website nicht verstehen kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Stellen Sie sicher, dass „Fehlerberichterstattung\" auf „Keine\" und „Debug-Website\" auf „Nein\" in der globalen Konfigurationsseite Ihrer Website eingestellt ist. Dies verhindert, dass PHP Meldungen ausgibt, die die API-Antwort verunreinigen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Wenn das nicht ausreicht, ist es möglich, dass ein Drittanbieter-Plugin einen Fehler in der API-Anwendung verursacht. Prüfen Sie, ob es Drittanbieter-Plugins gibt, insbesondere System-Plugins, die möglicherweise versehentlich das API-Plugin beschädigen, und wenden Sie sich an deren Autor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_HEAD="Die WordPress JSON API-Anwendungsantwort enthält Nicht-API-Ausgaben"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH1="Die Antwort der API wird von anderen Textinhalten (wie PHP-Meldungen, z. B. Deprecation-Hinweise, Warnungen oder fatale Fehler) oder Ausgaben von Drittanbieter-Plugins vorangestellt und/oder gefolgt. Daher kann die API-Antwort nicht dekodiert werden, was bedeutet, dass Panopticon die Antwort Ihrer Website nicht verstehen kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Stellen Sie sicher, dass PHP auf Ihrem Server mit deaktiviertem <code>display_errors</code> konfiguriert ist und dass Sie <code>WP_DEBUG</code> in der Datei <code>wp-config.php</code> Ihrer Website nicht aktiviert haben. Dies verhindert, dass PHP Meldungen ausgibt, die die API-Antwort verunreinigen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Wenn das nicht ausreicht, ist es möglich, dass ein Drittanbieter-Plugin einen Fehler in der API-Anwendung verursacht. Prüfen Sie, ob es Drittanbieter-Plugins gibt, einschließlich etwaiger Must-Use-Plugins (<code>mu-plugins</code>), die möglicherweise versehentlich das API-Plugin beschädigen, und wenden Sie sich an deren Autor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_HEAD="Die WordPress JSON API-Anwendung hat Nicht-JSON-Daten zurückgegeben"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH1="Die WordPress JSON API-Anwendung soll mit JSON-Daten antworten. Ihr Server hat Nicht-JSON-Daten zurückgegeben. Das bedeutet, dass auf Ihrer Website etwas defekt ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH2="Bitte stellen Sie sicher, dass kein .htaccess-Code, keine Drittanbieter-Plugins oder benutzerdefinierter Code (einschließlich in der Datei <code>functions.php</code> Ihres Themes) die JSON API von WordPress blockiert oder anderweitig einschränkt – weder generell noch für nicht authentifizierten (Gast-)Zugriff."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="Die Joomla! API-Anwendung hat mit einem unerwarteten HTTP-Statuscode (%s) geantwortet"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="Das API-Plugin hat mit einem unerwarteten HTTP-Statuscode (%s) geantwortet"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="Der HTTP-Statuscode %s bedeutet, dass ein Serverfehler aufgetreten ist. Prüfen Sie, ob es Drittanbieter-Plugins gibt, insbesondere System-Plugins, die möglicherweise versehentlich die Joomla! API-Anwendung beschädigen, und wenden Sie sich an deren Autor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="Der HTTP-Statuscode %s bedeutet, dass ein Serverfehler aufgetreten ist. Prüfen Sie, ob es Drittanbieter-Plugins gibt, insbesondere System-Plugins, die möglicherweise versehentlich das API-Plugin beschädigen, und wenden Sie sich an deren Autor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="Der HTTP-Statuscode 400 bedeutet in der Regel, dass auf Ihre Website nur über eine begrenzte Anzahl von Domainnamen zugegriffen werden kann; der von Ihnen verwendete (<span class=\"font-monospace\">%s</span>) ist möglicherweise nicht einer davon."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Wenn Sie Admin Tools Professional verwenden, gehen Sie in das Backend Ihrer Website und klicken Sie auf Komponenten, Admin Tools für Joomla!, Web Application Firewall, WAF konfigurieren, Anforderungsfilterung. Überprüfen Sie die Liste der <em>erlaubten Domains</em> am unteren Rand der Seite."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Wenn dies nicht der Fall war, wenden Sie sich bitte an Ihren Hoster."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! hält Ihren API-Token für falsch, beschädigt oder kann Sie damit nicht anmelden."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Stellen Sie sicher, dass der von Ihnen verwendete API-Token zu einem Benutzerkonto gehört, das der Gruppe „Super User\" angehört, und dass der Benutzer aktiviert ist. Beachten Sie, dass das Anfordern einer Passwortzurücksetzung den Benutzer vorübergehend deaktiviert. Vertrauen Sie nicht Ihrer Erinnerung oder Ihren Annahmen; überprüfen Sie den Benutzer auf Ihrer Website."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Stellen Sie sicher, dass die Plugins „API Authentication - Web Services Joomla Token\" und „User - Joomla API Token\" auf Ihrer Website aktiviert sind."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Stellen Sie sicher, dass das Plugin „System - Panopticon Connector für Joomla 3\" auf Ihrer Website aktiviert ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="Es ist auch möglich, dass etwas auf Ihrem Server oder ein Plugin auf Ihrer Website den API-Token bei der Übertragung an Ihre Website beschädigt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Bitte prüfen Sie Ihre installierten Joomla!-Plugins. Bitte beachten Sie, dass Admin Tools Professional für Joomla! <em>nicht</em> in den Joomla! API-Token eingreift. Wenn das nicht hilft, wenden Sie sich bitte an Ihren Hoster."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="Der HTTP-Statuscode 406 (Nicht akzeptabel) bedeutet, dass Joomla! unseren HTTP-<code>Accept</code>-Header nicht sieht, oder ein Plugin auf Ihrer Website ihn so verändert hat, dass ein Fehler entstanden ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Bitte prüfen Sie, ob es <code>system</code>- oder <code>webservices</code>-Plugins gibt, die den HTTP-Accept-Header beschädigen könnten."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Wenn das nicht hilft, wenden Sie sich bitte an Ihren Hoster und bitten ihn zu prüfen, ob der Accept-Header korrekt an PHP weitergeleitet wird. Er sollte <code>Accept: application/vnd.api+json</code> lauten."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="Höchstwahrscheinlich hat ein <code>system</code>- oder <code>webservices</code>-Plugin auf Ihrem Server die von uns gesendete Anfrage verändert, was zu einem Fehler geführt hat. Bitte prüfen Sie Ihre installierten Plugins."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_HEAD="Die WordPress JSON API-Anwendung hat mit einem unerwarteten HTTP-Statuscode (%s) geantwortet"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_5XX="Der HTTP-Statuscode %s bedeutet, dass ein Serverfehler aufgetreten ist. Prüfen Sie, ob es Drittanbieter-Plugins gibt, die möglicherweise versehentlich die WordPress JSON API-Anwendung beschädigen, und wenden Sie sich an deren Autor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_400="Der HTTP-Statuscode 400 bedeutet in der Regel, dass auf Ihre Website nur über eine begrenzte Anzahl von Domainnamen zugegriffen werden kann; der von Ihnen verwendete (<span class=\"font-monospace\">%s</span>) ist möglicherweise nicht einer davon. Bitte wenden Sie sich an Ihren Hoster, wenn Sie nicht sicher sind, warum Sie diese Meldung erhalten."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_HEAD="WordPress hält Ihren API-Token für falsch, beschädigt oder kann Sie damit nicht anmelden."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH1="Stellen Sie sicher, dass der von Ihnen verwendete API-Token aktuell ist und dass Sie ihn nicht versehentlich abgeschnitten oder Leerzeichen darum herum kopiert haben."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH2="Stellen Sie sicher, dass das Plugin „Akeeba Panopticon Connector für WordPress\" auf Ihrer Website aktiviert ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH3="Es ist auch möglich, dass etwas auf Ihrem Server oder ein Plugin auf Ihrer Website den API-Token bei der Übertragung an Ihre Website beschädigt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH4="Bitte prüfen Sie Ihre installierten Plugins. Bitte beachten Sie, dass Admin Tools Professional für WordPress <em>nicht</em> in den Panopticon API-Token eingreift. Wenn das nicht hilft, wenden Sie sich bitte an Ihren Hoster."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_WPGENERIC="Höchstwahrscheinlich hat ein Plugin auf Ihrem Server die von uns gesendete Anfrage verändert, was zu einem Fehler geführt hat. Bitte prüfen Sie Ihre installierten Plugins."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! hält Ihren API-Token für falsch, beschädigt oder kann Sie damit nicht anmelden."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Stellen Sie sicher, dass der von Ihnen verwendete API-Token zu einem Benutzerkonto gehört, das der Gruppe „Super User\" angehört, und dass der Benutzer aktiviert ist. Beachten Sie, dass das Anfordern einer Passwortzurücksetzung den Benutzer vorübergehend deaktiviert. Vertrauen Sie nicht Ihrer Erinnerung oder Ihren Annahmen; überprüfen Sie den Benutzer auf Ihrer Website."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Stellen Sie sicher, dass die Plugins „API Authentication - Web Services Joomla Token\" und „User - Joomla API Token\" auf Ihrer Website aktiviert sind."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Stellen Sie sicher, dass das Plugin „System - Panopticon Connector für Joomla 3\" auf Ihrer Website aktiviert ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="Es ist auch möglich, dass etwas auf Ihrem Server oder ein Plugin auf Ihrer Website den API-Token bei der Übertragung an Ihre Website beschädigt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Bitte prüfen Sie Ihre installierten Joomla!-Plugins. Bitte beachten Sie, dass Admin Tools Professional für Joomla! <em>nicht</em> in den Joomla! API-Token eingreift. Wenn das nicht hilft, wenden Sie sich bitte an Ihren Hoster."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_HEAD="Ihre Website hält Ihren API-Token für falsch, beschädigt oder kann Sie damit nicht anmelden."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH1="Stellen Sie sicher, dass der von Ihnen verwendete API-Token aktuell ist und dass Sie ihn nicht versehentlich abgeschnitten oder Leerzeichen darum herum kopiert haben."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH2="Stellen Sie sicher, dass das Plugin „Akeeba Panopticon Connector für WordPress\" auf Ihrer Website aktiviert ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH3="Es ist auch möglich, dass etwas auf Ihrem Server oder ein Plugin auf Ihrer Website den API-Token bei der Übertragung an Ihre Website beschädigt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH4="Bitte prüfen Sie Ihre installierten Plugins. Bitte beachten Sie, dass Admin Tools Professional für WordPress <em>nicht</em> in den Panopticon API-Token eingreift. Wenn das nicht hilft, wenden Sie sich bitte an Ihren Hoster."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Es gab einen Kommunikationsfehler mit Ihrer Website."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="Die von PHP verwendete Kommunikationsbibliothek (cURL) hat den folgenden Fehler gemeldet:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH2="Weitere Informationen zum Fehler finden Sie in der <a href=\"https://curl.se/libcurl/c/libcurl-errors.html\" target=\"_blank\">cURL-Bibliothek-Fehlercodereferenz</a>. In den meisten Fällen handelt es sich um ein Netzwerk- oder Serverkonfigurationsproblem – entweder auf dem Server, auf dem Sie Panopticon installiert haben, oder auf dem Server Ihrer Website –, das die Kontaktaufnahme mit dem jeweiligen Hoster erfordert."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH3="In seltenen Fällen kann das Problem durch ein Drittanbieter-Plugin – insbesondere Sicherheits-, Cache- und SEO-Plugins – oder ein externes CDN, einen Proxy oder eine Firewall verursacht werden, die die API-Anfrage ändern oder umleiten können, auch wenn sie dies nicht sollten."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Es gab einen Kommunikationsfehler mit Ihrer Website."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="Die von Panopticon verwendete Kommunikationsbibliothek (<a href=\"https://github.com/guzzle/guzzle\" target=\"_blank\">Guzzle HTTP</a>) hat den folgenden Fehler gemeldet:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Dies ist ein unerwarteter Zustand, der auf einen bisher unbekannten Kommunikationsfehler, ein Problem innerhalb von Guzzle selbst, ein Problem mit dem Server, auf dem Panopticon installiert ist, oder ein Problem in Panopticon selbst hinweisen könnte. Bitte suchen Sie in den offenen <em>und geschlossenen</em> Issues <a href=\"https://github.com/akeeba/panopticon/issues?q=is%3Aissue\" target=\"_blank\">in unserem GitHub-Repository</a>. Wenn niemand anderes dies gemeldet hat, eröffnen Sie bitte ein Issue und wir werden es untersuchen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="Der Hostname Ihrer Website (<span class=\"font-monospace\">%s</span>) kann nicht in eine IP-Adresse aufgelöst werden."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK="Bitte prüfen Sie Folgendes:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="Haben Sie die URL korrekt eingegeben? Prüfen Sie sorgfältig – Tippfehler passieren leicht und sind schwer zu erkennen!"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="Haben Sie die Domain kürzlich gekauft, einem Server zugewiesen oder Ihre Website zwischen Hostern übertragen? Beachten Sie, dass die DNS-Propagierung zwischen 5 Minuten und mehreren Tagen dauern kann. Darüber hinaus ist es aufgrund der verteilten Natur von DNS möglich, dass Sie Ihre Website <em>von Ihrem Gerät aus</em> sehen können, der Server, auf dem Panopticon installiert ist, jedoch nicht."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Wenn die Domain Ihrer Website zu einer IPv6-Adresse – aber nicht zu einer IPv4-Adresse – aufgelöst wird, stellen Sie sicher, dass der Server, auf dem Panopticon installiert ist, IPv6 unterstützt. Möglicherweise müssen Sie Ihren Hoster bitten zu bestätigen, dass dies der Fall ist."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_HEAD="Der Akeeba Panopticon Connector ist auf Ihrer Website nicht aktiviert"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_BLAH="Ihre Joomla!-Website muss den Akeeba Panopticon Connector installiert und aktiviert haben, damit Akeeba Panopticon mit ihr zusammenarbeiten kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK="Bitte prüfen Sie Folgendes:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK1="Haben Sie das Akeeba Panopticon Connector-Paket auf Ihrer Website installiert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK2="Gehen Sie zu System, Verwalten, Erweiterungen. Ist die <em>Komponente</em> „Akeeba Panopticon Connector\" installiert und aktiviert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK3="Gehen Sie zu System, Verwalten, Erweiterungen. Ist das <em>Paket</em> „Akeeba Panopticon Connector\" installiert und aktiviert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK4="Gehen Sie zu System, Verwalten, Plugins. Ist das Plugin „Web Services - Panopticon\" aktiviert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_HEAD="Das Plugin „System - Panopticon Connector für Joomla 3\" ist auf Ihrer Website nicht aktiviert"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_BLAH="Ihre Joomla!-Website muss das Plugin „System - Panopticon Connector für Joomla 3\" installiert und aktiviert haben, damit Akeeba Panopticon mit ihr zusammenarbeiten kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_HEAD="Das Akeeba Panopticon Connector für WordPress-Plugin ist auf Ihrer Website nicht aktiviert"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_BLAH="Ihre WordPress-Website muss das Akeeba Panopticon Connector für WordPress-Plugin installiert und aktiviert haben, damit Akeeba Panopticon mit ihr zusammenarbeiten kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK="Bitte prüfen Sie Folgendes:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK1="Haben Sie das Akeeba Panopticon Connector für WordPress-Plugin auf Ihrer Website installiert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK2="Gehen Sie zu wp-admin, Plugins. Ist das Plugin „Akeeba Panopticon Connector für WordPress\" installiert <em>und</em> aktiviert?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Sie verwenden ein selbstsigniertes SSL/TLS-Zertifikat"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Sie verwenden HTTPS für den Zugriff auf Ihre Website, aber das von Ihnen verwendete SSL/TLS-Zertifikat ist nicht von einer kommerziellen, bekannten Zertifizierungsstelle signiert."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Sie können dieses Problem beheben, indem Sie <em>eine</em> der folgenden Maßnahmen ergreifen:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Verwenden Sie einfaches HTTP. Dies ist die am wenigsten sichere Option und wird daher dringend nicht empfohlen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Installieren Sie ein SSL/TLS-Zertifikat, das von einer kommerziellen, bekannten Zertifizierungsstelle signiert wurde. Die meisten Server ermöglichen die Verwendung von <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a>, das gültige, signierte, voll funktionstüchtige SSL/TLS-Zertifikate kostenlos ausstellt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Wenn Sie sich in einem Intranet, Extranet oder einer anderen Umgebung befinden, in der Sie eine eigene Zertifizierungsstelle betreiben müssen, können Sie Panopticon mitteilen, dass es Ihre benutzerdefinierte Zertifizierungsstelle anerkennen soll. Erstellen Sie die Datei <code>cacert.pem</code> im Ordner <code>user_code</code> Ihrer Panopticon-Installation. Kopieren Sie die öffentlichen Zertifikat(e) Ihrer Zertifizierungsstelle (CA) im <a href=\"https://en.wikipedia.org/wiki/Privacy-Enhanced_Mail\" target=\"_blank\">PEM</a>-Format hinein. Diese wird <em>zusätzlich</em> zu den Standard-CA-Dateien automatisch geladen, sodass Panopticon auf Ihre Website zugreifen kann."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="Das SSL/TLS-Zertifikat Ihrer Website hat ein Problem"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Sie verwenden HTTPS für den Zugriff auf Ihre Website, aber das von Ihnen verwendete SSL/TLS-Zertifikat scheint ein Problem zu haben."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Bitte prüfen Sie Folgendes:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="Ist das SSL/TLS-Zertifikat für den richtigen Domainnamen ausgestellt? Wenn Sie das von Ihrem Hoster bereitgestellte Standard-SSL/TLS-Zertifikat verwenden, ist es auf den temporären Domainnamen beschränkt, den Sie zum Einrichten Ihrer Website verwenden, nicht auf Ihren echten Domainnamen. Sie müssen ein SSL/TLS-Zertifikat installieren, das von einer kommerziellen, bekannten Zertifizierungsstelle signiert wurde. Die meisten Server ermöglichen die Verwendung von <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a>, das gültige, signierte, voll funktionstüchtige SSL/TLS-Zertifikate kostenlos ausstellt. Denken Sie daran, dass einige Self-Service-Hosting-Kontrollpanels (wie cPanel oder Plesk) es Ihnen ermöglichen, auszuwählen, welches das aktive SSL/TLS-Zertifikat für einen Domainnamen ist. Prüfen Sie, ob das richtige Zertifikat tatsächlich verwendet wird."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="Ist das SSL/TLS-Zertifikat abgelaufen? In diesem Fall müssen Sie es erneuern. Bitte beachten Sie, dass bei Verwendung von Let's Encrypt das Zertifikat eine kurze Gültigkeitsdauer hat (in der Regel 90 Tage) und von Ihrem Hoster automatisch erneuert werden sollte. Wenn das nicht passiert ist, müssen Sie Ihren Hoster kontaktieren."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="Wurde das SSL/TLS-Zertifikat widerrufen? Manchmal können Zertifizierungsstellen oder die Eigentümer eines SSL/TLS-Zertifikats entscheiden, es zu widerrufen. Zum Beispiel tun Zertifizierungsstellen dies, wenn sie Betrug vermuten oder wenn sie glauben, dass ihre zur Ausstellung eines Zertifikats verwendete Infrastruktur kompromittiert wurde. <a href=\"https://www.namecheap.com/support/knowledgebase/article.aspx/9968/38/how-to-check-the-certificate-revocation-status/\" target=\"_blank\">Prüfen Sie den Widerrufsstatus Ihres Zertifikats</a>. Wenn es widerrufen wurde, benötigen Sie ein neues Zertifikat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Ist es möglich, dass Ihr Server das falsche SSL/TLS-Zertifikat bereitstellt? Dies kann passieren, wenn Sie kürzlich auf ein neues Zertifikat umgestellt haben, entweder manuell oder als Teil eines automatisierten Zertifikatsrotationsprozesses (z. B. wenn Ihr Hoster ein neues Zertifikat über Let's Encrypt ausstellt). Wenn sich das Zertifikat ändert, muss der Webserver neu geladen oder neu gestartet werden. In einigen seltenen Fällen passiert das nicht – oder ein unerfahrener Systemadministrator vergisst es. Bitte wenden Sie sich an Ihren Hoster/Systemadministrator, um dies zu überprüfen und gegebenenfalls den Webserver-Prozess neu zu laden oder neu zu starten."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="Das Plugin „Web Services - Installer\" ist auf Ihrer Website deaktiviert"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH1="Panopticon verwendet die Joomla! API-Anwendungsdienste des Plugins „Web Services - Installer\", um sicherzustellen, dass alle notwendigen Erweiterungen auf Ihrer Website installiert und veröffentlicht sind."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH2="Bitte gehen Sie in das Backend Ihrer Website und klicken Sie auf System, Verwalten, Erweiterungen. Suchen Sie nach dem Plugin „Web Services - Installer\" und aktivieren Sie es."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_HEAD="Kommunikation mit dem Plugin „System - Panopticon Connector für Joomla 3\" auf Ihrer Website nicht möglich"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon verwendet sein eigenes Plugin, „System - Panopticon Connector für Joomla 3\", um die notwendige API bereitzustellen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Bitte gehen Sie in das Backend Ihrer Website und klicken Sie auf Erweiterungen, Plugins. Suchen Sie nach dem Plugin „System - Panopticon Connector für Joomla 3\" und aktivieren Sie es."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Wenn Sie dieses Plugin bereits aktiviert haben, ändern Sie bitte die Endpunkt-URL unten auf <code>%s</code>"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_HEAD="Ihre Website scheint auf Webserver-Ebene passwortgeschützt zu sein"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH1="Ihre Website hat beim Zugriff auf die API mit dem HTTP-Statuscode 401 Unauthorized geantwortet. Dies bedeutet in der Regel, dass Sie auf Webserver-Ebene einen Passwortschutz eingerichtet haben."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH2="Bitte entfernen Sie den Passwortschutz."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3="Bitte beachten Sie, dass der Passwortschutz möglicherweise nur für den Ordner <code>api</code> Ihrer Website oder für den Stammordner Ihrer Website angewendet wurde. Prüfen Sie beide Stellen in dieser Reihenfolge."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3_J3="Bitte beachten Sie, dass der Passwortschutz auf den Stammordner Ihrer Website angewendet wurde."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_HEAD="Kommunikation mit dem Plugin „Akeeba Panopticon Connector für WordPress\" auf Ihrer Website nicht möglich"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH1="Panopticon verwendet sein eigenes Plugin, „Akeeba Panopticon Connector für WordPress\", um die notwendige API über den JSON-Dienste-API von WordPress (<code>wp-json</code>) bereitzustellen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH2="Bitte gehen Sie in den wp-admin-Bereich Ihrer Website und klicken Sie auf Plugins. Suchen Sie nach dem Plugin „Akeeba Panopticon Connector für WordPress\" und aktivieren Sie es."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_HEAD="Oh nein. Hier ist etwas völlig defekt…"
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Normalerweise können wir die Art des Verbindungsfehlers erkennen und hier hilfreiche Fehlerbehebungsinformationen bereitstellen oder Sie zumindest auf eine nützliche Fehlerbehebungsressource hinweisen. Wenn das nicht möglich ist, können wir zumindest eine Fehlermeldung ausgeben, die uns hilft, das Problem gemeinsam zu lösen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Stattdessen haben wir einen Fehler erhalten, für den wir eigentlich Fehlerbehebungsinformationen bereitstellen sollten (<span class=\"font-monospace\">%s</span>), aber uns fehlt der entsprechende Code dafür. Das hätte nicht passieren dürfen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH3="Bitte löschen Sie alle Dateien und Ordner im Ordner <code>tmp</code> von Akeeba Panopticon. Damit wird das Problem behoben, dass die zwischengespeicherte Kopie dieser Seite stark veraltet ist. Wenn das nicht hilft, teilen Sie es uns bitte mit."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_INFO="Fehlerbehebungsinformationen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_STATUS="HTTP-Status"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_BODY="HTTP-Body"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADERS="HTTP-Header"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADER_NO_STRING="(Header-Inhalt ist keine Zeichenkette)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_HEADER_NO_PRINTABLE="(Header-Inhalt ist weder ein Array noch eine Zeichenkette)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_MUST_ENABLE_FOR_ISSUE="Bevor Sie ein Issue zu diesem Verbindungsproblem einreichen, gehen Sie bitte zu Administration, Systemkonfiguration, System und aktivieren Sie „System debuggen\". Kehren Sie dann hierher zurück und wiederholen Sie die gleiche Verbindung. Sie erhalten detaillierte Fehlerbehebungsinformationen, die Sie in Ihrem Issue angeben müssen."
PANOPTICON_SITE_LBL_NOTES_HEAD="Notizen"
PANOPTICON_SITE_LBL_NOTES_HELP="Freiformnotizen zur Website, die nur Benutzern mit Bearbeitungsrechten für die Website angezeigt werden."
PANOPTICON_SITE_LBL_NOTES_HELP_NO_PRIVILEGED="<strong>FÜGEN SIE KEINE PRIVILEGIERTEN INFORMATIONEN EIN</strong>, wie z. B. Passwörter, in Notizen. Der Inhalt dieses Feldes wird <em>unverschlüsselt</em> in der Datenbank gespeichert. Wenn Sie privilegierte Informationen speichern möchten, empfehlen wir dringend, einen Passwort-Manager zu verwenden, der die Speicherung beliebiger Informationen ermöglicht, wie z. B. KeePassXC, Strongbox, 1Password usw."
PANOPTICON_SITE_LBL_NOTES_NONE="Es gibt keine Notizen."
PANOPTICON_SITE_LBL_NOTES_EDIT="Website bearbeiten, um Notizen zu bearbeiten"
PANOPTICON_SYSCONFIG_TITLE="Systemkonfiguration"
PANOPTICON_SYSCONFIG_ERR_USING_DOTENV="Sie können die Systemkonfiguration in Panopticon nicht anzeigen oder bearbeiten, wenn .env-Dateien für die Konfiguration verwendet werden. Bitte bearbeiten Sie stattdessen die .env-Datei direkt."
PANOPTICON_SYSCONFIG_ERR_USING_ENVIRONMENT="Sie können die Systemkonfiguration in Panopticon nicht anzeigen oder bearbeiten, wenn es containerisiert läuft und Sie die Umgebungsvariable <code>PANOPTICON_USING_ENV</code> auf 1 gesetzt haben. Bitte konfigurieren Sie Panopticon stattdessen über Umgebungsvariablen."
