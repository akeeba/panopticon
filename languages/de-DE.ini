PANOPTICON_BACKUPTASKS_LBL_MINUTES="Minuten"
PANOPTICON_BACKUPTASKS_LBL_MINUTES_HELP="Zahl <code>0</code> bis <code>59</code>, zusammenhängender Bereich z. B. <code>5-15</code>, kommagetrennte Werteliste z. B. <code>1,15,30,45</code>, jede Minute als <code>*</code>, jede X Minuten mit Schrägstrich z. B. <code>*/5</code> (alle 5 Minuten)."
PANOPTICON_BACKUPTASKS_LBL_HOURS="Stunden"
PANOPTICON_BACKUPTASKS_LBL_HOURS_HELP="Zahl <code>0</code> bis <code>23</code> (0–11 ist Vormittag, 12–23 ist Nachmittag), zusammenhängender Bereich z. B. <code>5-15</code>, kommagetrennte Werteliste z. B. <code>0,6,12,18</code>, jede Stunde als <code>*</code>, jede X Stunden mit Schrägstrich z. B. <code>*/2</code> (alle 2 Stunden)."
PANOPTICON_BACKUPTASKS_LBL_DOM="Tag des Monats"
PANOPTICON_BACKUPTASKS_LBL_DOM_HELP="Zahl <code>1</code> bis <code>31</code>, <code>L</code> für den letzten Tag des Monats (kann nicht in Wertelisten verwendet werden!), zusammenhängender Bereich z. B. <code>1-15</code>, kommagetrennte Werteliste z. B. <code>1,7,14,21,28</code>, jeden Tag als <code>*</code>, jeden X-ten Tag mit Schrägstrich z. B.<code>*/3</code> (alle 3 Tage).<br>Verwenden Sie eine Zahl mit <code>W</code> für den nächsten Tag innerhalb desselben Monats, der kein Samstag oder Sonntag ist, z. B. ist <code>15W</code> der nächste Tag (vom 13. bis 17.), der kein Samstag oder Sonntag ist."
PANOPTICON_BACKUPTASKS_LBL_MONTH="Monat"
PANOPTICON_BACKUPTASKS_LBL_MONTH_HELP="Zahl <code>1</code> (Januar) bis <code>12</code> (Dezember), zusammenhängender Bereich z. B. <code>3-7</code>, kommagetrennte Werteliste z. B. <code>3,6,9,12</code>, jeden Monat als <code>*</code>, jeden X-ten Monat mit Schrägstrich z. B. <code>*/2</code> (alle 2 Monate).<br>Anstelle von Zahlen können Sie die abgekürzten dreistelligen englischen Monatsnamen verwenden: <code>JAN</code> <code>FEB</code>, <code>MAR</code>, <code>APR</code>, <code>MAY</code>, <code>JUN</code>, <code>JUL</code>, <code>AUG</code>, <code>SEP</code>, <code>OCT</code>, <code>NOV</code>, <code>DEC</code>."
PANOPTICON_BACKUPTASKS_LBL_DOW="Wochentag"
PANOPTICON_BACKUPTASKS_LBL_DOW_HELP="Zahl <code>0</code> (Sonntag) bis <code>6</code> (Samstag), zusammenhängender Bereich z. B. <code>1-5</code>, kommagetrennte Werteliste z. B. <code>1,3,5</code>, jeden Tag als <code>*</code>.<br> Anstelle von Zahlen können Sie die abgekürzten dreistelligen englischen Wochentagsnamen verwenden: <code>SUN</code>, <code>MON</code>, <code>TUE</code>, <code>WED</code>, <code>THU</code>, <code>FRI</code>, <code>SAT</code><br>Eine Zahl gefolgt von <code>L</code> für den letzten Wochentag im Monat, z. B. ist <code>5L</code> der letzte Freitag des Monats.<br>Zwei durch <code>#</code> getrennte Zahlen für den n-ten Wochentag im Monat, z. B. ist <code>5#3</code> der 3. Freitag des Monats."
