PANOPTICON_SITES_LBL_AKEEBABACKUP_INVALIDAPI_PLEASE_CHECK_VERSION_J3="Bitte stellen Sie sicher, dass Sie eine Version von Akeeba Backup neuer als 8.3.0 verwenden."
