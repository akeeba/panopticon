PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Globálně zakázané nástroje"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="Seznam názvů nástrojů MCP oddělených čárkami, které nejsou nikdy nikomu zpřístupněny, bez ohledu na uživatele, token nebo skupinu. Jedná se o absolutní vypínač (například sem uveďte <code>get_sysconfig</code>, aby systémová konfigurace zůstala mimo dosah MCP zcela). Ponechte prázdné pro povolení všech nástrojů."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Dostupné nástroje"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_CHECKSUMS="Integrita základních souborů"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL="Základní URL zdroje kontrolních součtů"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL_HELP="Základní URL, kterou konektory Panopticonu používají ke stažení referenčních kontrolních součtů pro kontrolu integrity základních souborů. Ponechte prázdné pro použití výchozí hodnoty <code>https://getpanopticon.com/checksums</code>. Pokud provozujete vlastní zrcadlo, musí poskytovat stejnou strukturu: konektor k této základní URL připojuje <code>/joomla/&lt;verze&gt;/sha256_squash.json.gz</code> nebo <code>/wordpress/&lt;verze&gt;/sha256_squash.json.gz</code>. Neuvádějte koncové lomítko ani název CMS."
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Zakázané nástroje MCP"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="Nástroje MCP, které členové této skupiny NESMÍ používat. Důležité: přístup je udělen, pokud nástroj povoluje ALESPOŇ JEDNA ze skupin uživatele. Nástroj je uživateli zablokován pouze tehdy, když jej zakazují VŠECHNY skupiny, do kterých patří. Jde tedy o opak logiky Joomly \"vítězí zákaz\". Seznam globálně zakázaných nástrojů v systémové konfiguraci má vždy přednost."
