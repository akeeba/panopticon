PANOPTICON_SYSCONFIG_ERR_USING_DOTENV="V aplikaci Panopticon nemůžete zobrazit ani upravit konfiguraci systému, pokud používáte soubory .env pro její konfiguraci. Prosím upravte samotný soubor .env."
PANOPTICON_SYSCONFIG_ERR_USING_ENVIRONMENT="Nemůžete zobrazit ani upravovat konfiguraci systému v Panopticonu, pokud běží v kontejneru a nastavili jste proměnnou prostředí <code>PANOPTICON_USING_ENV</code> na 1. Panopticon v takovém případě nastavte pomocí proměnných prostředí."
