PANOPTICON_SETUP_FINISH_MAXEXEC_LOW_INFO="Konfigurace vašeho serveru umožňuje CRON úlohám běžet maximálně %d sekund, což je méně než doporučených 60 sekund."
PANOPTICON_SETUP_FINISH_MAXEXEC_LOW_CAUTION="Můžete zaznamenat drobné problémy s automatizacemi, které potřebují více času, jako například provádění záloh."
PANOPTICON_SETUP_FINISH_MAXEXEC_LOW_FIXIT="Konzultujte naši dokumentaci pro způsoby, jak zvýšit maximální čas provádění CRON alespoň na 60 sekund."
