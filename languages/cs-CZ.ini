PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_HEAD="Aplikace API Joomla! je blokována (chyba HTTP 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS="Něco na vašem serveru – například konfigurace serveru řízená vaším poskytovatelem hostingu, konfigurační soubor jako <code>.htaccess</code> nebo plugin vašeho webu – blokuje přístup Panopticon k API aplikaci vašeho webu (<span class=\"font-monospace\">%s</span>)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS_J3="Něco na vašem serveru - například konfigurace serveru řízená vaším hostitelem, konfigurační soubor serveru jako <code>.htaccess</code> nebo plugin vaší stránky - blokuje Panopticon v přístupu k URL API pluginu (<span class=\"font-monospace\">%s</span>) na vaší stránce."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_TOCHECK="Věci k ověření:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1="Blokuje váš hostitel nebo konfigurační soubor vašeho serveru (např. <code>.htaccess</code>) přístup k endpointu Joomla! API aplikace (<span class=\"font-monospace\">%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1_J3="Blokuje váš hostitel nebo konfigurační soubor vašeho serveru (např. <code>.htaccess</code>) přístup k endpointu pluginu API (<span class=\"font-monospace\">%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2="Má váš poskytovatel hostingu ochranné řešení na straně serveru (například Apache mod_security2), které by mohlo blokovat koncový bod API aplikace Joomla! (<span class=\"font-monospace\">%s</span>), váš API token (<span class=\"font-monospace\">%s</span>) nebo User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="Má váš poskytovatel hostingu ochranné řešení na straně serveru (například Apache mod_security2), které by mohlo blokovat koncový bod API pluginu (<span class=\"font-monospace\">%s</span>), váš API token (<span class=\"font-monospace\">%s</span>) nebo User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="Máte bezpečnostní, SEO nebo jiný podobný plugin, který by mohl výše uvedené blokovat?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_HEAD="Aplikace WordPress JSON API je blokována (chyba HTTP 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK1="Blokuje váš hostitel nebo konfigurační soubor vašeho serveru (např. <code>.htaccess</code>) úplně přístup ke koncovému bodu<span class=\"font-monospace\">%s</span> aplikace () rozhraní API WordPress?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK2="Má váš poskytovatel hostingu ochranné řešení na straně serveru (například Apache mod_security2), které by mohlo blokovat koncový bod WordPress API aplikace (<span class=\"font-monospace\">%s</span>), váš API token (<span class=\"font-monospace\">%s</span>) nebo User-Agent Panopticon (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK3="Máte bezpečnostní, SEO nebo jiný podobný plugin, který může blokovat výše uvedené?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Odpověď aplikace Joomla! API obsahuje výstup mimo API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="Odpověď pluginu API obsahuje výstup mimo API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="Odpověď z API je předcházena nebo následována jiným textovým obsahem, jako jsou zprávy PHP (např. upozornění na zastarání, varování nebo fatální chyby) nebo výstup softwaru třetích stran. V důsledku toho nelze odpověď API dekódovat, což znamená, že Panopticon nemůže porozumět odpovědi vašeho webu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="V globální konfiguraci vašeho webu nastavte \"Hlášení chyb\" na Žádné a \"Ladicí režim webu\" na Ne. To zabrání PHP v tisku zpráv, které znečišťují odpověď API."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Pokud to nestačí, je možné, že třetí strana plugin způsobuje chybu v aplikaci API. Zkontrolujte, zda neexistují žádné pluginy třetí strany, zejména systémové pluginy, které mohou náhodně poškodit plugin API a kontaktujte jejich autora."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_HEAD="Odpověď aplikace WordPress JSON API zahrnuje výstup bez rozhraní API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH1="Odpověď z API je předcházena nebo následována jiným textovým obsahem, jako jsou zprávy PHP (např. upozornění na zastarání, varování nebo fatální chyby) nebo výstup pluginů třetích stran. V důsledku toho nelze odpověď API dekódovat, což znamená, že Panopticon nemůže porozumět odpovědi vašeho webu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Ujistěte se, že PHP na vašem serveru je nakonfigurováno s vypnutým <code>display_errors</code> a že jste v souboru <code>wp-config.php</code> svého webu nepovolili <code>WP_DEBUG</code>. To zabrání PHP v tisku zpráv, které znečišťují odpověď API."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Pokud to nestačí, je možné, že chybu v aplikaci API způsobuje plugin třetí strany. Zkontrolujte, zda neexistují nějaké zásuvné moduly třetích stran, včetně zásuvných modulů, které musíte použít (<code>mu-plugins</code>), které mohou náhodně narušit zásuvný modul API, a kontaktujte jejich autora."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_HEAD="Aplikace WordPress JSON API odpověděla daty bez JSON"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH1="Aplikace WordPress JSON API má odpovídat daty ve formátu JSON. Váš server vrátil ne-JSON data. To znamená, že je na vašem webu něco rozbité."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH2="Ujistěte se, že žádný kód v .htaccess, pluginy třetích stran ani vlastní kód (včetně souboru <code>functions.php</code> vašeho tématu) neblokují ani jinak neomezují JSON API WordPressu – zcela ani pro neověřený (anonymní) přístup."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="Aplikace Joomla! API odpověděla neočekávaným kódem stavu HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="Plugin API odpověděl neočekávaným kódem stavu HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="Kód stavu HTTP %s znamená, že došlo k chybě serveru. Zkontrolujte, zda neexistují žádné pluginy třetí strany, zejména systémové pluginy, které mohou náhodně poškodit aplikaci Joomla! API a kontaktujte jejich autora."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="Kód stavu HTTP %s znamená, že došlo k chybě serveru. Zkontrolujte, zda neexistují žádné pluginy třetí strany, zejména systémové pluginy, které mohou náhodně poškodit plugin API a kontaktujte jejich autora."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="Kód stavu HTTP 400 obvykle znamená, že váš web může být přístupný pouze omezeným počtem doménových jmen; to, které jste se pokusili použít (<span class=\"font-monospace\">%s</span>), nemusí být jedním z nich."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Pokud používáte Admin Tools Professional, přejděte do administrace webu a klikněte na Komponenty, Admin Tools for Joomla!, Firewall webových aplikací, Konfigurovat WAF, Filtrování požadavků. Zkontrolujte seznam <em>Povolených domén</em> ve spodní části stránky."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Pokud to nebylo příčinou, kontaktujte svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! věří, že váš API token je nesprávný, poškozený nebo vás nemůže přihlásit."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Ujistěte se, že API token, který používáte, patří uživatelskému účtu, který patří do skupiny Super User a uživatel je povolen. Uvědomte si, že požádání o reset hesla dočasně deaktivuje uživatele. Nevěřte svým vzpomínkám nebo předpokladům; zkontrolujte uživatele na vašem webu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Ujistěte se, že pluginy “API Authentication - Web Services Joomla Token” a “User - Joomla API Token” jsou na vašem webu povoleny."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Ujistěte se, že plugin “System - Panopticon Connector for Joomla 3” je na vašem webu povolen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="Je také možné, že něco na vašem serveru nebo plugin na vašem webu poškozuje API token při jeho přenosu na váš web."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Zkontrolujte své nainstalované pluginy Joomla!. Upozorňujeme, že Admin Tools Professional pro Joomla! <em>nezasahuje</em> do API tokenu Joomla!. Pokud to nepomůže, kontaktujte svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="Kód stavu HTTP 406 (Nepřijatelné) znamená, že Joomla! nevidí naši HTTP hlavičku <code>Accept</code> nebo ji plugin na vašem webu upravil způsobem, který vedl k chybě."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Zkontrolujte, že neexistují žádné pluginy <code>system</code> nebo <code>webservices</code>, které mohou poškodit hlavičku HTTP Accept."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Pokud to nepomůže, kontaktujte svého hostitele a požádejte je, aby zkontrolovali, zda je hlavička Accept správně přeposlána na PHP. Měla by být <code>Accept: application/vnd.api+json</code>."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="S největší pravděpodobností plugin <code>system</code> nebo <code>webservices</code> na vašem serveru změnil požadavek, který jsme odeslali, což mělo za následek chybu. Zkontrolujte své nainstalované pluginy."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_HEAD="Aplikace WordPress JSON API odpověděla neočekávaným stavovým kódem HTTP (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_5XX="Stavový kód HTTP %s znamená, že došlo k chybě serveru. Zkontrolujte, zda neexistují nějaké pluginy třetích stran, které by mohly náhodně narušit aplikaci WordPress JSON API, a kontaktujte jejich autora."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_400="Stavový kód HTTP 400 obvykle znamená, že k vašemu webu má přístup pouze omezený počet doménových jmen; Ten, který jste se pokusili použít (<span class=\"font-monospace\">%s</span>), nemusí být jedním z nich. Pokud si nejste jisti, proč tuto zprávu dostáváte, kontaktujte prosím svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_HEAD="WordPress se domnívá, že váš token API je nesprávný, poškozený nebo vás jinak nemůže přihlásit."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH1="Ujistěte se, že API token, který používáte, je aktuální a že jste jej omylem nezkrátili nebo nezahrnuli mezery kolem něj."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH2="Ujistěte se, že je na vašem webu povolen plugin \"Akeeba Panopticon Connector for WordPress\"."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH3="Je také možné, že něco na vašem serveru nebo zásuvný modul na vašem webu poškozuje token API, když je přenášen na váš web."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH4="Zkontrolujte prosím nainstalované pluginy. Vezměte prosím na vědomí, že ne, Admin Tools Professional pro WordPress <em>nezasahuje</em> do tokenu Panopticon API. Pokud to nepomůže, kontaktuj svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_WPGENERIC="S největší pravděpodobností plugin na vašem serveru změnil požadavek, který jsme odeslali, což vedlo k chybě. Zkontrolujte prosím nainstalované pluginy."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! věří, že váš API token je nesprávný, poškozený nebo vás nemůže přihlásit."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Ujistěte se, že API token, který používáte, patří uživatelskému účtu, který patří do skupiny Super User a uživatel je povolen. Uvědomte si, že požádání o reset hesla dočasně deaktivuje uživatele. Nevěřte svým vzpomínkám nebo předpokladům; zkontrolujte uživatele na vašem webu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Ujistěte se, že pluginy “API Authentication - Web Services Joomla Token” a “User - Joomla API Token” jsou na vašem webu povoleny."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Ujistěte se, že plugin “System - Panopticon Connector for Joomla 3” je na vašem webu povolen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="Je také možné, že něco na vašem serveru nebo plugin na vašem webu poškozuje API token při jeho přenosu na váš web."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Zkontrolujte své nainstalované pluginy Joomla!. Upozorňujeme, že Admin Tools Professional pro Joomla! <em>nezasahuje</em> do API tokenu Joomla!. Pokud to nepomůže, kontaktujte svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_HEAD="Váš web se domnívá, že váš token API je nesprávný, poškozený nebo vás jinak nemůže přihlásit."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH1="Ujistěte se, že API token, který používáte, je aktuální a že jste jej omylem nezkrátili nebo nezahrnuli mezery kolem něj."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH2="Ujistěte se, že je na vašem webu povolen plugin \"Akeeba Panopticon Connector for WordPress\"."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH3="Je také možné, že něco na vašem serveru nebo zásuvný modul na vašem webu poškozuje token API, když je přenášen na váš web."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPITOKEN_BLAH4="Zkontrolujte prosím nainstalované pluginy. Vezměte prosím na vědomí, že ne, Admin Tools Professional pro WordPress <em>nezasahuje</em> do tokenu Panopticon API. Pokud to nepomůže, kontaktuj svého hostitele."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Došlo k chybě komunikace s vaším webem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="Komunikační knihovna používaná PHP (cURL) nahlásila následující chybu:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH2="Další informace o chybě naleznete <a href=\"https://curl.se/libcurl/c/libcurl-errors.html\" target=\"_blank\">v referenčních informacích ke kódu chyby knihovny kudrlinkou</a> . Ve většině případů je problém v konfiguraci sítě nebo serveru - buď na serveru, na který jste nainstalovali Panopticon, nebo na serveru, na kterém je váš web - což vyžaduje kontaktování příslušného hostitele, aby vám pomohl s řešením."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH3="Ve vzácných případech může být problém způsoben zásuvným modulem třetí strany – zejména bezpečnostním, cache nebo SEO pluginem – nebo externím CDN, proxy či firewallem, které mohou upravovat nebo přesměrovávat požadavky API, i když by neměly."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Došlo k chybě komunikace s vaším webem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="Komunikační knihovna používaná Panopticonem (<a href=\"https://github.com/guzzle/guzzle\" target=\"_blank\">Guzzle HTTP</a>) nahlásila následující chybu:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Jedná se o neočekávanou situaci, která může znamenat komunikační chybu, kterou jsme dosud neviděli, problém v Guzzle, problém se serverem, na kterém máte nainstalován Panopticon, nebo problém přímo v Panopticonu. Prohledejte otevřené <em>i uzavřené</em> problémy <a href=\"https://github.com/akeeba/panopticon/issues?q=is%3Aissue\" target=\"_blank\">v našem úložišti na GitHubu</a>. Pokud to ještě nikdo nehlásil, otevřete nový problém a my se na to podíváme."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="Název hostitele vašeho webu (<span class=\"font-monospace\">%s</span>) nelze převést na IP adresu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK="Zkontrolujte následující:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="Zadali jste URL správně? Ověřte si to pečlivě, překlepy jsou snadné a těžko odhalitelné!"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="Koupili jste doménu teprve nedávno, přiřadili ji k serveru nebo přesunuli web mezi poskytovateli hostingu? Mějte na paměti, že propagace DNS trvá od 5 minut do několika dní. Navíc kvůli distribuované povaze DNS je možné, že vy web vidíte <em>ze svého zařízení</em>, ale server, na kterém je nainstalovaný Panopticon, ho nevidí."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Pokud se doménové jméno vašeho webu překládá na adresu IPv6 – ale nikoli IPv4 – ujistěte se, že server, na kterém je nainstalovaný Panopticon, podporuje IPv6. Možná budete muset požádat svého poskytovatele hostingu, aby to potvrdil."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_HEAD="Konektor Akeeba Panopticon není na vašem webu povolen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_BLAH="Váš web Joomla! musí mít nainstalovaný a povolený konektor Akeeba Panopticon, aby s ním mohl Panopticon pracovat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK="Zkontrolujte následující:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK1="Máte na svém webu nainstalovaný balíček konektoru Akeeba Panopticon?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK2="Přejděte na Systém, Správa, Rozšíření. Je “Konektor Akeeba Panopticon” <em>komponenta</em> nainstalována a povolena?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK3="Přejděte na Systém, Správa, Rozšíření. Je “Konektor Akeeba Panopticon” <em>balíček</em> nainstalován a povolen?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK4="Přejděte na Systém, Správa, Pluginy. Je plugin “Web Services - Panopticon” povolen?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_HEAD="Plugin “System - Panopticon Connector for Joomla 3” není na vašem webu povolen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_BLAH="Váš web Joomla! musí mít nainstalovaný a povolený plugin “System - Panopticon Connector for Joomla 3”, aby s ním mohl Akeeba Panopticon pracovat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_HEAD="Plugin Akeeba Panopticon Connector pro WordPress není na vašem webu povolen"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_BLAH="Váš web WordPress musí mít nainstalovaný a povolený plugin Akeeba Panopticon Connector for WordPress, aby s ním Akeeba Panopticon mohl pracovat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK="Zkontrolujte prosím následující:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK1="Nainstalovali jste na svůj web plugin Akeeba Panopticon Connector for WordPress?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK2="Přejděte na wp-admin, Pluginy. Je plugin \"Akeeba Panopticon Connector for WordPress\" nainstalován <em>a</em> aktivován?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Používáte samopodepsaný certifikát SSL/TLS"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Používáte HTTPS pro přístup na svůj web, ale certifikát SSL/TLS, který používáte, není podepsán komerční, známou certifikační autoritou."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Tento problém můžete vyřešit jedním z následujících způsobů:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Použijte prostý HTTP. Toto je nejméně bezpečná možnost, proto ji důrazně nedoporučujeme."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Nainstalujte certifikát SSL/TLS podepsaný komerční, dobře známou certifikační autoritou. Většina serverů umožňuje používat <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a>, který vydává platné, podepsané a plně funkční certifikáty SSL/TLS zdarma."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Pokud jste v intranetu, extranetu nebo z jiného důvodu potřebujete spravovat vlastní certifikační autoritu, můžete Panopticon říci, aby vaši vlastní certifikační autoritu rozpoznal. Vytvořte soubor <code>cacert.pem</code> ve složce <code>user_code</code> vaší instalace Panopticon. Zkopírujte a vložte veřejné certifikáty vaší certifikační autority (CA) ve formátu <a href=\"https://en.wikipedia.org/wiki/Privacy-Enhanced_Mail\" target=\"_blank\">PEM</a>. Tyto certifikáty se načtou <em>vedle</em> standardních souborů CA automaticky, což Panopticonu umožní přistupovat na váš web."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="Certifikát SSL/TLS vašeho webu má problém"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Používáte HTTPS pro přístup na svůj web, ale certifikát SSL/TLS, který používáte, se zdá mít problém."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Zkontrolujte následující:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="Je certifikát SSL/TLS pro správné doménové jméno? Pokud používáte výchozí certifikát SSL/TLS poskytnutý vaším poskytovatelem hostingu, je omezen na dočasné doménové jméno používané k nastavení webu, nikoli na vaše skutečné doménové jméno. Budete muset nainstalovat certifikát SSL/TLS podepsaný komerční, dobře známou certifikační autoritou. Většina serverů umožňuje používat <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a> zdarma. Zkontrolujte, že je skutečně používán správný certifikát."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="Vypršela platnost certifikátu SSL/TLS? V takovém případě ho musíte obnovit. Pokud používáte Let's Encrypt, certifikát má krátkou dobu platnosti (obvykle 90 dní) a měl by být automaticky obnovován vaším poskytovatelem hostingu. Pokud se tak nestalo, kontaktujte svého poskytovatele hostingu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="Byl certifikát SSL/TLS odvolán? Certifikační autority nebo vlastníci certifikátu SSL/TLS ho mohou odvolat. Certifikační autority to například dělají, pokud mají podezření na podvod nebo pokud se domnívají, že jejich infrastruktura byla kompromitována. <a href=\"https://www.namecheap.com/support/knowledgebase/article.aspx/9968/38/how-to-check-the-certificate-revocation-status/\" target=\"_blank\">Zkontrolujte stav odvolání certifikátu</a>. Pokud byl odvolán, budete potřebovat nový certifikát."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Je možné, že váš server zobrazuje nesprávný certifikát SSL/TLS? K tomu může dojít, pokud jste nedávno přešli na nový certifikát. Při změně certifikátu je třeba webový server znovu načíst nebo restartovat. Kontaktujte prosím svého poskytovatele hostingu nebo správce systému, aby to zkontroloval."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="Plugin “Web Services - Installer” je na vašem webu zakázán"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH1="Panopticon používá služby Joomla! API Application poskytované pluginem “Web Services - Installer” k zajištění toho, že všechna potřebná rozšíření jsou na vašem webu nainstalována a publikována."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH2="Přejděte do administrace webu a klikněte na Systém, Spravovat, Rozšíření. Vyhledejte plugin \"Web Services - Installer\" a povolte ho."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_HEAD="Nelze komunikovat s pluginem \"System - Panopticon Connector for Joomla 3\" na vašem webu"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon používá svůj vlastní plugin “System - Panopticon Connector for Joomla 3” k poskytování potřebného API"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Přejděte do administrace webu a klikněte na Rozšíření, Pluginy. Vyhledejte plugin \"System - Panopticon Connector for Joomla 3\" a povolte ho."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Pokud jste již tento plugin povolili, změňte níže uvedenou URL koncového bodu na <code>%s</code>"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_HEAD="Váš web se zdá být chráněn heslem na úrovni webového serveru"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH1="Váš web odpověděl kódem stavu HTTP 401 Unauthorized při pokusu o přístup k API. To obvykle znamená, že jste aplikovali ochranu heslem na úrovni webového serveru."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH2="Odstraňte ochranu heslem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3="Vezměte prosím na vědomí, že ochrana heslem mohla být použita pouze na adresář <code>administrator</code> vašeho webu. V takovém případě stačí nastavit heslo pro adresář správce pouze v Panopticon."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3_J3="Upozorňujeme, že ochrana heslem byla aplikována na kořenovou složku vašeho webu."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_HEAD="Nelze komunikovat s pluginem \"Akeeba Panopticon Connector for WordPress\" na vašem webu"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH1="Panopticon používá vlastní plugin \"Akeeba Panopticon Connector for WordPress\" pro komunikaci s vaším webem WordPress. Ujistěte se prosím, že máte tento plugin nainstalovaný a povolený."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH2="Přejděte do administrace wp-admin vašeho webu a klikněte na Pluginy. Vyhledejte plugin Panopticon connector a ujistěte se, že je aktivní."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_HEAD="Uh oh. Něco je úplně špatně…"
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Normálně můžeme zjistit povahu chyby připojení a poskytnout užitečné informace pro řešení problémů nebo alespoň ukázat na nějaký užitečný externí zdroj pro řešení problémů. Pokud to není možné, můžeme alespoň vytisknout chybovou zprávu, která nám pomůže vám pomoci při řešení problému."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Namísto toho jsme obdrželi chybu, pro kterou bychom vám měli poskytnout informace pro řešení potíží."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH3="Vymažte prosím všechny soubory a složky uvnitř složky <code>tmp</code> aplikace Akeeba Backup. Pokud si nejste jisti, kde se nachází, přejděte na stránku Konfigurace v Akeeba Backup a zkontrolujte možnost Dočasný adresář."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_INFO="Informace o řešení problémů"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_STATUS="HTTP stav"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_HTTP_BODY="HTTP tělo"
