PANOPTICON_SETUP_LBL_HEAD_WELCOME="Vítejte v %s"
PANOPTICON_SETUP_LBL_WELCOME_HERO_TEXT="Panopticon můžete použít k monitorování vašich Joomla!® stránek. Nejprve ale musíme ověřit, že váš server splňuje minimální požadavky."
PANOPTICON_SETUP_BTN_LETS_GO="Jdeme na to!"
PANOPTICON_SETUP_SESSION_LBL_WARNING_HEADER="Vytvořit novou cestu pro ukládání relací"
PANOPTICON_SETUP_SESSION_LBL_WARNING_BODY="Cesta pro zápis relací nastavená v PHP není zapisovatelná, přihlášení je proto nemožné. Pro vyřešení tohoto problému se Panopticon pokusí vytvořit cestu pro ukládání relací v adresáři <code>%s</code>. Aby to bylo možné, musíte zadat přístupové údaje FTP nebo SFTP ke kořenovému adresáři vašeho webu. Pokud si nejste jisti tímto nastavením, obraťte se prosím na svého poskytovatele hostingu."
PANOPTICON_SETUP_SESSION_LBL_ERROR_HEADER="Při pokusu o vytvoření cesty pro ukládání relací došlo k chybě"
PANOPTICON_SETUP_LBL_FS_DRIVER_SESSION="Způsob připojení"
PANOPTICON_SETUP_BTN_MAKE_SESSION_FOLDER="Vytvořit cestu pro relaci"
PANOPTICON_SETUP_BTN_SESSION_FIXED_IT="Opravil jsem to sám; zkontrolujte znovu"
PANOPTICON_SETUP_LBL_FS_DRIVER="Ovladač souborového systému"
PANOPTICON_SETUP_LBL_FS_DRIVER_FILE="Přímé zápisy souborů"
PANOPTICON_SETUP_LBL_FS_DRIVER_FTP="FTP - File Transfer Protocol"
PANOPTICON_SETUP_LBL_FS_DRIVER_HELP="Na některých sdílených hostingových prostředích je k zápisu souborů vašeho webu nutné použít FTP nebo SFTP."
PANOPTICON_SETUP_LBL_FS_DRIVER_SFTP="SFTP - Secure File Transfer Protocol (přes SSH)"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="(S)FTP adresář"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="(S)FTP adresář k instalaci Panopticonu. Na FTP serverech se to neshoduje s cestou souborového systému. Pokud si nejste jisti, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="(S)FTP název serveru"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="Název hostitele nebo IP adresa vašeho (S)FTP serveru, např. <code>ftp.example.com</code> nebo <code>127.0.0.1</code>. Musíte to zadat <em>bez</em> předpony <code>ftp://</code>, <code>sftp://</code> nebo <code>ssh://</code>. Pokud si nejste jistí tímto a dalšími nastaveními FTP, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Použít pasivní režim"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Pouze pro FTP. Pokud je vybráno, Panopticon použije FTP pasivní režim. Většina FTP serverů to vyžaduje. Pokud váš hostitel vyžaduje FTP aktivní režim, zrušte zaškrtnutí tohoto pole. Pokud si nejste jistí, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="(S)FTP heslo"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="Heslo, které používáte k připojení k vašemu (S)FTP serveru. Pokud si nejste jistí, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="(S)FTP port serveru"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="Číslo portu, na kterém naslouchá váš (S)FTP server. Obvykle je to 21 pro FTP a 22 pro SFTP. Pokud si nejste jisti, zeptejte se svého poskytovatele hostingu."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="Použít SSL"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Pouze pro FTP, ignorováno pro SFTP. Pokud je vybráno, Panopticon použije FTP přes Explicit SSL (FTP/S). Upozorňujeme, že to není zaměňováno se SFTP, což je zcela odlišná věc."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="(S)FTP uživatelské jméno"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="Uživatelské jméno, které používáte k připojení k vašemu (S)FTP serveru. Pokud si nejste jistí, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript je zakázán"
PANOPTICON_SETUP_LBL_NOSCRIPT_EXPLAIN="Abyste mohli použít Panopticon, musíte ve svém prohlížeči povolit JavaScript."
PANOPTICON_SETUP_LBL_BROKEN_JS_HEAD="Požadovaný JavaScript se nenačítá"
PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="Soubory JavaScript pro Panopticon se nenačítají správně. Ujistěte se, že vaše instalace nepostrádá soubory, zkontrolujte oprávnění a vymažte mezipaměť prohlížeče."
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_OK="Všechny systémy jsou připraveny!"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_OK="Váš server splňuje všechny požadavky."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_IMPROVE="Některá volitelná nastavení lze vylepšit (viz níže)."
PANOPTICON_SETUP_LBL_PRECHECK_YOU_MAY_CONTINUE="Můžete pokračovat v instalaci Panopticonu."
PANOPTICON_SETUP_LBL_PRECHECK_BTN_SHOW_OPTIONAL_SETTINGS="Zobrazit volitelná nastavení"
PANOPTICON_SETUP_LBL_PRECHECK_HEAD_FAIL="Některé požadavky nejsou splněny"
PANOPTICON_SETUP_LBL_PRECHECK_REQUIREMENTS_FAIL="Váš server nesplňuje všechny minimální požadavky."
PANOPTICON_SETUP_LBL_PRECHECK_RECOMMENDED_FAIL="Navíc lze vylepšit některá volitelná nastavení (viz níže)."
PANOPTICON_SETUP_LBL_PRECHECK_CANNOT_CONTINUE="Před instalací Panopticonu je potřeba tyto problémy vyřešit."
