PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_MUST_ENABLE_FOR_ISSUE="Než se pokusíte nahlásit problém s tímto připojením, přejděte do Administrace, Konfigurace systému, Systém a povolte ladění systému. Poté se vraťte sem a zkuste stejné připojení znovu. Obdržíte podrobné informace pro řešení problémů, které musíte zahrnout do svého problému."
PANOPTICON_SITE_LBL_NOTES_HEAD="Poznámky"
PANOPTICON_SITE_LBL_NOTES_HELP="Volné poznámky o webu, které jsou zobrazeny pouze uživatelům, kteří mají na webu práva k úpravám."
PANOPTICON_SITE_LBL_NOTES_HELP_NO_PRIVILEGED="<strong>NEZAHRNUJTE PRIVILEGOVANÉ INFORMACE</strong>, jako jsou hesla, do poznámek. Obsah tohoto pole je uložen <em>nezašifrovaný</em> v databázi. Pokud chcete uložit privilegované informace, důrazně doporučujeme používat správce hesel s možností ukládání libovolných informací, jako jsou KeePassXC, Strongbox, 1Password atd."
