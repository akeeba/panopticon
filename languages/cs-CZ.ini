PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIPS="Tipy pro připojení Akeeba Panopticon k Akeeba Backup Professional"
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1="Ujistěte se, že máte nainstalovanou a povolenou komponentu Akeeba Backup Professional a plugin Web Services - Akeeba Backup na vašem webu. Akeeba Backup Core <em>není</em> kompatibilní s Akeeba Panopticon."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1_WP="Ujistěte se, že máte nainstalovaný a povolený plugin Akeeba Backup Professional na vašem webu. Akeeba Backup Core <em>není</em> kompatibilní s Akeeba Panopticon."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2="Přihlaste se do administrace webu. Přejděte na Komponenty, Akeeba Backup, Ovládací panel. Klikněte na Možnosti, Záloha z prohlížeče a nastavte \"Povolit JSON API (vzdálená záloha)\" na Ano. Zadejte nové \"Tajné slovo\"; nové náhodné bezpečné tajné slovo lze vygenerovat na <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Poté klikněte na Uložit &amp; Zavřít na panelu nástrojů."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2_WP="Přihlaste se do administrace webu. Přejděte na Akeeba Backup, Konfigurace systému, Veřejné API a nastavte \"Povolit JSON API (vzdálená záloha)\" na Ano. Zadejte nový \"Tajný klíč\"; nový náhodný bezpečný klíč lze vygenerovat na <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Poté klikněte na Uložit &amp; Zavřít na panelu nástrojů."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Ujistěte se, že žádná rozšíření třetích stran (zejména bezpečnostní rozšíření) ani nastavení konfigurace serveru nebrání přístupu ke složce <code>api</code> vašeho webu. Ověřte také, že odpovědi z tohoto souboru <em>nejsou</em> ukládány do mezipaměti žádnými pluginy třetích stran na vašem webu, webovým serverem ani žádným CDN / cachovacím proxy, který může být nakonfigurován před vaším webem."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3_WP="Ujistěte se, že žádné pluginy třetích stran (zejména bezpečnostní pluginy) ani nastavení konfigurace serveru nebrání přístupu k souboru <code>wp-admin/admin-ajax.php</code> vašeho webu. Ověřte také, že odpovědi z tohoto souboru <em>nejsou</em> ukládány do mezipaměti žádnými pluginy třetích stran na vašem webu, webovým serverem ani žádným CDN / cachovacím proxy, který může být nakonfigurován před vaším webem."
