PANOPTICON_SYSCONFIG_LBL_FIELD_SESSION_USE_DEFAULT_PATH_HELP="Pokud je povoleno, Panopticon používá <code>session.save_path</code> z vaší konfigurace PHP pro ukládání datových souborů relací PHP. Pokud je zakázáno, Panopticon používá složku <code>tmp/session</code> pod kořenem webu."
