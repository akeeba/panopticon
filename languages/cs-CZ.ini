PANOPTICON_SETUP_LBL_REC_FTP="Rozšíření PHP FTP"
PANOPTICON_SETUP_LBL_REC_SSH2="Podpora SFTP"
PANOPTICON_SETUP_LBL_DATABASE_HEAD_TEXT="Panopticon potřebuje k práci databázi. Nejprve vytvořte databázi - a uživatele databáze - na vašem serveru. Poté zadejte níže uvedené přihlašovací údaje k databázi. Pokud je něco nejasného, obraťte se na společnost, která hostuje vaši stránku."
PANOPTICON_SETUP_LBL_DATABASE_DRIVER="Typ databáze"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_HELP="To je obvykle MySQLi (<em>s</em> koncovým \"i\")"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQL="MySQL (zastaralý ovladač pro MySQL - vyhněte se použití)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQLI="MySQLi (preferovaný ovladač pro MySQL)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDO="PDO"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDOMYSQL="MySQL (PDO)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLAZURE="Windows Azure SQL Database"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLITE="SQLite"
PANOPTICON_SETUP_LBL_DATABASE_HOST="Název hostitele databázového serveru"
PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Název hostitele nebo IP adresa databázového serveru (obvykle: localhost). Upozorňujeme, že localhost a 127.0.0.1 jsou z pohledu MySQL <em>velmi</em> odlišné; možná budete muset vyzkoušet obě možnosti, abyste zjistili, která funguje s vaším databázovým serverem. Pokud váš server používá nestandardní port, připojte jej za název hostitele předponou s dvojtečkou, např. 127.0.0.1:1234 pro použití databázového serveru na 127.0.0.1 naslouchajícího na portu 1234."
PANOPTICON_SETUP_LBL_DATABASE_NAME="Název databáze"
PANOPTICON_SETUP_LBL_DATABASE_NAME_HELP="Název vaší databáze. Většina hostitelů používajících cPanel, Plesk a další hlavní hostingové panely bude dávat názvy databází jako abcdef_username, kde abcdef je vaše uživatelské jméno v ovládacím panelu hostingu. Pokud si nejste jisti, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_DATABASE_PASS="Heslo"
PANOPTICON_SETUP_LBL_DATABASE_PASS_HELP="Heslo, které používáte k připojení k vaší databázi."
PANOPTICON_SETUP_LBL_DATABASE_PREFIX="Předpona názvu tabulek databáze"
PANOPTICON_SETUP_LBL_DATABASE_PREFIX_HELP="Společná předpona názvů všech tabulek databáze patřících této instalaci Panopticonu."
PANOPTICON_SETUP_LBL_DATABASE_USER="Uživatelské jméno"
PANOPTICON_SETUP_LBL_DATABASE_USER_HELP="Uživatelské jméno, které používáte k připojení k vaší databázi. Většina hostitelů používajících cPanel, Plesk a další hlavní hostingové panely bude dávat uživatelská jména jako abcdef_username, kde abcdef je vaše uživatelské jméno v ovládacím panelu hostingu. Pokud si nejste jisti, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION="Připojit se pomocí SSL certifikátu"
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION_HELP="Má se připojení k databázi provést pomocí certifikátu SSL? To lze použít místo ověřování uživatelským jménem a heslem (šifrované připojení s ověřením certifikátem) nebo <em>vedle</em> ověřování uživatelským jménem a heslem (šifrované připojení s ověřením heslem). Pokud nevíte, co to znamená, nastavte tuto možnost na Ne a ignorujte i několik následujících možností."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER="Metody šifrování SSL/TLS"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER_HELP="Zadejte seznam metod šifrování pro připojení pomocí SSL certifikátů oddělených dvojtečkami. Pokud zůstane prázdné, bude použito výchozí nastavení (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) (doporučeno)."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA="Soubor certifikační autority (CA)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA_HELP="Absolutní cesta k souboru PEM certifikátu certifikační autority (CA) vašeho databázového serveru, např. <code>/home/myuser/ca.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY="Soubor privátního klíče uživatele databáze"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY_HELP="Absolutní cesta k souboru PEM soukromého klíče vašeho databázového uživatele, např. <code>/home/myuser/myuser-key.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT="Soubor veřejného klíče (certifikátu) uživatele databáze"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT_HELP="Absolutní cesta k souboru PEM veřejného klíče (certifikátu) vašeho databázového uživatele, např. <code>/home/myuser/myuser.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT="Ověřit certifikát serveru"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Nastavte na Ano, chcete-li ověřit certifikát, který nám server odesílá. Certifikát se ověřuje vůči souboru certifikační autority (CA), který jste zadali. Pokud se zobrazují chyby připojení, nastavte tuto možnost na Ne; některá nastavení (zejména ta vygenerovaná nástrojem <code>mysql_ssl_rsa_setup</code>) mohou při povoleném ověřování certifikátu bránit připojení. Pokud povolíte ověřování a pole pro soubor CA ponecháte prázdné, certifikát serveru bude ověřen vůči souborům certifikační autority, které váš server zná; viz možnosti PHP <code>openssl.cafile</code> a <code>openssl.capath</code>."
PANOPTICON_SETUP_DIRECTFTP_HOST_TITLE="Název hostitele"
PANOPTICON_SETUP_DIRECTFTP_HOST_DESCRIPTION="Název hostitele FTP serveru bez protokolu. Nepoužívejte <s><code>ftp://example.com</code></s>; použijte <code>example.com</code>."
PANOPTICON_SETUP_DIRECTFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTFTP_PORT_DESCRIPTION="TCP/IP port FTP serveru. Obvykle 21. Zeptejte se prosím svého poskytovatele hostingu."
PANOPTICON_SETUP_DIRECTFTP_USER_TITLE="Uživatelské jméno"
PANOPTICON_SETUP_DIRECTFTP_USER_DESCRIPTION="Uživatelské jméno, rozlišující velká a malá písmena."
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_TITLE="Heslo"
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_DESCRIPTION="Heslo rozlišující velká a malá písmena. Nejlépe používejte hesla sestávající pouze z a-z, A-Z, 0-9, pomlček, teček, podtržítek a vykřičníků. Ostatní znaky mohou spustit ochranu webového serveru proti hackerům."
PANOPTICON_SETUP_DIRECTFTP_FTPS_TITLE="Použít FTP přes SSL (FTPS)"
PANOPTICON_SETUP_DIRECTFTP_FTPS_DESCRIPTION="Připojit se k FTP serveru pomocí SSL-šifrovaného připojení. <strong>To není totéž jako SFTP, SCP nebo \"Secure FTP\"</strong>. Pokud váš server tuto metodu nepodporuje, zobrazí se chyby připojení."
PANOPTICON_SETUP_DIRECTFTP_INITDIR_TITLE="Počáteční adresář"
PANOPTICON_SETUP_DIRECTFTP_INITDIR_DESCRIPTION="Absolutní FTP cesta k adresáři, kam budou soubory nahrány. Pokud si nejste jisti, připojte se k serveru přes FileZilla, přejděte do požadovaného adresáře a zkopírujte cestu zobrazenou v pravém panelu nad seznamem adresářů. Obvykle je to něco jako <code>/public_html</code> nebo <code>/httpdocs</code>."
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_TITLE="Pasivní režim"
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_DESCRIPTION="Používá pasivní režim FTP při přenosu dat. Měl by být povolen na všech serverech s portovým firewallem, což jsou prakticky všechny servery v dnešní době."
PANOPTICON_SETUP_DIRECTFTP_TEST_DESCRIPTION="Testuje připojení FTP."
PANOPTICON_SETUP_DIRECTFTP_TEST_FAIL="Nepodařilo se připojit k FTP serveru."
PANOPTICON_SETUP_DIRECTFTP_TEST_OK="Úspěšné připojení k FTP serveru."
PANOPTICON_SETUP_DIRECTFTP_TEST_TITLE="Testovat připojení FTP"
PANOPTICON_SETUP_DIRECTSFTP_HOST_TITLE="Název hostitele"
PANOPTICON_SETUP_DIRECTSFTP_HOST_DESCRIPTION="Název hostitele SFTP serveru bez protokolu. Nepoužívejte <s><code>sftp://example.com</code></s>; použijte <code>example.com</code>."
PANOPTICON_SETUP_DIRECTSFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTSFTP_PORT_DESCRIPTION="TCP/IP port pro SFTP. Obvykle 22. Pokud si nejste jisti, požádejte svého hostitele."
PANOPTICON_SETUP_DIRECTSFTP_USER_TITLE="Uživatelské jméno"
PANOPTICON_SETUP_DIRECTSFTP_USER_DESCRIPTION="Uživatelské jméno, rozlišující velká a malá písmena. Váš SFTP server musí umožňovat autentizaci uživatelským jménem a heslem."
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_TITLE="Heslo"
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_DESCRIPTION="SFTP heslo, rozlišující velká a malá písmena."
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_TITLE="Počáteční adresář"
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_DESCRIPTION="Adresář SFTP kořene webu. Pokud si nejste jisti, použijte klienta SFTP, připojte se k serveru, přejděte do adresáře a zkopírujte zde zobrazenou cestu. Musí být absolutní, např. <code>/home/myuser/public_html</code>, nikoli jen <s><code>public_html</code></s>."
PANOPTICON_SETUP_DIRECTSFTP_TEST_DESCRIPTION="Otestujte připojení k SFTP serveru."
PANOPTICON_SETUP_DIRECTSFTP_TEST_FAIL="Nepodařilo se připojit k SFTP serveru. Chybová zpráva byla:"
PANOPTICON_SETUP_DIRECTSFTP_TEST_OK="Úspěšné připojení k SFTP serveru."
PANOPTICON_SETUP_DIRECTSFTP_TEST_TITLE="Otestovat SFTP připojení"
PANOPTICON_SETUP_LBL_SETUP_HEAD_TEXT="Přístup k Panopticonu je chráněn přihlášením. Nyní vytvoříte uživatelský účet s plnými administrátorskými právy. Tento uživatel můžete upravit a vytvořit další uživatele po dokončení instalačního procesu."
PANOPTICON_SETUP_LBL_USER_NAME="Celé jméno"
PANOPTICON_SETUP_LBL_USER_NAME_HELP="Zadejte své celé jméno. Bude použito vždy, když bude vaše instalace Panopticonu potřebovat vám poslat e-mail."
PANOPTICON_SETUP_LBL_USER_USERNAME="Uživatelské jméno"
PANOPTICON_SETUP_LBL_USER_USERNAME_HELP="Uživatelské jméno, které budete používat pro přihlášení do Panopticon. Nejlépe používejte pouze malá písmena a-z a čísla 0-9."
PANOPTICON_SETUP_LBL_USER_PASSWORD="Heslo"
PANOPTICON_SETUP_LBL_USER_PASSWORD_HELP="Heslo, které použijete pro přihlášení do Panopticonu. Heslo rozlišuje velká a malá písmena, což znamená, že abc, Abc a ABC jsou tři <em>různá</em> hesla."
PANOPTICON_SETUP_LBL_USER_PASSWORD2="Opakujte heslo"
PANOPTICON_SETUP_LBL_USER_PASSWORD2_HELP="Prosím, zopakujte výše zadané heslo. Chceme se ujistit, že jste ho omylem nezadali chybně."
PANOPTICON_SETUP_LBL_USER_EMAIL="E-mailová adresa"
PANOPTICON_SETUP_LBL_USER_EMAIL_HELP="Zadejte svou e-mailovou adresu. Bude použita vždy, když bude vaše instalace Panopticonu potřebovat vám poslat e-mail. Tato e-mailová adresa, stejně jako všechny uživatelské informace, <em>nebudou</em> přeneseny autorům Panopticonu."
PANOPTICON_SETUP_LBL_TIMEZONE="Časové pásmo"
PANOPTICON_SETUP_LBL_TIMEZONE_HELP="Všechny datumy a časy budou vyjádřeny v tomto časovém pásmu."
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_HEAD="Panopticon ještě není připraven"
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_BODY="Uložení konfiguračního souboru <code>config.php</code> do složky, do které instalujete Panopticon, selhalo. Budete muset tento soubor vytvořit ručně."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_HEAD="Vytvořit konfigurační soubor"
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1="Vytvořte soubor s názvem <code>config.php</code> a ponechte jej otevřený ve svém editoru."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1_DETAIL="Použijte jednoduchý textový editor jako Notepad na Windows, BBEdit na macOS, gEdit nebo Kate na Linuxu."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP2="Vraťte se do tohoto okna a klikněte na tlačítko „Kopírovat do schránky“."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP3="Přepněte zpět do svého editoru a vložte. Poté soubor uložte."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4="Nahrajte soubor <code>config.php</code> do své instalace Panopticonu."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4_DETAIL="Nahrajte do složky, do které instalujete Panopticon. To je složka se souborem <code>index.php</code> systému Panopticon."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP5="Vraťte se do tohoto okna a klikněte na tlačítko „Pokračovat“."
PANOPTICON_SETUP_BTN_COPY_TO_CLIPBOARD="Kopírovat do schránky"
PANOPTICON_SETUP_LBL_CRON_HEAD="Nastavit CRON úlohu"
PANOPTICON_SETUP_LBL_CRON_SUBHEAD="Panopticon používá mnoho automatizace, aby vám usnadnil život. K tomu musíte nastavit CRON úlohu, která se bude spouštět každou minutu."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_CTA="Nastavte CRON úlohu pomocí jedné z níže uvedených metod. Poté počkejte až minutu, než se tato stránka změní."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_BREATHE="Vydechněte. Toto je poslední krok instalace. Jste téměř hotovi."
PANOPTICON_SETUP_LBL_CRON_CLI_TABHEAD="CLI"
PANOPTICON_SETUP_LBL_CRON_WEB_TABHEAD="Web"
PANOPTICON_SETUP_LBL_CRON_LBL_INSTRUCTIONS="Pokyny"
PANOPTICON_SETUP_LBL_CRON_LBL_TROUBLESHOOTING="Problém? Seznamte se s řešením!"
PANOPTICON_SETUP_LBL_CRON_LBL_IS_THIS_RIGHT_FOR_ME="Je tato metoda pro mě správná?"
PANOPTICON_SETUP_LBL_CRON_LBL_PROS="Klady"
PANOPTICON_SETUP_LBL_CRON_LBL_CONS="Nevýhody"
PANOPTICON_SETUP_LBL_CRON_LBL_TARGET_AUDIENCE="Cílová skupina"
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_HEAD="Ujistěte se, že CRON úloha běží <em>každou minutu</em>."
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_BODY="Spouštění CRON úlohy méně často vede k zastaralým informacím a nespolehlivosti, včetně rozbitých stránek kvůli neúplným aktualizacím jádra Joomla!&reg;."
PANOPTICON_SETUP_LBL_CRON_CLI_CREATE_A_JOB="Přejděte na svůj hostingový ovládací panel. Vytvořte novou CRON úlohu. Nastavte ji tak, aby běžela <strong>každou minutu</strong>. Použijte následující příkazový řádek."
PANOPTICON_SETUP_LBL_CRON_REPLACE_PHP_CLI="Nahraďte <i>/path/to/php</i> cestou ke spustitelnému souboru PHP %s CLI. Ujistěte se, že jde o spustitelný soubor PHP CLI, <strong>nikoli</strong> PHP CGI/FastCGI."
PANOPTICON_SETUP_LBL_CRON_IF_UNSURE="Pokud si nejste jistí, co některé nebo všechny z výše uvedeného znamenají, požádejte svého hostitele."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_HEAD="CRON úloha neběží"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_1="Odstraňte <code>2>&1</code> z příkazového řádku CRON. Když se CRON příkaz znovu spustí, obdržíte e-mail s chybou (pokud je váš hostingový účet nakonfigurován tak, aby vám posílal výstupy z CRON úloh). Pomocí toho zjistíte, co se děje."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_2="Pokud se přesto zdá, že se nic neděje, obraťte se na svého poskytovatele hostingu. Buď váš účet nedostává výstup CRON úloh, nebo se CRON úlohy vůbec nevykonávají (ačkoli je to nepravděpodobné, několikrát jsme to viděli)."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_HEAD="Dostávám „Status: 403 Forbidden“ při spuštění CRON úlohy"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_1="Používáte PHP-CGI/FastCGI spustitelný soubor. Jak bylo uvedeno výše, musíte nahradit <em>/path/to/php</em> cestou k <strong>PHP CLI</strong> spustitelnému souboru."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_2="Zeptejte se svého poskytovatele hostingu na správnou cestu. Pokud vám tuto cestu dal sám poskytovatel, eskalujte svůj požadavek a vyžádejte si konzultaci s technikem. Pro ně je triviální správnou cestu sdělit."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_HEAD="Dostávám „Akeeba Panopticon vyžaduje PHP %s nebo novější“."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_1="Používáte PHP CLI spustitelný soubor pro nesprávnou verzi PHP ve své CRON úloze."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_2="Většina serverů má nainstalováno více verzí PHP. Musíte požádat svého poskytovatele hostingu, aby vám dal cestu ke spustitelnému souboru PHP CLI pro PHP %s, a tu pak použijte v příkazovém řádku CRON úlohy."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_HEAD="Hostitel povoluje pouze URL v CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_INFO="Klikněte na záložku <strong>Web</strong> výše."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_HEAD="Hostitel nemá funkci CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_1="Důrazně doporučujeme, abyste použili jiného hostitele."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_2="Panopticon je užitečný pouze tehdy, když jeho automatizační funkce běží konzistentně a spolehlivě. To vyžaduje, aby CRON úloha běžela každou minutu - <em>1440krát denně</em>. To může být drahé při použití služby třetí strany; asi 10 $ za den! Místo toho můžete utratit tolik peněz <em>za měsíc</em> za slušného hostitele, který podporuje skutečné, příkazové CRON úlohy."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_3="Pokud máte levnější způsob, jak spouštět CRON úlohy vzdáleně (např. jiný server pod vaší kontrolou), klikněte na záložku <strong>Web</strong>, kde se dozvíte, jak to udělat."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_4="<strong>Nešetřete na frekvenci CRON úloh!</strong> Spouštění CRON úloh méně často způsobí, že Panopticon bude nespolehlivý a může dokonce poškodit vaše stránky kvůli neúplným aktualizacím jádra Joomla&reg;."
PANOPTICON_SETUP_LBL_CRON_CLI_PROS_1="Spolehlivější"
PANOPTICON_SETUP_LBL_CRON_CLI_PROS_2="Nulové náklady"
PANOPTICON_SETUP_LBL_CRON_CLI_PROS_3="Rychlejší"
PANOPTICON_SETUP_LBL_CRON_CLI_CONS_1="Někteří poskytovatelé to nepodporují"
PANOPTICON_SETUP_LBL_CRON_CLI_CONS_2="Složitější nastavení"
PANOPTICON_SETUP_LBL_CRON_CLI_TARGET_1="Doporučená metoda pro většinu uživatelů"
PANOPTICON_SETUP_LBL_CRON_CLI_TARGET_2="Jediná podporovaná metoda pro desítky až stovky monitorovaných stránek"
PANOPTICON_SETUP_LBL_CRON_WEB_IF_URL_CRON="Pokud váš poskytovatel hostingu používá CRON úlohy na bázi URL nebo pokud používáte systém třetí strany, který přijímá URL, použijte následující URL:"
PANOPTICON_SETUP_LBL_CRON_WEB_IF_REGULAR_CRON="Pokud nastavujete pravidelnou CRON úlohu, použijte jeden z následujících příkazových řádků podle toho, který příkaz je nainstalován na vašem systému:"
PANOPTICON_SETUP_LBL_CRON_WEB_WGET="<strong>wGET</strong> (většina komerčních hostitelů a Linuxových serverů)"
PANOPTICON_SETUP_LBL_CRON_WEB_CURL="<strong>cURL</strong> (macOS, některé Linuxové servery)"
PANOPTICON_SETUP_LBL_CRON_WEB_POWERSHELL="<strong>PowerShell</strong> (Windows)"
PANOPTICON_SETUP_LBL_CRON_WEB_PROS_1="Obvykle snadnější nastavení"
PANOPTICON_SETUP_LBL_CRON_WEB_PROS_2="Funguje s hostiteli, kteří nabízejí pouze URL CRON"
PANOPTICON_SETUP_LBL_CRON_WEB_PROS_3="Funguje s hostiteli bez podpory CRON"
PANOPTICON_SETUP_LBL_CRON_WEB_CONS_1="Méně spolehlivý"
PANOPTICON_SETUP_LBL_CRON_WEB_CONS_2="Pomalejší"
PANOPTICON_SETUP_LBL_CRON_WEB_CONS_3="Vysoké náklady (při použití se službou třetí strany)"
PANOPTICON_SETUP_LBL_CRON_WEB_CONS_4="Obvykle nevhodné při monitorování několika stránek"
PANOPTICON_SETUP_LBL_CRON_WEB_TARGET_1="Servery s CRON úlohami založenými pouze na URL"
PANOPTICON_SETUP_LBL_CRON_WEB_TARGET_2="Deset nebo méně monitorovaných stránek"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT="Co dál?"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_BENCHMARK_INFO="Několik sekund až minutu po nastavení CRON úlohy se tato stránka změní na benchmark. Nezavírejte tuto záložku prohlížeče, nepřepínejte na jinou záložku / okno nebo aplikaci, nevypínejte zařízení ani ho nenechte přejít do režimu spánku. Celkem jednoduché, že?"
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_YOU_CAN_COME_BACK_LATER="Pokud potřebujete dokončit nastavení CRON úlohy později - žádný problém! Zavřete tuto kartu prohlížeče. Příště, když se vrátíte do své instalace Panopticonu, vás přenese na tuto stránku."
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_EXPERT_USER="Pokud jste zkušený uživatel – nebo se jen rozhlížíte – můžete tento krok přeskočit a nastavit CRON úlohy později."
PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_SKIP_CRON="Přeskočit konfiguraci CRON (nedoporučeno)."
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_IN_PROGRESS="Benchmark probíhá"
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_WHAT_IS_THIS="Panopticon měří, jak dlouho může CRON úloha běžet"
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_DO_NOT_CLOSE="Prosím, nepřepínejte karty nebo okna a ujistěte se, že vaše zařízení nevypne ani neupadne do režimu spánku. Benchmark trvá až 3 minuty."
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_PROGRESS_HINT="Průběh benchmarku, v sekundách"
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_UPDATES_EVERY="Pruh průběhu se aktualizuje každých 5 sekund. Benchmark může skončit před naplněním průběhového pruhu."
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_FAILED_HEAD="Benchmark selhal"
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_FAILED_SUBHEAD="Došlo k chybě, která zabránila dokončení benchmarku."
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_FAILED_BTN_RETRY="Opakovat"
PANOPTICON_SETUP_LBL_CRON_BENCHMARK_FAILED_SKIP="Přeskočit tento krok (nedoporučeno)"
PANOPTICON_SETUP_CRON_ERR_NO_MAXEXEC_TASK="CRON benchmark úloha nebyla nainstalována. Prosím, obnovte tuto stránku."
PANOPTICON_SETUP_CRON_ERR_XHR_ABORT="AJAX požadavek byl prohlížečem přerušen. Zkontrolujte své internetové připojení. Ujistěte se, že nepřepínáte karty / okna nebo nenecháváte zařízení uspat, zatímco benchmark probíhá."
PANOPTICON_SETUP_CRON_ERR_XHR_TIMEOUT="AJAX požadavek vypršel. Zkontrolujte své internetové připojení. Ujistěte se, že nepřepínáte karty / okna nebo nenecháváte zařízení uspat, zatímco benchmark probíhá. Pokud problém přetrvává, zkontrolujte, zda váš server funguje správně a neblokuje požadavky z vašeho prohlížeče."
