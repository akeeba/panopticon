PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_LOCKOUT_EXTEND="Prodlužovat dobu blokace IP"
PANOPTICON_SYSCONFIG_LBL_FIELD_LOGIN_LOCKOUT_EXTEND_HELP="Pokud je tato volba povolena, pokaždé, když se blokovaná IP adresa pokusí přistoupit k Akeeba Panopticon, její doba blokace se resetuje, tj. blokace se prodlouží o další dobu „blokace IP“. Tím se trestají některé boty, ale za cenu zpomalení legitimního přístupu k Akeeba Panopticon."
PANOPTICON_SYSCONFIG_LBL_FIELD_PASSWORD_HIBP="Zakázat používání uniklých hesel"
PANOPTICON_SYSCONFIG_LBL_FIELD_PASSWORD_HIBP_HELP="Zabraňte uživatelům v používání hesel, která jsou nalezena v online únicích hesel. Tato funkce využívá službu třetí strany <a href=\"https://haveibeenpwned.com\" target=\"_blank\">Have I Been Pwned</a>."
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION="Sběr anonymních statistik používání"
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION_HELP="Akeeba Panopticon shromažďuje anonymní informace o verzi Panopticonu, PHP a databázového serveru. Tyto agregované informace umožňují Akeebě určit, které verze PHP a databázových serverů podporovat v budoucích verzích."
PANOPTICON_SYSCONFIG_LBL_FIELD_STATS_COLLECTION_HELP_LEARN_MORE="Podrobnosti o shromažďovaných informacích."
