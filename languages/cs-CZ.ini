PANOPTICON_SYSCONFIG_NO_EXTENSIONS_HEAD="Žádná rozšíření nebyla nalezena"
PANOPTICON_SYSCONFIG_NO_EXTENSIONS_BODY="Nastavte své weby a počkejte, až se jejich informace o aktualizaci rozšíření obnoví – až o 15 minut později. Poté zde uvidíte všechna jejich nainstalovaná rozšíření."
