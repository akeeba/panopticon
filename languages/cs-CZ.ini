PANOPTICON_SETUP_FINISH_HEAD_WITH_WARNING="Panopticon je připraven,<br>vyžaduje pozornost"
PANOPTICON_SETUP_FINISH_SUBTITLE="Nyní můžete začít používat Panopticon k monitorování vašich Joomla!&reg; stránek."
PANOPTICON_SETUP_FINISH_MAXEXEC_TOOLOW_HEAD="Maximální čas provádění CRON je příliš nízký"
PANOPTICON_SETUP_FINISH_MAXEXEC_TOOLOW_INFO="Konfigurace vašeho serveru umožňuje CRON úlohám běžet maximálně %d sekund, což je méně než praktické minimum 30 sekund."
PANOPTICON_SETUP_FINISH_MAXEXEC_TOOLOW_CAUTION="<strong>Nedoporučujeme</strong> používat tuto konfiguraci k automatizaci aktualizací Joomla&reg;, aktualizací rozšíření nebo záloh. Stále můžete používat Panopticon k monitorování vašich stránek."
PANOPTICON_SETUP_FINISH_MAXEXEC_TOOLOW_FIXIT="Konzultujte naši dokumentaci pro způsoby, jak zvýšit maximální čas provádění CRON alespoň na 60 sekund."
