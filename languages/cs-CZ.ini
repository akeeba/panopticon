PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="MCP server"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="Server Model Context Protocol (MCP) umožňuje AI agentům a chatbotům — jako je Claude Code, Claude Desktop, Codex, Cursor nebo VS Code — ovládat Panopticon se stejnými možnostmi, jaké nabízí JSON API. Každý požadavek se ověřuje pomocí API tokenu Panopticonu odeslaného v hlavičce Authorization jako Bearer token. Agent tak může vidět a dělat pouze to, co by prostřednictvím API mohl vlastník tohoto tokenu."
