PANOPTICON_SETUP_LBL_CRON_LBL_CONS="Eksiler"
PANOPTICON_SETUP_LBL_CRON_LBL_TARGET_AUDIENCE="Hedef Kitle"
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_HEAD="CRON işlevinin <em>her dakika</em> çalıştığından emin olun."
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_BODY="CRON işlevini daha seyrek çalıştırmak, eksik Joomla!™ çekirdek güncellemeleri nedeniyle bozuk siteler de dahil olmak üzere eski bilgilere ve güvenilmezliğe neden olur."
PANOPTICON_SETUP_LBL_CRON_CLI_CREATE_A_JOB="Barındırma kontrol panelinize gidin. Yeni bir CRON işlevi oluşturun. <strong>Her dakika</strong> çalışacak şekilde ayarlayın. Aşağıdaki komut satırını kullanın."
PANOPTICON_SETUP_LBL_CRON_REPLACE_PHP_CLI="<i>/path/to/php</i> yerine PHP %s CLI çalıştırılabilir dosyasının yolunu yazın. Bunun PHP CGI/FastCGI çalıştırılabiliri <strong>değil</strong>, PHP CLI çalıştırılabiliri olduğundan emin olun."
PANOPTICON_SETUP_LBL_CRON_IF_UNSURE="Yukarıdakilerden bazılarının veya herhangi birinin ne anlama geldiğinden emin değilseniz, lütfen barındırıcınıza sorun."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_HEAD="CRON işlevi çalışmıyor"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_1="CRON komut satırından <code>2&gt;&amp;1</code> 'i kaldırın. CRON komutu tekrar çalıştırıldığında hata içeren bir e-posta alacaksınız (barındırma hesabınız CRON işlevinin çıktısını size e-posta ile gönderecek şekilde yapılandırıldığı sürece). Bunu kullanarak neler olup bittiğini öğrenebilirsiniz."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_2="Bu durumda bile hiçbir şey olmuyorsa, lütfen ana bilgisayarınızla iletişime geçin. Ya hesabınız CRON işlevinin çıktısını almıyor ya da CRON işlevi hiç yürütülmüyor (pek olası olmasa da, bunun birkaç kez olduğunu gördük)."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_HEAD="CRON görevini çalıştırdığımda “Durum: 403 Erişim Yasak” hatası alıyorum"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_1="PHP-CGI/FastCGI yürütülebilir dosyasını kullanıyorsunuz. Yukarıda belirtildiği gibi, <em>/path/to/php</em> yerine <strong>PHP CLI</strong> yürütülebilir dosyasının yolunu koymanız gerekir."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_2="Lütfen barındırma sağlayıcınıza doğru yolu sorun. Eğer barındırma sağlayıcınız size başlangıçta bu yolu vermişse, destek talebinizi bir üst düzeye taşıyın ve bir sunucu mühendisiyle görüşmek istediğinizi belirtin. Onlar için size bu yolu vermek çok kolaydır."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_HEAD="Akeeba Panopticon için “PHP %s veya üstü sürümü gereklidir” uyarısı alıyorum."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_1="CRON işlevibde yanlış PHP sürümü için PHP CLI yürütülebilir dosyasını kullanıyorsunuz."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_2="Çoğu sunucuda PHP'nin birden fazla sürümü yüklüdür. Sunucunuzdan PHP %s için PHP CLI çalıştırılabilir dosyasının yolunu vermesini istemeniz ve CRON işlevinin komut satırında bunu kullanmanız gerekir."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_HEAD="Ana bilgisayar CRON'da yalnızca bağlantılara izin veriyor"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_INFO="Yukarıdaki <strong>Web</strong> sekmesine tıklayın."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_HEAD="Ana bilgisayarın CRON özelliği yok"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_1="Farklı bir barındırıcı kullanmanızı <strong>şiddetle</strong> tavsiye ederiz."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_2="Panopticon yalnızca otomasyon özellikleri tutarlı ve güvenilir bir şekilde çalıştığında kullanışlıdır. Bu, CRON işlevinin her dakika - <em>günde 1440 kez</em>- yürütülmesini gerektirir. Bu, üçüncü taraf bir hizmetle pahalıya mal olabilir; günde yaklaşık 10 dolar! Bunun yerine gerçek, komut satırı CRON işlevini destekleyen iyi bir ana bilgisayara <em>aylık</em> aynı miktarda para harcayabilirsiniz."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_3="CRON işlevini uzaktan yürütmek için daha ucuz bir yolunuz varsa (örneğin, kontrolünüz altındaki başka bir sunucu), nasıl yapılacağını öğrenmek için lütfen <strong>Web</strong> sekmesine tıklayın."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_4="<strong>CRON işlev sıklığı konusunda \"ucuza kaçmayın\"!</strong> CRON işlevini daha az sıklıkta çalıştırmak Panopticon'u güvenilmez hale getirecek ve hatta eksik Joomla™ çekirdek güncellemeleri nedeniyle sitelerinizi bozabilir."
