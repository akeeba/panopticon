PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Sunucunun bize geri gönderdiği sertifikayı doğrulamak için Evet olarak ayarlayın. Bu, belirttiğiniz Sertifika Yetkilisi (CA) dosyasına göre doğrulanır. Bağlantı hataları alırsanız bunu Hayır olarak ayarlayın; bazı kurulumlar (özellikle <code>mysql_ssl_rsa_setup</code> tarafından oluşturulanlar) sertifika doğrulaması etkinleştirilirse bağlantıya izin vermeyebilir. Doğrulamayı etkinleştirirseniz ve CA dosyası alanı boş bırakılırsa, sunucunun sertifikası sunucunuzun bildiği Sertifika Yetkilisi dosyalarına karşı denetlenecektir, <code>openssl.cafile</code> ve openssl <code>.capath</code> PHP seçeneklerine bakınız."
