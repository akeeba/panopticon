PANOPTICON_BACKUPTASKS_LBL_DESCRIPTION_HELP="<code>TARİH]</code>, <code>[SİTE],</code> vb. gibi Akeeba Backup değişkenlerini kullanabilirsiniz. Bunlar yedekleme zamanında Akeeba Backup tarafından değiştirilecektir. Ayrıca şu değişkenleri de kullanabilirsiniz <code>{DATE_FORMAT_LC}</code>,<code>{DATE_FORMAT_LC1}</code>..<code>{DATE_FORMAT_LC7}</code> panopticon tarafından yedekleme zamanının biçimlendirilmiş bir versiyonu ile değiştirilecektir. Lütfen Panopticon değişkenlerinin Akeeba Backup değişkenlerine kıyasla birkaç saniye farklı olabileceğini unutmayın, çünkü bunlar Akeeba Backup'ın çalıştığı sitenin sunucusunda değil, Panopticon'u çalıştıran sunucuda işlenir."
