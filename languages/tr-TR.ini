PANOPTICON_BACKUPTASKS_LBL_HOURS="Saat"
PANOPTICON_BACKUPTASKS_LBL_HOURS_HELP="<code>0</code> 'dan <code>23</code> 'e kadar sayı (0-11 sabah, 12-23 akşam), bitişik aralık, örneğin <code>5-15</code>, virgülle ayrılmış değerler listesi, örneğin <code>0,6,12,18</code>, <code>*</code> olarak her saat, eğik çizgi kullanarak her X saatte bir, örneğin <code>*/2</code> (her 2 saatte bir)."
PANOPTICON_BACKUPTASKS_LBL_DOM="Ayın Günü"
PANOPTICON_BACKUPTASKS_LBL_DOM_HELP="<code>1</code> den <code>31</code> e kadar sayı, ayın son günü için <code>L</code> (değer listelerinde kullanılamaz!), bitişik aralık ör. <code>1-15</code>, virgülle ayrılmış değerler listesi ör. <code>1,7,14,21,28</code>, her gün <code>*</code> olarak,  her X günde bir eğik çizgi kullanılarak ör.<code>*/3</code> (her 3 günde bir).<br>Aynı ay içinde Cumartesi veya Pazar olmayan en yakın gün için <code>W</code> ile bir sayı kullanın, ör. <code>15W</code> en yakın gündür (13'ten 17'ye kadar) ve Cumartesi veya Pazar değildir."
PANOPTICON_BACKUPTASKS_LBL_MONTH="Ay"
PANOPTICON_BACKUPTASKS_LBL_MONTH_HELP="Sayı <code>1</code> (Ocak) ile <code>12</code> (Aralık), bitişik aralık, ör. <code>3-7</code>, virgülle ayrılmış değerler listesi, ör. <code>3,6,9,12</code>, <code>*</code>, olarak her ay, eğik çizgi kullanarak her x ayda bir, ör. <code>*/2</code> (her 2 ayda bir).<br>Sayılar yerine ayların kısaltılmış, üç harfli İngilizce adlarını kullanabilirsiniz: <code>JAN</code> <code>FEB</code>, <code>MAR</code>, <code>APR</code>, <code>MAY</code>, <code>JUN</code>, <code>JUL</code>, <code>AUG</code>, <code>SEP</code>, <code>OCT</code>, <code>NOV</code>, <code>DEC</code>."
