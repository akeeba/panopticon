PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Joomla API Uygulaması yanıtı, API olmayan çıktıyı içeriyor"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="API Eklentisi yanıtı, API olmayan çıktıyı içeriyor"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="API'den gelen yanıttan önce ve/veya sonra PHP mesajları (örn. kullanımdan kaldırma bildirimleri, uyarılar veya önemli hatalar) veya üçüncü taraf yazılımlardan alınan çıktılar gibi diğer metin içerikleri gelir. Sonuç olarak API yanıtının kodu çözülemiyor, bu da Panopticon'un sitenizin yanıtını anlayamadığı anlamına geliyor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Sitenizin Genel Yapılandırma sayfasında \"Hata Raporlama\"nın Yok olarak ayarlandığından ve \"Sitede Hata Ayıklama\"nın Hayır olarak ayarlandığından emin olun. Bu, PHP'nin API yanıtını kirleten mesajları yazdırmasını engeller."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Bu yeterli değilse, üçüncü taraf bir eklentinin API uygulamasında hataya neden olması mümkündür. API eklentisini yanlışlıkla bozabilecek herhangi bir üçüncü taraf eklentinin, özellikle de sistem eklentilerinin olup olmadığını kontrol edin ve yazarlarıyla iletişime geçin."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_HEAD="WordPress JSON API uygulamasının yanıtında API dışı veriler yer almaktadır"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH1="API yanıtının başında ve/veya sonunda PHP mesajları (ör. kullanımdan kaldırılma bildirimleri, uyarılar veya ölümcül hatalar) veya üçüncü taraf eklentilerin çıktıları gibi başka metin içerikleri bulunuyor. Sonuç olarak, API yanıtı çözümlenemiyor; bu da Panopticon'un sitenizin yanıtını anlayamadığı anlamına geliyor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Sunucunuzdaki PHP'nin <code>display_errors</code> seçeneği devre dışı bırakılacak şekilde yapılandırıldığından ve sitenizin <code>wp-config.php</code> dosyasında <code>WP_DEBUG</code> seçeneğini etkinleştirmediğinizden emin olun. Bu, PHP'nin API yanıtını bozan mesajları görüntülemesini engeller."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Bu da yetmezse, API uygulamasında bir hataya neden olan üçüncü taraf bir eklenti olabilir. API eklentisini yanlışlıkla bozabilecek herhangi bir üçüncü taraf eklenti olup olmadığını kontrol edin (bunlara zorunlu eklentiler de dahildir: <code>mu-plugins</code>) ve ilgili yazarla iletişime geçin."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_HEAD="WordPress JSON API uygulaması, JSON formatında olmayan verilerle yanıt verdi"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH1="WordPress JSON API uygulamasının JSON verileriyle yanıt vermesi gerekir. Sunucunuz JSON olmayan veriler gönderdi. Bu, sitenizde bir sorun olduğu anlamına gelir."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH2="Lütfen, WordPress'in JSON API'sini tamamen veya kimlik doğrulaması yapılmamış (misafir) erişim için engelleyen ya da başka şekilde kısıtlayan herhangi bir .htaccess kodu, üçüncü taraf eklentisi veya özel kod (temanızın <code>functions.php</code> dosyasında bulunanlar dahil) bulunmadığından emin olun."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="Joomla API Uygulaması beklenmeyen bir HTTP durum koduyla (%s) yanıt verdi"
