PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Bu, henüz görmediğimiz bir iletişim hatasını, Guzzle'ın kendi içindeki bir sorunu, Panopticon'u yüklediğiniz sunucudaki bir sorunu veya Panopticon'un kendisindeki bir sorunu gösterebilecek beklenmedik bir durumdur. Lütfen <a href=\"https://github.com/akeeba/panopticon/issues?q=is%3Aissue\" target=\"_blank\">GitHub depomuzdaki</a> açık <em>ve kapalı</em> sorunları araştırın. Bunu başka kimse bildirmediyse, lütfen bir sorun açın ve bir göz atalım."
