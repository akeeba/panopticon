PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Sitenize erişmek için HTTPS kullanıyorsunuz ancak kullandığınız SSL/TLS sertifikası ticari, tanınmış bir Sertifika Yetkilisi tarafından imzalanmamış."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Aşağıdakilerden <em>birini</em> yaparak bu sorunu çözebilirsiniz:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Düz HTTP kullanın. Bu en az güvenli seçenektir, bu nedenle kesinlikle önerilmez."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Ticari ve tanınmış bir Sertifika Yetkilisi tarafından imzalanmış bir SSL/TLS sertifikası yükleyin. Çoğu sunucu, geçerli, imzalı ve tam olarak çalışan SSL/TLS sağlayan <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a>'i kullanmanıza izin verir. sertifikalar ücretsizdir."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Bir Intranet, extranet üzerindeyseniz veya başka bir şekilde kendi Sertifika Yetkilinizi sürdürmeniz gerekiyorsa, Panopticon'a özel Sertifika Yetkilinizi tanımasını söyleyebilirsiniz. Panopticon kurulumunuzun <code>user_code</code> klasörünün içinde <code>cacert.pem</code> dosyasını oluşturun. Sertifika Yetkilinizin (CA) genel sertifikasını (sertifikalarını) <a href=\"https://en.wikipedia.org/wiki/Privacy-Enhanced_Mail\" target=\"_blank\">PEM</a> formatında kopyalayıp yapıştırın. Bu, standart CA dosyalarının <em>üzerine</em> otomatik olarak yüklenir ve Panopticon'un sitenize erişmesine izin verir."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="Sitenizin SSL/TLS sertifikasında sorun var"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Sitenize erişmek için HTTPS kullanıyorsunuz ancak kullandığınız SSL/TLS sertifikasında bir sorun var gibi görünüyor."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Lütfen aşağıdakileri kontrol edin:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="SSL/TLS sertifikası doğru alan adı için mi? Ana bilgisayarınız tarafından sağlanan varsayılan SSL/TLS sertifikasını kullanıyorsanız, bu sertifika gerçek alan adınızla değil, sitenizi kurmak için kullandığınız geçici alan adıyla sınırlıdır. Ticari, iyi bilinen bir Sertifika Yetkilisi tarafından imzalanmış bir SSL/TLS sertifikası yüklemeniz gerekecektir. Çoğu sunucu, geçerli, imzalı, tamamen çalışan SSL/TLS sertifikalarını ücretsiz olarak veren <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a> 'i kullanmanıza izin verir. Bazı self servis hosting kontrol panellerinin (cPanel veya Plesk gibi) bir alan adı için aktif SSL/TLS sertifikasını seçmenize izin verdiğini unutmayın. Doğru sertifikanın gerçekten kullanıldığını kontrol edin."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="SSL/TLS sertifikasının süresi doldu mu? Bu durumda yenilemeniz gerekir. Let's Encrypt kullanıyorsanız sertifikanın geçerlilik süresinin kısa olduğunu (genellikle 90 gün) ve sunucunuz tarafından otomatik olarak yenilenmesi gerektiğini lütfen unutmayın. Bu olmadıysa, sunucunuzla iletişime geçmeniz gerekecektir."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="SSL/TLS sertifikası iptal edildi mi? Bazen Sertifika Yetkilileri veya bir SSL/TLS sertifikasının sahipleri sertifikayı iptal etmeyi tercih edebilir. Örneğin, Sertifika Yetkilileri dolandırıcılıktan şüphelendiklerinde veya sertifika vermek için kullanılan altyapılarının tehlikeye girdiğine inandıklarında bunu yaparlar. <a href=\"https://www.namecheap.com/support/knowledgebase/article.aspx/9968/38/how-to-check-the-certificate-revocation-status/\" target=\"_blank\">Sertifikanızın iptal durumunu kontrol</a> edin. İptal edilmişse yeni bir sertifikaya ihtiyacınız olacaktır."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Sunucunuz yanlış SSL/TLS sertifikası sunuyor olabilir mi? Bu durum, yakın zamanda manuel olarak veya otomatik sertifika rotasyon sürecinin bir parçası olarak yeni bir sertifikaya geçtiyseniz meydana gelebilir (örneğin, ana bilgisayarınız Let's Encrypt aracılığıyla yeni bir sertifika yayınladığında). Sertifika değiştiğinde web sunucusunun yeniden yüklenmesi veya yeniden başlatılması gerekir. Bazı nadir durumlarda bu gerçekleşmeyebilir veya deneyimsiz bir sistem yöneticisi bunu yapmayı unutabilir. Bunu kontrol etmek ve gerekirse web sunucusu sürecini yeniden yüklemek veya yeniden başlatmak için lütfen ana bilgisayarınıza / sistem yöneticinize başvurun."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="Sitenizde “Web Servisleri - Yükleyici” eklentisi devre dışı bırakıldı"
