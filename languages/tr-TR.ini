PANOPTICON_SITE_LBL_PHP_LTS_P1="RedHat Enterprise Linux ve Ubuntu Server gibi bazı Linux Dağıtımları, Kullanım Ömrü Sonu tarihi geçmiş belirli PHP sürümleri için \"uzun vadeli destek\" sunabilir."
PANOPTICON_SITE_LBL_PHP_LTS_P2="Bunun genellikle sunucu başına ek ve genellikle pahalı bir lisans gerektirdiğini lütfen unutmayın. Üstelik PHP'nin dahili mimarisinde değişiklik yapılmasını gerektiren bazı güvenlik düzeltmeleri bu eski PHP sürümlerinde uygulanamıyor. Son olarak, işlevsel sorunlar (\"hatalar\") ve daha yeni İnternet standartları ve en iyi uygulamalarla uyumluluk <em>hiçbir zaman</em> ele alınmaz."
