PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Veritabanı sunucusunun ana bilgisayar adı veya IP adresi (genellikle: localhost). Lütfen localhost ve 127.0.0.1'in MySQL söz konusu olduğunda <em>çok</em> farklı olduğunu unutmayın; veritabanı sunucunuzla hangisinin çalıştığını görmek için her ikisini de denemeniz gerekebilir. Sunucunuz standart olmayan bir bağlantı noktası kullanıyorsa, ana bilgisayar adından sonra iki nokta üst üste ekleyin, örneğin 127.0.0.1:1234, 127.0.0.1 üzerinde 1234 numaralı bağlantı noktasını dinleyen bir veritabanı sunucusu kullanmak için."
