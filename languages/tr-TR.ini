PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH2="Hata hakkında daha fazla bilgi için lütfen <a href=\"https://curl.se/libcurl/c/libcurl-errors.html\" target=\"_blank\">cURL kütüphanesi hata kodu referansına</a> bakın. Çoğu durumda sorun, bir ağ veya sunucu yapılandırması sorunudur — ya Panopticon'u kurduğunuz sunucu ya da sitenizin bulunduğu sunucu — ve bu sorunu çözmek için ilgili barındırma sağlayıcısına başvurmanız gerekir."
