PANOPTICON_BACKUPTASKS_LBL_DOW_HELP="Sayı <code>0</code> (Pazar) ile <code>6</code> (Cumartesi), bitişik aralık, ör. <code>1-5</code>, virgülle ayrılmış değerler listesi, ör. <code>1,3,5</code>, <code>*</code> olarak her gün.<br> Sayılar yerine haftanın günlerinin kısaltılmış, üç harfli İngilizce adlarını kullanabilirsiniz: <code>SUN</code>, <code>MON</code>, <code>TUE</code>, <code>WED</code>, <code>THU</code>, <code>FRI</code>, <code>SAT</code><br>Ay içinde haftanın son günü için arkasından <code>L</code> gelen bir sayı, ör, <code>5L</code> ayın son cumasıdır.<br>Ay içinde haftanın n'inci günü için <code>#</code> ile ayrılmış iki sayı, ör. <code>5#3</code> ayın 3. cumasıdır."
