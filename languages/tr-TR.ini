PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTFOUND_BODY="Panopticon aracılığıyla yedeklemeleri planlamak ve yürütmek için sitenize Akeeba Backup Professional'ı yüklemeniz gerekir."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTFOUND_NOTE_FOR_AFTERWARDS="Akeeba Backup Professional'ı yükledikten sonra lütfen Akeeba Backup'ı Panopticon'a bağlamak için site genel bakış sayfasına geri dönün."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTFOUND_SOLUTION="Akeeba Backup Professional'ı yükledikten sonra Panopticon'a sitenizdeki Akeeba Backup kurulumuyla yeniden bağlantı kurmasını bildirmek için lütfen aşağıdaki düğmeye tıklayın."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CORE_HEAD="Akeeba Backup Core, Panopticon ile uyumlu değildir."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CORE_BODY="Panopticon aracılığıyla yedeklemeleri planlamak ve yürütmek için sitenize Akeeba Backup Professional'ı yüklemeniz gerekir."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_HEAD="Akeeba Backup'a bağlanmanın bir yolu bulunamıyor."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_BODY="Panopticon sitenizin Akeeba Backup JSON API'sine bağlanmanın bir yolunu bulamıyor."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIPS="Akeeba Panopticon'u Akeeba Backup Professional'a bağlamak için ipuçları"
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1="Sitenize Akeeba Backup Professional bileşenini ve Web Services - Akeeba Backup eklentisini yüklediğinizden ve etkinleştirdiğinizden emin olun. Akeeba Backup Core <em> Akeeba Panopticon ile uyumlu değildir </em>."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1_WP="Sitenize Akeeba Backup Professional eklentisini yüklediğinizden ve etkinleştirdiğinizden emin olun. Akeeba Backup Core <em> Akeeba Panopticon ile uyumlu değildir </em>."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2="Sitenizin yönetici paneline giriş yapın. Bileşenler, Akeeba Backup, Kontrol Paneli bölümüne gidin. Seçenekler, Ön Uç Yedekleme seçeneklerini tıklayın ve “JSON API'yi Etkinleştir (uzaktan yedekleme)” seçeneğini Evet olarak ayarlayın. Yeni bir \"Gizli Kelime\" girin; <a href=\\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\\">random.org</a> adresinden yeni, rastgele ve güvenli bir gizli kelime oluşturabilirsiniz. Ardından, araç çubuğundaki Kaydet ve Kapat seçeneğine tıklayın."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2_WP="Sitenizin yönetici paneline giriş yapın. Akeeba Backup, Sistem Yapılandırması, Genel API bölümüne gidin ve “JSON API'yi Etkinleştir (uzaktan yedekleme)” seçeneğini Evet olarak ayarlayın. Yeni bir \"Gizli Anahtar\" girin; <a href=\\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\\">random.org</a> adresinden yeni, rastgele ve güvenli bir anahtar oluşturabilirsiniz. Ardından, araç çubuğundaki Kaydet ve Kapat seçeneğine tıklayın."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Üçüncü taraf eklentilerin (özellikle güvenlik eklentileri) ve/veya sunucu yapılandırma ayarlarının, sitenizin <code>api</code> klasörüne erişimi engellemediğinden emin olun. Ayrıca, bu dosyadan gelen yanıtların <em>sitenizdeki herhangi bir üçüncü taraf eklentisi, web sunucunuz veya sitenizin önünde yapılandırılmış olabilecek herhangi bir CDN / önbellekleme proxy'si tarafından </em>önbelleğe alınmadığından</em> emin olun."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3_WP="Üçüncü taraf eklentilerin (özellikle güvenlik eklentileri) ve/veya sunucu yapılandırma ayarlarının, sitenizin <code>wp-admin/admin-ajax.php</code> dosyasına erişimi engellemediğinden emin olun. Ayrıca, bu dosyadan gelen yanıtların <em>sitenizdeki herhangi bir üçüncü taraf eklenti, web sunucunuz veya sitenizin önünde yapılandırılmış olabilecek herhangi bir CDN / önbellekleme proxy'si tarafından </em>önbelleğe alınmadığından</em> emin olun."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_HEAD="Akeeba Backup bağlantılı değil."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_BODY="Bu durum, siteyi Akeeba Panopticon'a ekledikten sonra Akeeba Backup yüklendiyse, siteye yüklenen Panopticon Bağlayıcısı çok eskiyse veya siteyle iletişimde bir hata oluştuysa meydana gelebilir."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_SOLUTION_ADMIN="Akeeba Backup'ı Panopticon'a yeniden bağlamayı denemek için lütfen aşağıdaki düğmeye tıklayın. Bu işe yaramazsa lütfen sitenizdeki Akeeba Panopticon Connector güncelleyin, eklentisinin yayınlandığından emin olun ve siteyle doğru şekilde iletişim kurup kuramadığınızı kontrol edin."
PANOPTICON_SITES_LBL_AKEEBABACKUP_NOTLINKED_SOLUTION_NONADMIN="Akeeba Backup'ı Panopticon'a yeniden bağlamak için lütfen bir yöneticiyle iletişime geçin."
PANOPTICON_SITES_LBL_AKEEBABACKUP_COMSERROR_HEAD="Uzak sitedeki Akeeba Panopticon Connector ile bir iletişim hatası oluştu."
PANOPTICON_SITES_LBL_AKEEBABACKUP_GUZZLE="Sitenizdeki Panopticon API'sinden Akeeba Backup'ın kurulum durumu hakkında bilgi sağlamasını istemeyi denedik ancak bunun yerine bir hata aldık."
