PANOPTICON_SETUP_LBL_USER_NAME_HELP="Lütfen tam adınızı giriniz. Panopticon kurulumunuzun size bir e-posta göndermesi gerektiğinde kullanılacaktır."
PANOPTICON_SETUP_LBL_USER_USERNAME="Kullanıcı Adı"
PANOPTICON_SETUP_LBL_USER_USERNAME_HELP="Panopticon'a giriş yapmak için kullanacağınız kullanıcı adı. Yalnızca a'dan z'ye küçük harfleri ve 0-9 arasındaki rakamları kullanmak en iyisidir."
PANOPTICON_SETUP_LBL_USER_PASSWORD="Parola"
PANOPTICON_SETUP_LBL_USER_PASSWORD_HELP="Panopticon'a giriş yaparken kullanacağınız şifre. Şifre büyük/küçük harfe duyarlıdır; yani abc, Abc ve ABC üç <em>farklı</em> şifredir."
PANOPTICON_SETUP_LBL_USER_PASSWORD2="Şifreyi tekrar girin"
PANOPTICON_SETUP_LBL_USER_PASSWORD2_HELP="Lütfen yukarıda girdiğiniz şifreyi tekrarlayınız. Yanlışlıkla yanlış yazmadığınızdan emin olmak istiyoruz."
PANOPTICON_SETUP_LBL_USER_EMAIL="E-Posta Adresi"
PANOPTICON_SETUP_LBL_USER_EMAIL_HELP="Lütfen e-posta adresinizi giriniz. Panopticon kurulumunuzun size bir e-posta göndermesi gerektiğinde kullanılacaktır. Bu e-posta adresi ve tüm kullanıcı bilgileri Panopticon yazarlarına <em>aktarılmaz</em>."
PANOPTICON_SETUP_LBL_TIMEZONE="Saat Dilimi"
PANOPTICON_SETUP_LBL_TIMEZONE_HELP="Tüm tarihler ve saatler bu saat diliminde ifade edilecektir."
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_HEAD="Panoptikon henüz hazır değil"
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_BODY="<code>config.php</code> yapılandırma dosyasını Panopticon'u kurduğunuz klasöre kaydetme işlemi başarısız oldu. Bu dosyayı elle oluşturmanız gerekecektir."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_HEAD="Yapılandırma dosyasını oluşturun"
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1="<code>config.php</code> adında bir dosya oluşturun ve onu düzenleyicinizde açık tutun."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1_DETAIL="Windows'ta Notepad, macOS'ta BBEdit, Linux'ta gEdit veya Kate gibi bir düz metin düzenleyici kullanın."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP2="Bu pencereye geri gelin ve “Panoya Kopyala” düğmesine tıklayın."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP3="Düzenleyicinize geri dönün ve yapıştırın. Daha sonra dosyayı kaydedin."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4="<code>config.php</code> dosyasını Panopticon kurulumunuza yükleyin."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4_DETAIL="Panopticon'u kurduğunuz klasöre yükleyin. Bu, içinde Panopticon <code>index.php</code> dosyasının bulunduğu klasördür."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP5="Bu pencereye geri dönün ve “Devam Et” düğmesine tıklayın."
PANOPTICON_SETUP_BTN_COPY_TO_CLIPBOARD="Panoya Kopyala"
PANOPTICON_SETUP_LBL_CRON_HEAD="Bir CRON İşlevi Ayarlayın"
PANOPTICON_SETUP_LBL_CRON_SUBHEAD="Panopticon hayatınızı kolaylaştırmak için birçok otomasyon kullanıyor. Bunun için her dakika çalışacak bir CRON işlevi kurmanız gerekiyor."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_CTA="Aşağıdaki yöntemlerden birini kullanarak bir CRON işlevi ayarlayın. Daha sonra bu sayfanın değişmesi için bir dakika kadar bekleyin."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_BREATHE="Nefes alın. Bu son kurulum adımıdır. Neredeyse bitti."
