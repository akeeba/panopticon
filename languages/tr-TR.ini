PANOPTICON_SETUP_LBL_CRON_LBL_TROUBLESHOOTING="Sorun? Çözümle tanışın!"
PANOPTICON_SETUP_LBL_CRON_LBL_IS_THIS_RIGHT_FOR_ME="Bu yöntem benim için doğru yöntem mi?"
