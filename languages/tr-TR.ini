PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH1="Panopticon, WordPress'in JSON hizmetleri API'si (<code>wp-json</code>) aracılığıyla gerekli API'yi sağlamak için kendi eklentisi olan “Akeeba Panopticon Connector for WordPress”i kullanır."
