PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Bunun yerine, (<span class=\"font-monospace\">%s</span>) için sorun giderme bilgisi sağlayabilmemiz gereken bir hatayla karşılaştık, ancak bunun koduna sahip değiliz. Bu olmamalıydı."
