PANOPTICON_SETUP_LBL_DATABASE_DRIVER_SQLITE="SQLite"
PANOPTICON_SETUP_LBL_DATABASE_HOST="Värdnamn för databasserver"
PANOPTICON_SETUP_LBL_DATABASE_HOST_HELP="Värdnamnet eller IP-adressen till databasservern (vanligtvis: localhost). Observera att localhost och 127.0.0.1 är <em>mycket</em> olika enligt MySQL; du kanske måste försöka med båda för att se vilken som fungerar med din databasserver. Om din server använder en icke-standardport, lägg till den efter värdnamnet föregånget av ett kolon, t.ex. 127.0.0.1:1234 för att använda en databasserver på 127.0.0.1 som lyssnar på port 1234."
PANOPTICON_SETUP_LBL_DATABASE_NAME="Databasnamn"
PANOPTICON_SETUP_LBL_DATABASE_NAME_HELP="Namnet på din databas. De flesta värdar som använder cPanel, Plesk och andra stora hostingpaneler ger databasnamn som abcdef_användarnamn, där abcdef är ditt användarnamn för kontrollpanelen för webbhotell. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_DATABASE_PASS="Lösenord"
PANOPTICON_SETUP_LBL_DATABASE_PASS_HELP="Lösenordet du använder för att ansluta till din databas."
PANOPTICON_SETUP_LBL_DATABASE_PREFIX="Prefix för tabellnamn i databasen"
PANOPTICON_SETUP_LBL_DATABASE_PREFIX_HELP="Det gemensamma prefixet för alla tabellnamn i databasen som tillhör denna Panopticon-installation."
PANOPTICON_SETUP_LBL_DATABASE_USER="Användarnamn"
PANOPTICON_SETUP_LBL_DATABASE_USER_HELP="Användarnamnet du använder för att ansluta till din databas. De flesta värdar som använder cPanel, Plesk och andra stora hostingpaneler ger användarnamn som abcdef_användarnamn, där abcdef är ditt användarnamn för kontrollpanelen för webbhotell. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION="Anslut med ett SSL-certifikat"
PANOPTICON_SETUP_LBL_DATABASE_DBENCRYPTION_HELP="Ska vi ansluta till databasen med ett SSL-certifikat? Detta kan användas i stället för autentisering med användarnamn och lösenord (krypterad anslutning med certifikatautentisering) eller <em>utöver</em> autentisering med användarnamn och lösenord (krypterad anslutning med lösenordsautentisering). Om du inte vet vad detta innebär, ange Nej för detta alternativ och ignorera även de följande alternativen."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER="SSL/TLS-krypteringsmetoder"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCIPHER_HELP="Ange en lista över krypteringsmetoder för anslutning med SSL-certifikat, separerade med kolon. Om du lämnar det tomt används standardlistan (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) (rekommenderas)."
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA="Certifikatauktoritet (CA)-fil"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCA_HELP="Absolut sökväg till PEM-filen för certifikatauktoritet (CA) för din databasserver, t.ex. <code>/home/myuser/ca.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY="Databasanvändarens privata nyckelfil"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLKEY_HELP="Absolut sökväg till PEM-filen för privatnyckeln för din databasanvändare, t.ex. <code>/home/myuser/myuser-key.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT="Databasanvändarens fil för publik nyckel (certifikat)"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLCERT_HELP="Absolut sökväg till PEM-filen för den offentliga nyckeln (certifikatet) för din databasanvändare, t.ex. <code>/home/myuser/myuser.pem</code>"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT="Verifiera servercertifikat"
PANOPTICON_SETUP_LBL_DATABASE_DBSSLVERIFYSERVERCERT_HELP="Ange Ja för att verifiera certifikatet som servern skickar tillbaka. Detta verifieras mot den certifieringsauktoritetsfil (CA) du angett. Om du får anslutningsfel, ange Nej; vissa konfigurationer (särskilt de som genererats av <code>mysql_ssl_rsa_setup</code>) kan neka anslutning om certifikatverifiering är aktiverad. Om du aktiverar verifiering och CA-filfältet lämnas tomt, kontrolleras serverns certifikat mot de CA-filer din server känner till, se PHP-alternativen <code>openssl.cafile</code> och <code>openssl.capath</code>."
PANOPTICON_SETUP_DIRECTFTP_HOST_TITLE="Värdnamn"
PANOPTICON_SETUP_DIRECTFTP_HOST_DESCRIPTION="FTP-serverns värdnamn, utan protokoll. Använd inte <s><code>ftp://example.com</code></s>; använd <code>example.com</code> i stället."
PANOPTICON_SETUP_DIRECTFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTFTP_PORT_DESCRIPTION="FTP-serverns TCP/IP-port. Vanligtvis 21. Fråga din värd."
PANOPTICON_SETUP_DIRECTFTP_USER_TITLE="Användarnamn"
PANOPTICON_SETUP_DIRECTFTP_USER_DESCRIPTION="Användarnamn, skiftlägeskänsligt."
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_TITLE="Lösenord"
PANOPTICON_SETUP_DIRECTFTP_PASSWORD_DESCRIPTION="Lösenord, skiftlägeskänsligt. Använd helst lösenord bestående av enbart a–z, A–Z, 0–9, bindestreck, punkter, understreck och utropstecken. Andra tecken kan aktivera webbserverns hackerskydd."
PANOPTICON_SETUP_DIRECTFTP_FTPS_TITLE="Använd FTP över SSL (FTPS)"
PANOPTICON_SETUP_DIRECTFTP_FTPS_DESCRIPTION="Anslut till FTP-servern via en SSL-krypterad anslutning. <strong>Detta är inte samma sak som SFTP, SCP eller \"Säker FTP\"</strong>. Om servern inte stöder denna metod uppstår anslutningsfel."
PANOPTICON_SETUP_DIRECTFTP_INITDIR_TITLE="Inledande katalog"
PANOPTICON_SETUP_DIRECTFTP_INITDIR_DESCRIPTION="Den absoluta FTP-sökvägen till katalogen dit filerna ska laddas upp. Om du är osäker, anslut till servern med FileZilla, navigera till avsedd katalog och kopiera sökvägen som visas i den högra panelen ovanför kataloglistan. Vanligtvis är det något som <code>/public_html</code> eller <code>/httpdocs</code>."
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_TITLE="Passivt läge"
PANOPTICON_SETUP_DIRECTFTP_PASSIVE_DESCRIPTION="Använder FTP:s passiva läge vid överföring av data. Ska aktiveras på alla servrar med en portbrandvägg, vilket är praktiskt taget alla servrar nuförtiden."
PANOPTICON_SETUP_DIRECTFTP_TEST_DESCRIPTION="Testar FTP-anslutningen."
PANOPTICON_SETUP_DIRECTFTP_TEST_FAIL="Kunde inte ansluta till FTP-servern."
PANOPTICON_SETUP_DIRECTFTP_TEST_OK="Lyckad anslutning till FTP-servern."
PANOPTICON_SETUP_DIRECTFTP_TEST_TITLE="Testa FTP-anslutning"
PANOPTICON_SETUP_DIRECTSFTP_HOST_TITLE="Värdnamn"
PANOPTICON_SETUP_DIRECTSFTP_HOST_DESCRIPTION="SFTP-serverns värdnamn, utan protokoll. Använd inte <s><code>sftp://example.com</code></s>; använd <code>example.com</code> i stället."
PANOPTICON_SETUP_DIRECTSFTP_PORT_TITLE="Port"
PANOPTICON_SETUP_DIRECTSFTP_PORT_DESCRIPTION="TCP/IP-port för SFTP. Vanligtvis 22. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_DIRECTSFTP_USER_TITLE="Användarnamn"
PANOPTICON_SETUP_DIRECTSFTP_USER_DESCRIPTION="Användarnamn, skiftlägeskänsligt. Din SFTP-server måste tillåta användarnamn/lösenordsautentisering."
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_TITLE="Lösenord"
PANOPTICON_SETUP_DIRECTSFTP_PASSWORD_DESCRIPTION="SFTP-lösenord, skiftlägeskänsligt."
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_TITLE="Inledande katalog"
PANOPTICON_SETUP_DIRECTSFTP_INITDIR_DESCRIPTION="SFTP-katalogen för webbplatsens rot. Om du är osäker, använd en SFTP-klient, anslut till servern, navigera till katalogen och kopiera den visade sökvägen. Sökvägen måste vara absolut, t.ex. <code>/home/myuser/public_html</code>, inte bara <s><code>public_html</code></s>."
PANOPTICON_SETUP_DIRECTSFTP_TEST_DESCRIPTION="Testa anslutningen till SFTP-servern."
PANOPTICON_SETUP_DIRECTSFTP_TEST_FAIL="Kunde inte ansluta till SFTP-servern. Felmeddelandet var:"
PANOPTICON_SETUP_DIRECTSFTP_TEST_OK="Lyckad anslutning till SFTP-servern."
PANOPTICON_SETUP_DIRECTSFTP_TEST_TITLE="Testa SFTP-anslutning"
PANOPTICON_SETUP_LBL_SETUP_HEAD_TEXT="Tillgång till Panopticon är skyddad bakom inloggning. Du kommer nu att skapa ett användarkonto med full administratörsbehörighet. Du kan ändra detta användare och skapa fler användare efter att du har slutfört installationsprocessen."
PANOPTICON_SETUP_LBL_USER_NAME="Fullständigt namn"
PANOPTICON_SETUP_LBL_USER_NAME_HELP="Ange ditt fullständiga namn. Det kommer att användas varje gång din Panopticon-installation måste skicka dig ett e-postmeddelande."
PANOPTICON_SETUP_LBL_USER_USERNAME="Användarnamn"
PANOPTICON_SETUP_LBL_USER_USERNAME_HELP="Det användarnamn du kommer att använda för att logga in i Panopticon. Det rekommenderas att bara använda gemener a–z och siffror 0–9."
PANOPTICON_SETUP_LBL_USER_PASSWORD="Lösenord"
PANOPTICON_SETUP_LBL_USER_PASSWORD_HELP="Lösenordet du kommer att använda för att logga in på Panopticon. Lösenordet skiftlägeskänsligt, vilket innebär att abc, Abc och ABC är tre <em>olika</em> lösenord."
PANOPTICON_SETUP_LBL_USER_PASSWORD2="Upprepa lösenord"
PANOPTICON_SETUP_LBL_USER_PASSWORD2_HELP="Upprepa det lösenord du angav ovan. Vi vill försäkra oss om att du inte av misstag skrivit fel."
PANOPTICON_SETUP_LBL_USER_EMAIL="E-postadress"
PANOPTICON_SETUP_LBL_USER_EMAIL_HELP="Ange din e-postadress. Den kommer att användas varje gång din Panopticon-installation behöver skicka dig ett e-postmeddelande. Denna e-postadress, liksom all användarinformation, överförs <em>inte</em> till författarna av Panopticon."
PANOPTICON_SETUP_LBL_TIMEZONE="Tidszon"
PANOPTICON_SETUP_LBL_TIMEZONE_HELP="Alla datum och tider kommer att uttryckas i denna tidszon."
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_HEAD="Panopticon är inte redo ännu"
PANOPTICON_SETUP_LBL_NO_CONFIG_WRITTEN_ALERT_BODY="Sparandet av konfigurationsfilen <code>config.php</code> i mappen där du installerar Panopticon har misslyckats. Du måste skapa denna fil manuellt."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_HEAD="Skapa konfigurationsfilen"
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1="Skapa en fil med namnet <code>config.php</code> och håll den öppen i din redigerare."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP1_DETAIL="Använd en vanlig textredigerare som Notepad på Windows, BBEdit på macOS, gEdit eller Kate på Linux."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP2="Återvänd till detta fönster och klicka på knappen “Kopiera till urklipp”."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP3="Byt tillbaka till din redigerare och klistra in. Spara sedan filen."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4="Ladda upp filen <code>config.php</code> till din Panopticon-installation."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP4_DETAIL="Ladda upp till den mapp där du installerar Panopticon. Det är mappen som innehåller Panopticons <code>index.php</code>-fil."
PANOPTICON_SETUP_LBL_NOCONF_INSTRUCTIONS_STEP5="Återvänd till detta fönster och klicka på knappen “Fortsätt”."
PANOPTICON_SETUP_BTN_COPY_TO_CLIPBOARD="Kopiera till urklipp"
PANOPTICON_SETUP_LBL_CRON_HEAD="Skapa en CRON-uppgift"
PANOPTICON_SETUP_LBL_CRON_SUBHEAD="Panopticon använder mycket automatisering för att göra ditt liv enklare. För detta måste du skapa en CRON-uppgift som körs varje minut."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_CTA="Skapa en CRON-uppgift med någon av metoderna nedan. Sedan, vänta i upp till en minut för att denna sida ska uppdateras."
PANOPTICON_SETUP_LBL_CRON_SUBHEAD_BREATHE="Ta ett andetag. Det här är det sista installationssteget. Du är nästan klar."
PANOPTICON_SETUP_LBL_CRON_CLI_TABHEAD="CLI"
PANOPTICON_SETUP_LBL_CRON_WEB_TABHEAD="Webb"
PANOPTICON_SETUP_LBL_CRON_LBL_INSTRUCTIONS="Instruktioner"
PANOPTICON_SETUP_LBL_CRON_LBL_TROUBLESHOOTING="Problem? Möjlighet till lösning!"
PANOPTICON_SETUP_LBL_CRON_LBL_IS_THIS_RIGHT_FOR_ME="Är denna metod rätt för mig?"
PANOPTICON_SETUP_LBL_CRON_LBL_PROS="Fördelar"
PANOPTICON_SETUP_LBL_CRON_LBL_CONS="Nackdelar"
PANOPTICON_SETUP_LBL_CRON_LBL_TARGET_AUDIENCE="Målgrupp"
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_HEAD="Se till att CRON-uppgiften körs <em>varje minut</em>."
PANOPTICON_SETUP_LBL_CRON_LBL_EVERY_MINUTE_ALERT_BODY="Att köra CRON-uppgiften mindre frekvent leder till föråldrad information och opålitlighet, inklusive trasiga webbplatser på grund av ofullständiga Joomla!&reg;-kärnuppdateringar."
PANOPTICON_SETUP_LBL_CRON_CLI_CREATE_A_JOB="Gå till din webbhotellskontrollpanel. Skapa en ny CRON-uppgift. Ställ in den att köras <strong>varje minut</strong>. Använd följande kommandorad."
PANOPTICON_SETUP_LBL_CRON_REPLACE_PHP_CLI="Ersätt <i>/path/to/php</i> med sökvägen till PHP %s CLI-körbara filen. Se till att det är PHP CLI-körbara filen och <strong>inte</strong> PHP CGI/FastCGI-körbara filen."
PANOPTICON_SETUP_LBL_CRON_IF_UNSURE="Om du är osäker på vad något eller allt ovanstående betyder, fråga din webbhotell."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_HEAD="CRON-uppgiften körs inte"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_1="Ta bort <code>2>&1</code> från CRON-kommandoraden. När CRON-kommandot körs igen kommer du att få ett e-postmeddelande med ett fel (så länge ditt webbhotellskonto är konfigurerat att skicka e-postmeddelanden med utdata från CRON-uppgifterna). Med hjälp av det kan du ta reda på vad som händer."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NOT_RUN_INFO_2="Om ingenting verkar hända ens då, kontakta din värd. Antingen tar ditt konto inte emot utdata från CRON-jobben, eller så körs CRON-jobben inte alls (även om det är osannolikt har vi sett det hända ett fåtal gånger)."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_HEAD="Jag får “Status: 403 Forbidden” när jag kör CRON-uppgiften"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_1="Du använder PHP-CGI/FastCGI-körbar fil. Som nämnt ovan måste du ersätta <em>/path/to/php</em> med sökvägen till PHP CLI-körbar fil."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_FORBIDDEN_INFO_2="Kontakta din värd för att få den korrekta sökvägen. Om din värd gav dig den här sökvägen från början, eskalera ditt supportärende och be om att få tala med en serveringenjör. Det är enkelt för dem att ge dig den rätta sökvägen."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_HEAD="Jag får “Akeeba Panopticon kräver PHP %s eller senare”."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_1="Du använder PHP CLI-körbar fil för fel PHP-version i din CRON-uppgift."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_WRONG_PHP_INFO_2="De flesta servrar har flera PHP-versioner installerade. Du behöver be din värd om sökvägen till PHP CLI-körbara filen för PHP %s och använda den i CRON-jobbets kommandorad."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_HEAD="Värden tillåter endast URL:er i CRON"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_URL_CRON_INFO="Klicka på fliken <strong>Webb</strong> ovan."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_HEAD="Värden har inte en CRON-funktion"
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_1="Vi rekommenderar <strong>verkligen starkt</strong> att du använder en annan värd."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_2="Panopticon är bara användbart när dess automatiseringsfunktioner körs konsekvent och pålitligt. Detta kräver att dess CRON-uppgift körs varje minut - <em>1440 gånger om dagen</em>. Detta kan bli dyrt med en tredjepartstjänst; cirka $10 per dag! Du kan istället spendera lika mycket pengar <em>per månad</em> på en ordentlig värd som stödjer riktiga, kommandorads-CRON-uppgifter."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_3="Om du har ett billigare sätt att köra CRON-uppgifter på distans (t.ex. en annan server under din kontroll), klicka på fliken <strong>Webb</strong> för att ta reda på hur du gör det."
PANOPTICON_SETUP_LBL_CRON_TROUBLE_NO_CRON_INFO_4="<strong>Snåla inte på CRON-jobbets frekvens!</strong> Att köra CRON-jobb mindre frekvent kommer att göra Panopticon opålitlig och kan till och med bryta dina webbplatser på grund av ofullständiga Joomla&reg; kärnuppdateringar."
