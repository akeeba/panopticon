PANOPTICON_SITES_LBL_TROUBLESHOOT_DEBUG_MUST_ENABLE_FOR_ISSUE="Innan du försöker skicka in en fråga om detta anslutningsproblem, gå till Administration, System Configuration, System och aktivera Debug System. Kom sedan tillbaka hit och försök samma anslutning igen. Du kommer att få detaljerad felsökningsinformation som du behöver inkludera i din fråga."
PANOPTICON_SITE_LBL_NOTES_HEAD="Anteckningar"
PANOPTICON_SITE_LBL_NOTES_HELP="Fritextanteckningar om webbplatsen visas endast för användare som har redigeringsbehörigheter på webbplatsen."
PANOPTICON_SITE_LBL_NOTES_HELP_NO_PRIVILEGED="<strong>INNEHÅLL INTE KÄNSLIG INFORMATION</strong>, som lösenord, i Anteckningar. Innehållet i detta fält lagras <em>okrypterat</em> i databasen. Om du vill lagra känslig information rekommenderar vi starkt att använda en lösenordshanterare med förmågan att lagra godtycklig information som KeePassXC, Strongbox, 1Password, etc."
