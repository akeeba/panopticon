PANOPTICON_SITES_LBL_TROUBLESHOOT_WPNOTJSON_BLAH2="Se till att det inte finns någon .htaccess-kod, tredjepartstillägg eller anpassad kod (inklusive i temats <code>functions.php</code>-fil) som blockerar eller på annat sätt begränsar WordPress JSON-API – varken helt och hållet eller för oautentiserad (gäst) åtkomst."
