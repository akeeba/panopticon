PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_HEAD="Joomla! API-applikationen är blockerad (HTTP-fel 403)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS="Något på din server – exempelvis serverkonfigurationen som kontrolleras av din värd, en serverkonfigurationsfil som <code>.htaccess</code>, eller ett tillägg på din webbplats – blockerar Panopticon från att komma åt webbplatsens API-applikation (<span class=\"font-monospace\">%s</span>)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_WHATIS_J3="Något på din server - som serverkonfigurationen som kontrolleras av din värd, en serverkonfigurationsfil som <code>.htaccess</code>, eller en plugin på din webbplats - blockerar Panopticon från att komma åt URL: en för API-tillägget (<span class=\\"font-monospace\\">%s</span>) på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_TOCHECK="Saker att kontrollera:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1="Blockerar din värd, eller din serverkonfigurationsfil (till exempel <code>.htaccess</code>), åtkomst till slutpunkten för Joomla! API-applikationen (<span class=\\"font-monospace\\">%s</span>) helt och hållet?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK1_J3="Blockerar din värd, eller din serverkonfigurationsfil (till exempel <code>.htaccess</code>), åtkomst till slutpunkten för API-tillägget (<span class=\\"font-monospace\\">%s</span>) helt och hållet?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2="Har din värd en serverskyddslösning (t.ex. Apaches mod_security2) som kan blockera Joomla! API-applikationens slutpunkt (<span class=\"font-monospace\">%s</span>), din API-token (<span class=\"font-monospace\">%s</span>) eller Panopticons User-Agent (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK2_J3="Har din värd en serverskyddslösning (t.ex. Apaches mod_security2) som kan blockera API-tilläggets slutpunkt (<span class=\"font-monospace\">%s</span>), din API-token (<span class=\"font-monospace\">%s</span>) eller Panopticons User-Agent (<span class=\"font-monospace\">panopticon/%s</span>)?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_API403_CHECK3="Har du en säkerhets-, SEO- eller annan liknande plugin som kan blockera ovanstående?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD="Svaret från Joomla! API-applikationen inkluderar icke-API-utdata"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_HEAD_J3="Svaret från API-tillägget inkluderar icke-API-utdata"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH1="Svaret från API:et föregås och/eller följs av annat textinnehåll, t.ex. PHP-meddelanden (t.ex. avskrivningsmeddelanden, varningar eller allvarliga fel) eller utdata från tredjepartsprogram. Därför kan API-svaret inte avkodas, vilket innebär att Panopticon inte kan förstå webbplatsens svar."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH2="Se till att \"Felrapportering\" är inställd på Inget och \"Felsök webbplats\" är inställd på Nej på webbplatsens globala konfigurationssida. Detta förhindrar att PHP skriver ut meddelanden som förstör API-svaret."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUT_BLAH3="Om detta inte är tillräckligt är det möjligt att en tredjepartsplugin orsakar ett fel i API-applikationen. Kontrollera om det finns några tredjepartsplugin, särskilt systemplugin, som kan bryta API-tillägget av misstag och kontakta deras författare."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD="Joomla! API-applikationen svarade med en oväntad HTTP-statuskod (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_HEAD_J3="API-tillägget svarade med en oväntad HTTP-statuskod (%s)"
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX="HTTP-statuskoden %s innebär att det har uppstått ett serverfel. Kontrollera om det finns några tredjepartsplugin, särskilt systemplugin, som kan bryta Joomla! API-applikationen av misstag och kontakta deras författare."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_5XX_J3="HTTP-statuskoden %s innebär att det har uppstått ett serverfel. Kontrollera om det finns några tredjepartsplugin, särskilt systemplugin, som kan bryta API-tillägget av misstag och kontakta deras författare."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400="HTTP-statuskoden 400 betyder vanligtvis att din webbplats endast kan nås av ett begränsat antal domännamn; den du försökte använda (<span class=\\"font-monospace\\">%s</span>) kanske inte är en av dem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_ATPRO="Om du använder Admin Tools Professional, gå till webbplatsens backend och klicka på Komponenter, Admin Tools för Joomla!, Brandvägg för webbapplikationer, Konfigurera WAF, Begäransfiltrering. Kontrollera listan med <em>Tillåtna domäner</em> längst ner på sidan."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HTTPERROR_400_WHATEVER="Om detta inte var fallet, kontakta din värd."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_HEAD="Joomla! tror att din API-token är felaktig, korrupt eller på annat sätt inte kan logga in dig."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH1="Se till att den API-token du använder tillhör ett användarkonto som tillhör Super User-gruppen och att användaren är aktiverad. Observera att begäran om lösenordsåterställning inaktiverar användaren tillfälligt. Lita inte på din återgivning eller dina antaganden; dubbelkolla användaren på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2="Se till att tilläggen 'API Authentication - Web Services Joomla Token' och 'User - Joomla API Token' är aktiverade på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH2_J3="Se till att tillägget 'System - Panopticon Connector for Joomla 3' är aktiverat på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH3="Det är också möjligt att något på din server, eller ett tillägg på din webbplats, korrumperar API-token när det överförs till din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_401_BLAH4="Kontrollera dina installerade Joomla!-tillägg. Observera att nej, Admin Tools Professional för Joomla! <em>påverkar inte</em> Joomla! API-token. Om detta inte hjälper, kontakta din värd."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH1="HTTP-statuskoden 406 (Not Acceptable) innebär att Joomla! inte ser vår HTTP <code>Accept</code>-header, eller en plugin på din webbplats ändrade den på ett sätt som resulterade i ett fel."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH2="Kontrollera att det inte finns några <code>system</code>- eller <code>webservices</code>-tillägg som kan korrumpera HTTP Accept-header."
PANOPTICON_SITES_LBL_TROUBLESHOOT_406_BLAH3="Om detta inte hjälper, kontakta din värd och be dem kontrollera om Accept-header vidarebefordras korrekt till PHP. Det bör vara <code>Accept: application/vnd.api+json</code>."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_GENERIC="Mest troligt har en <code>system</code>- eller <code>webservices</code>-plugin på din server ändrat begäran vi skickade, vilket resulterade i ett fel. Kontrollera dina installerade tillägg."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_HEAD="Joomla! tror att din API-token är felaktig, korrupt eller på annat sätt inte kan logga in dig."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH1="Se till att den API-token du använder tillhör ett användarkonto som tillhör Super User-gruppen och att användaren är aktiverad. Observera att begäran om lösenordsåterställning inaktiverar användaren tillfälligt. Lita inte på din återgivning eller dina antaganden; dubbelkolla användaren på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2="Se till att tilläggen 'API Authentication - Web Services Joomla Token' och 'User - Joomla API Token' är aktiverade på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH2_J3="Se till att tillägget 'System - Panopticon Connector for Joomla 3' är aktiverat på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH3="Det är också möjligt att något på din server, eller ett tillägg på din webbplats, korrumperar API-token när det överförs till din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_APITOKEN_BLAH4="Kontrollera dina installerade Joomla!-tillägg. Observera att nej, Admin Tools Professional för Joomla! <em>påverkar inte</em> Joomla! API-token. Om detta inte hjälper, kontakta din värd."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_HEAD="Det uppstod en kommunikationsfel med din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH1="Kommunikationsbiblioteket som används av PHP (cURL) har rapporterat följande fel:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CURL_BLAH2="Konsultera <a href=\"https://curl.se/libcurl/c/libcurl-errors.html\" target=\"_blank\">cURL-bibliotekets felkodsreferens</a> för mer information om felet. I de flesta fall rör sig problemet om ett nätverks- eller serverkonfigurationsproblem – antingen på servern där Panopticon är installerat eller på servern din webbplats finns på – vilket kräver att du kontaktar respektive värd för hjälp."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_HEAD="Det uppstod en kommunikationsfel med din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH1="Kommunikationsbiblioteket som används av Panopticon (<a href=\\"https://github.com/guzzle/guzzle\\" target=\\"_blank\\">Guzzle HTTP</a>) har rapporterat följande fel:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_GUZZLE_BLAH2="Detta är ett oväntat tillstånd som kan indikera en kommunikationsfel vi ännu inte har sett, ett problem inom Guzzle självt, ett problem med servern där du har installerat Panopticon, eller ett problem i Panopticon självt. Sök igenom öppna <em>och stängda</em> ärenden <a href=\\"https://github.com/akeeba/panopticon/issues?q=is%3Aissue\\" target=\\"_blank\\">i vårt GitHub-repositorium</a>. Om ingen annan har rapporterat detta, öppna gärna ett ärende så tittar vi på det."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_HEAD="Värdnamnet för din webbplats (<span class=\\"font-monospace\\">%s</span>) kan inte lösas till en IP-adress."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK="Var god kontrollera följande:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK1="Har du skrivit in webbadressen korrekt? Kontrollera noggrant, stavfel är lätt att göra och svåra att upptäcka!"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK2="Har du nyligen köpt domänen, tilldelat domänen till en server eller överfört din webbplats mellan värdar? Tänk på att DNS-spridning tar allt från 5 minuter till flera dagar. Dessutom, på grund av DNS:s distribuerade natur, är det möjligt att du kan se din webbplats <em>från din enhet</em> men inte servern där Panopticon är installerat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DNS_CHECK3="Om din webbplats domän pekar på en IPv6-adress – men inte en IPv4-adress – kontrollera att servern där Panopticon är installerat stöder IPv6. Du kan behöva be din värd att bekräfta att så är fallet."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_HEAD="Akeeba Panopticon Connector är inte aktiverat på din webbplats"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_BLAH="Din Joomla!-webbplats måste ha Akeeba Panopticon Connector installerat och aktiverat för att Akeeba Panopticon ska fungera med den."
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK="Var god kontrollera följande:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK1="Har du installerat Akeeba Panopticon Connector-paketet på din webbplats?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK2="Gå till System, Hantera, Tillägg. Är “Akeeba Panopticon Connector”-komponenten installerad och aktiverad?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK3="Gå till System, Hantera, Tillägg. Är “Akeeba Panopticon Connector”-paketet installerat och aktiverat?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_CHECK4="Gå till System, Hantera, Plugins. Är “Web Services - Panopticon”-tillägget aktiverat?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_HEAD="Tillägget “System - Panopticon Connector for Joomla 3” är inte aktiverat på din webbplats"
PANOPTICON_SITES_LBL_TROUBLESHOOT_CONNECTOR_J3_BLAH="Din Joomla!-webbplats måste ha tillägget “System - Panopticon Connector for Joomla 3” installerat och aktiverat för att Akeeba Panopticon ska fungera med den."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_HEAD="Du använder ett självsignerat SSL/TLS-certifikat"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_WHAT="Du använder HTTPS för att komma åt din webbplats, men SSL/TLS-certifikatet du använder är inte signerat av en kommersiell, välkänd certifieringsmyndighet."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK="Du kan åtgärda detta problem genom att göra <em>en</em> av följande åtgärder:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK1="Använd vanlig HTTP. Detta är det minst säkra alternativet och rekommenderas därför starkt inte."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK2="Installera ett SSL/TLS-certifikat signerat av en kommersiell, välkänd certifieringsauktoritet. De flesta servrar låter dig använda <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a> som utfärdar giltiga, signerade, fullt fungerande SSL/TLS-certifikat kostnadsfritt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLS_SELFSIGNED_CHECK3="Om du befinner dig på ett intranät, extranät eller på annat sätt behöver underhålla din egen certifieringsauktoritet kan du tala om för Panopticon att känna igen din anpassade certifieringsauktoritet. Skapa filen <code>cacert.pem</code> i mappen <code>user_code</code> i din Panopticon-installation. Kopiera och klistra in din certifieringsauktoritets (CA) offentliga certifikat i <a href=\"https://en.wikipedia.org/wiki/Privacy-Enhanced_Mail\" target=\"_blank\">PEM</a>-format. Detta laddas <em>utöver</em> de vanliga CA-filerna automatiskt, vilket gör det möjligt för Panopticon att komma åt din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_HEAD="Din webbplats SSL/TLS-certifikat har ett problem"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_WHAT="Du använder HTTPS för att komma åt din webbplats, men SSL/TLS-certifikatet du använder verkar ha ett problem."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK="Var god kontrollera följande:"
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK1="Är SSL/TLS-certifikatet för rätt domännamn? Om du använder standardcertifikatet från din värd är det begränsat till det tillfälliga domännamnet du använder för att konfigurera webbplatsen, inte ditt riktiga domännamn. Du behöver installera ett SSL/TLS-certifikat signerat av en kommersiell, välkänd certifieringsauktoritet. De flesta servrar låter dig använda <a href=\"https://en.wikipedia.org/wiki/Let%27s_Encrypt\" target=\"_blank\">Let's Encrypt</a> som utfärdar giltiga, signerade, fullt fungerande SSL/TLS-certifikat kostnadsfritt. Kom ihåg att vissa självbetjäningskontrollpaneler (t.ex. cPanel eller Plesk) låter dig välja vilket SSL/TLS-certifikat som är aktivt för ett domännamn. Kontrollera att rätt certifikat verkligen används."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK2="Har SSL/TLS-certifikatet löpt ut? I så fall behöver du förnya det. Observera att om du använder Let's Encrypt har certifikatet en kort giltighetstid (vanligtvis 90 dagar) och bör förnyas automatiskt av din värd. Om detta inte har skett behöver du kontakta din värd."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK3="Har SSL/TLS-certifikatet återkallats? Ibland kan certifieringsauktoriteter, eller ägare av ett SSL/TLS-certifikat, välja att återkalla det. Till exempel gör certifieringsauktoriteter det om de misstänker bedrägeri eller om de tror att deras infrastruktur för utfärdande av certifikat har komprometterats. <a href=\"https://www.namecheap.com/support/knowledgebase/article.aspx/9968/38/how-to-check-the-certificate-revocation-status/\" target=\"_blank\">Kontrollera certifikatets återkallningsstatus</a>. Om det har återkallats behöver du ett nytt certifikat."
PANOPTICON_SITES_LBL_TROUBLESHOOT_TLSBORKED_CHECK4="Är det möjligt att din server serverar fel SSL/TLS-certifikat? Detta kan inträffa om du nyligen har bytt till ett nytt certifikat, antingen manuellt eller som en del av en automatiserad certifikatrotationsprocess (t.ex. när din värd utfärdar ett nytt certifikat via Let's Encrypt). När certifikatet ändras måste webbservern laddas om eller startas om. I sällsynta fall kanske detta inte sker – eller en oerfaren systemadministratör kanske glömmer att göra det. Kontakta din värd/systemadministratör för att kontrollera detta och, om nödvändigt, ladda om eller starta om webbserverprocessen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_HEAD="Tillägget “Web Services - Installer” är inaktiverat på din webbplats"
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH1="Panopticon använder Joomla! API Application-tjänster som tillhandahålls av tillägget “Web Services - Installer” för att säkerställa att alla nödvändiga tillägg är installerade och publicerade på din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WEBSERVICES_BLAH2="Gå till webbplatsens backend och klicka på System, Hantera, Tillägg. Sök efter tillägget \"Webbtjänster – Installationsprogram\" och aktivera det."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_HEAD="Kan inte kommunicera med tillägget \"System – Panopticon Connector for Joomla 3\" på din webbplats"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH1="Panopticon använder sitt eget tillägg, “System - Panopticon Connector for Joomla 3”, för att tillhandahålla den nödvändiga API: en"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH2="Gå till webbplatsens backend och klicka på Tillägg, Tillägg. Sök efter tillägget \"System – Panopticon Connector for Joomla 3\" och aktivera det."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_J3_BLAH3="Om du redan har aktiverat detta tillägg, ändra Endpoint URL nedan till <code>%s</code>"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_HEAD="Din webbplats verkar vara lösenordsskyddad på webbservernivå"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH1="Din webbplats svarade med en HTTP 401 Obehörig statuskod när den försökte komma åt API: en. Detta betyder vanligtvis att du har tillämpat lösenordsskydd på webbservernivå."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH2="Ta bort lösenordsskyddet."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3="Observera att lösenordsskyddet kan ha tillämpats enbart på webbplatsens <code>api</code>-mapp, eller på webbplatsens rotmapp. Kontrollera båda platser, i denna ordning."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PWPROTECT_BLAH3_J3="Observera att lösenordsskyddet har tillämpats på rotmappen för din webbplats."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_HEAD="Oj då. Något är helt sönder här…"
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH1="Normalt kan vi upptäcka arten av anslutningsfelet och tillhandahålla någon användbar felsökningsinformation här, eller åtminstone peka dig på någon form av användbar tredjeparts felsökningsresurs. När detta inte är fallet kan vi åtminstone skriva ut ett felmeddelande som kommer att hjälpa oss att hjälpa dig att felsöka det."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH2="Istället fick vi ett fel som vi borde kunna ge felsökningsinformation för (<span class=\"font-monospace\">%s</span>), men vi saknar koden för det. Det här borde inte ha hänt."
PANOPTICON_SITES_LBL_TROUBLESHOOT_FUBAR_BLAH3="Ta bort alla filer och mappar i <code>tmp</code>-mappen för Akeeba Panopticon. Det löser problemet med att den cachelagrade kopian av den här sidan är kraftigt inaktuell. Om detta inte hjälper, meddela oss."
