PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_HEAD="WordPress JSON API-applikationens svar innehåller icke-API-utdata"
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH1="Svaret från API:et föregås och/eller följs av annat textinnehåll, t.ex. PHP-meddelanden (t.ex. avskrivningsmeddelanden, varningar eller allvarliga fel) eller utdata från tredjepartstillägg. Därför kan API-svaret inte avkodas, vilket innebär att Panopticon inte kan förstå webbplatsens svar."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH2="Kontrollera att PHP på din server är konfigurerat med <code>display_errors</code> inaktiverat och att du inte har aktiverat <code>WP_DEBUG</code> i webbplatsens <code>wp-config.php</code>-fil. Detta förhindrar att PHP skriver ut meddelanden som förstör API-svaret."
PANOPTICON_SITES_LBL_TROUBLESHOOT_DIRTYOUTPUTWP_BLAH3="Om detta inte räcker kan ett tredjepartstillägg orsaka ett fel i API-applikationen. Kontrollera om det finns tredjepartstillägg, inklusive obligatoriska tillägg (<code>mu-plugins</code>), som oavsiktligt kan bryta API-tillägget och kontakta i så fall dess upphovsperson."
