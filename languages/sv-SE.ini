PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY="(S)FTP-katalog"
PANOPTICON_SETUP_LBL_FS_FTP_DIRECTORY_HELP="(S)FTP-katalogen till Panopticon-installationen. På FTP-servrar är detta inte samma som filsystemets sökväg. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_FS_FTP_HOST="(S)FTP-servervärdnamn"
PANOPTICON_SETUP_LBL_FS_FTP_HOST_HELP="Värdnamnet eller IP-adressen till din (S)FTP-server, t.ex. <code>ftp.example.com</code> eller <code>127.0.0.1</code>. Du MÅSTE ange detta utan <code>ftp://</code>, <code>sftp://</code> eller <code>ssh://</code>-prefix. Om du är osäker på detta och de andra FTP-inställningarna, fråga din värd."
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE="Använd passivt läge"
PANOPTICON_SETUP_LBL_FS_FTP_PASSIVE_HELP="Endast tillämpligt för FTP. När det är markerat kommer Panopticon att använda FTP-passivt läge. De flesta FTP-servrar kräver det. Om din värd kräver FTP-aktivt läge avmarkerar du den här rutan. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD="(S)FTP-lösenord"
PANOPTICON_SETUP_LBL_FS_FTP_PASSWORD_HELP="Lösenordet du använder för att ansluta till din (S)FTP-server. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_FS_FTP_PORT="(S)FTP-serverport"
PANOPTICON_SETUP_LBL_FS_FTP_PORT_HELP="Portnumret som din (S)FTP-server lyssnar på. Vanligtvis är det 21 för FTP och 22 för SFTP. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_FS_FTP_SSL="Använd SSL"
PANOPTICON_SETUP_LBL_FS_FTP_SSL_HELP="Endast tillämpligt för FTP, ignoreras för SFTP. När det är markerat kommer Panopticon att använda FTP över Explicit SSL (FTP/S). Observera att detta inte ska förväxlas med SFTP, vilket är något helt annat."
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME="(S)FTP-användarnamn"
PANOPTICON_SETUP_LBL_FS_FTP_USERNAME_HELP="Användarnamnet du använder för att ansluta till din (S)FTP-server. Om du är osäker, fråga din värd."
PANOPTICON_SETUP_LBL_NOSCRIPT_HEAD="JavaScript är inaktiverat"
