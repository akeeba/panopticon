PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_HTTPERROR_400="HTTP-statuskoden 400 innebär vanligtvis att din webbplats bara kan nås av ett begränsat antal domännamn; det du försökte använda (<span class=\"font-monospace\">%s</span>) kanske inte är ett av dem. Kontakta din värd om du är osäker på varför du får det här meddelandet."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_HEAD="WordPress anser att din API-token är felaktig, skadad eller på annat sätt inte kan logga in dig."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH1="Kontrollera att den API-token du använder är aktuell och att du inte av misstag har klippt av den eller kopierat mellanslag runt den."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH3="Det är också möjligt att något på din server, eller ett tillägg på din webbplats, korrumperar API-token när den överförs till webbplatsen."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH4="Kontrollera dina installerade tillägg. Observera att Admin Tools Professional för WordPress <em>inte</em> interfererar med Panopticons API-token. Om detta inte hjälper, kontakta din värd."
PANOPTICON_SITES_LBL_TROUBLESHOOT_HUH_WPGENERIC="Det är troligtvis ett tillägg på din server som ändrade begäran vi skickade, vilket resulterade i ett fel. Kontrollera dina installerade tillägg."
