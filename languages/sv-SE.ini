PANOPTICON_SETUP_LBL_CRON_WHAT_NEXT_BENCHMARK_INFO="Några sekunder till en minut efter att du konfigurerat CRON-jobbet kommer den här sidan att ändras till ett riktmärke. Stäng inte den här webbläsarfliken, byt inte till en annan flik/ett annat fönster eller program, stäng inte av eller låt enheten gå i viloläge, och mata inte din <em title=\"Det här är gremlins innan de blir gremlins. Avslöjar vi vår ålder med den här föråldrade popkulturreferensen?\">mogwai</em> efter midnatt. Ganska enkelt, eller hur?"
