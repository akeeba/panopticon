PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_1_WP="Kontrollera att du har installerat och aktiverat Akeeba Backup Professional-tillägget på din webbplats. Akeeba Backup Core <em>är inte</em> kompatibelt med Akeeba Panopticon."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_3="Kontrollera att inga tredjepartstillägg (särskilt säkerhetstillägg) och/eller serverkonfigurationsinställningar förhindrar åtkomst till webbplatsens <code>api</code>-mapp. Kontrollera också att svaren från den filen <em>inte</em> cachas av tredjepartstillägg på din webbplats, din webbserver eller någon CDN/caching-proxy som kan vara konfigurerad framför din webbplats."
