PANOPTICON_SETUP_LBL_BROKEN_JS_EXPLAIN="JavaScript-filerna för Panopticon laddas inte korrekt. Kontrollera att inga filer saknas i installationen, kontrollera behörigheter och rensa webbläsarens cache."
