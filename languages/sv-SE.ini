PANOPTICON_SITES_LBL_TROUBLESHOOT_WPCONNECTOR_CHECK2="Gå till wp-admin, Tillägg. Är tillägget \"Akeeba Panopticon Connector for WordPress\" installerat <em>och</em> aktiverat?"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_HEAD="Kan inte kommunicera med tillägget \"Akeeba Panopticon Connector for WordPress\" på din webbplats"
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH1="Panopticon använder sitt eget tillägg, \"Akeeba Panopticon Connector for WordPress\", för att tillhandahålla det nödvändiga API:et via WordPress JSON-tjänste-API (<code>wp-json</code>)."
PANOPTICON_SITES_LBL_TROUBLESHOOT_PLUGIN_WP_BLAH2="Gå till webbplatsens wp-admin-backend och klicka på Tillägg. Sök efter tillägget \"Akeeba Panopticon Connector for WordPress\" och aktivera det."
PANOPTICON_SITES_FIELD_CONFIG_EXTENSIONS_UPDATE_TIME_HELP="Tiden angiven i tidszonen %s. Om uppdateringar hittas <em>efter</em> den här tiden på dagen installeras uppdateringen nästa kalenderdag. Undvik att använda tidsomställningstiden för sommartid (vanligtvis: mellan kl. 02:00 och 04:00); annars agerar uppdateringsschemaläggningen på ett sätt som kan verka \"konstigt\" eller \"fel\" om en uppdatering hittas dagen för sommartidsomställning. Manuellt utlösta uppdateringar körs alltid omedelbart, oavsett den här inställningen."
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_MCP="MCP-server"
PANOPTICON_SYSCONFIG_LBL_MCP_INTRO="MCP-servern (Model Context Protocol) låter AI-agenter och chattbottar — till exempel Claude Code, Claude Desktop, Codex, Cursor eller VS Code — styra Panopticon med samma möjligheter som JSON-API:et. Varje förfrågan autentiseras med en Panopticon API-token som skickas som en Bearer Authorization-header, och en agent kan bara se och göra det som token-ägaren kan göra via API:et."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED="Aktivera MCP-servern"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENABLED_HELP="När den är inaktiverad (standard) svarar MCP-slutpunkten som om den inte existerar."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT="MCP-slutpunktens URL"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_ENDPOINT_HELP="Konfigurera ditt AI-verktyg att använda denna URL som en Streamable HTTP MCP-server, med en <code>Authorization: Bearer &lt;din API-token&gt;</code>-header."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS="Globalt inaktiverade verktyg"
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_DISALLOWED_TOOLS_HELP="En kommaseparerad lista över namn på MCP-verktyg som aldrig exponeras för någon, oavsett användare, token eller grupp. Detta är den absoluta nödbrytaren (ange till exempel <code>get_sysconfig</code> här för att hålla systemkonfigurationen helt utanför MCP). Lämna tomt för att tillåta alla verktyg."
PANOPTICON_SYSCONFIG_LBL_FIELD_MCP_AVAILABLE_TOOLS="Tillgängliga verktyg"
PANOPTICON_SYSCONFIG_LBL_SUBHEAD_CHECKSUMS="Kärnfilernas integritet"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL="Bas-URL för checksummekälla"
PANOPTICON_SYSCONFIG_LBL_FIELD_CHECKSUMS_BASE_URL_HELP="Bas-URL som Panopticons anslutningsprogram använder för att ladda ner referenschecksummorna för kontrollen av kärnfilernas integritet. Lämna tomt för att använda standardvärdet <code>https://getpanopticon.com/checksums</code>. Om du kör din egen spegel måste den tillhandahålla samma struktur: anslutningsprogrammet lägger till <code>/joomla/&lt;version&gt;/sha256_squash.json.gz</code> eller <code>/wordpress/&lt;version&gt;/sha256_squash.json.gz</code> till denna bas-URL. Inkludera inte ett avslutande snedstreck eller CMS-namnet."
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS="Inaktiverade MCP-verktyg"
PANOPTICON_GROUPS_FIELD_MCP_DISALLOWED_TOOLS_HELP="MCP-verktyg som medlemmar i den här gruppen INTE får använda. Viktigt: åtkomst beviljas om NÅGON av en användares grupper tillåter ett verktyg. Ett verktyg blockeras för en användare bara när VARJE grupp de tillhör inaktiverar det. Detta är motsatsen till Joomlas \"nekande vinner\"-logik. Listan över globalt inaktiverade verktyg i systemkonfigurationen har alltid företräde."
