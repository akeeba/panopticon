PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2="Logga in i webbplatsens backend. Gå till Komponenter, Akeeba Backup, Kontrollpanel. Klicka på Alternativ, Frontend-säkerhetskopiering och ange \"Aktivera JSON-API (fjärrsäkerhetskopiering)\" till Ja. Ange ett nytt \"Hemligt ord\"; du kan skapa ett slumpmässigt, säkert hemligt ord på <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Klicka sedan på Spara &amp; Stäng."
PANOPTICON_SITES_LBL_AKEEBABACKUP_CANNOTCONNECT_TIP_2_WP="Logga in i webbplatsens backend. Gå till Akeeba Backup, Systemkonfiguration, Offentligt API och ange \"Aktivera JSON-API (fjärrsäkerhetskopiering)\" till Ja. Ange en ny \"Hemlig nyckel\"; du kan skapa en slumpmässig, säker nyckel på <a href=\"https://www.random.org/passwords/?num=1&len=32&format=html&rnd=new\">random.org</a>. Klicka sedan på Spara &amp; Stäng."
PANOPTICON_SITES_LBL_TROUBLESHOOT_WP_401_BLAH2="Kontrollera att tillägget \"Akeeba Panopticon Connector for WordPress\" är aktiverat på din webbplats."
