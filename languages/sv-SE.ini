PANOPTICON_SITES_LBL_TROUBLESHOOT_WPAPI403_CHECK1="Blockerar din värd, eller din serverkonfigurationsfil (t.ex. <code>.htaccess</code>), åtkomst till WordPress API-applikationens slutpunkt (<span class=\"font-monospace\">%s</span>) helt och hållet?"
