PANOPTICON_SETUP_LBL_DATABASE_HEAD_TEXT="Panopticon behöver en databas för att fungera. Först skapar du en databas - och en databasanvändare - på din server. Ange sedan anslutningsinformationen till databasen nedan. Om något är oklart, kontrollera med företaget som hostar din webbplats."
PANOPTICON_SETUP_LBL_DATABASE_DRIVER="Databastyp"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_HELP="Detta är vanligtvis MySQLi (<em>med</em> efterföljande \\"i\\")"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQL="MySQL (föråldrat drivrutin för MySQL - undvik att använda)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_MYSQLI="MySQLi (föredragen drivrutin för MySQL)"
PANOPTICON_SETUP_LBL_DATABASE_DRIVER_PDO="PDO"
