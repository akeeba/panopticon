# Apache 2.4 virtual host for the web-server MCP integration test (PHP-FPM variant).
#
# PHP scripts — including PATH_INFO forms such as /index.php/mcp — are handed to PHP-FPM over
# FastCGI (mod_proxy_fcgi). "AcceptPathInfo On" makes Apache resolve /index.php/mcp to the file
# index.php with PATH_INFO=/mcp instead of returning a 404, and the <FilesMatch \.php$> handler
# then proxies it to PHP-FPM (the match is against the resolved filename "index.php", so it fires
# for the PATH_INFO form too).
#
# We deliberately DO NOT set "CGIPassAuth On" here. Passing the HTTP Authorization header to PHP
# is left to the htaccess "SetEnvIf Authorization ..." trick, which is exactly the behaviour the
# test toggles on and off by adding/removing .htaccess. Without it, Apache strips Authorization
# before it reaches PHP-FPM — faithfully reproducing the gh-1010 failure — while the
# X-Panopticon-Token header and the _panopticon_token query parameter still get through.
<VirtualHost *:80>
	ServerName localhost
	DocumentRoot /var/www/html
	DirectoryIndex index.php

	AcceptPathInfo On

	<Directory /var/www/html>
		Options -Indexes +FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	<FilesMatch \.php$>
		SetHandler "proxy:fcgi://127.0.0.1:9000"
	</FilesMatch>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
